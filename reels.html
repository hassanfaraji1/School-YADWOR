<style>
  * { box-sizing: border-box; }
  body { font-family: 'Tajawal', system-ui, -apple-system, sans-serif; background: #000; color: #fff; overflow: hidden; }
  .shimmer { animation: fb-shimmer 1.4s infinite linear; background: linear-gradient(100deg, #1a1a1a 30%, #2e2e2e 50%, #1a1a1a 70%); background-size: 400% 100%; }
  @keyframes fb-shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
  .reel-shimmer-overlay { position:absolute; inset:0; z-index:5; pointer-events:none; animation: fb-shimmer 1.4s infinite linear; background: linear-gradient(100deg, rgba(26,26,26,0.95) 30%, rgba(50,50,50,0.7) 50%, rgba(26,26,26,0.95) 70%); background-size: 400% 100%; border-radius: 0; }
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#18181b; color:white; padding:8px 18px; border-radius:999px; font-size:13px; font-weight:700; z-index:999; pointer-events:none; opacity:0; transition:opacity .2s; }
  .toast.show { opacity:1; }
  .reel-container { height: 100vh; height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
  .reel-container::-webkit-scrollbar { display: none; }
  .reel-item { height: 100vh; height: 100dvh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
  video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .video-progress { -webkit-appearance: none; appearance: none; width: 100%; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.3); cursor: pointer; outline: none; }
  .video-progress::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; cursor: pointer; margin-top: -5.5px; box-shadow: 0 0 4px rgba(0,0,0,0.5); }
  .video-progress::-webkit-slider-runnable-track { height: 3px; border-radius: 2px; }
  #reel-comments-modal { transition: transform .3s cubic-bezier(.4,0,.2,1); }
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- Back button --><a href="home.html" class="fixed top-4 right-4 z-50 flex h-10 w-10 items-center justify-center rounded-full bg-black/50 text-white backdrop-blur-sm">
  <svg viewBox="0 0 24 24" class="h-6 w-6 fill-none stroke-current" stroke-width="1.8" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
</a>

<div id="reels-container" class="reel-container"></div>

<!-- COMMENTS MODAL -->
<div id="reel-comments-modal" class="hidden fixed inset-0 z-[60] flex items-end justify-center">
  <div class="absolute inset-0 bg-black/60" onclick="closeReelComments()"></div>
  <div class="relative w-full max-h-[80vh] flex flex-col rounded-t-[28px] bg-[#111] shadow-2xl md:max-w-[560px]">
    <div class="flex-shrink-0 flex items-center justify-between p-4 border-b border-white/10">
      <h3 class="text-[17px] font-extrabold text-white">التعليقات</h3>
      <button onclick="closeReelComments()" class="flex h-9 w-9 items-center justify-center rounded-full bg-white/10 text-white">
        <svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="reel-comments-list" class="flex-1 overflow-y-auto space-y-3 p-4 pb-2"></div>
    <div id="reel-reply-indicator" class="hidden flex-shrink-0 mx-4 mb-1 flex items-center justify-between rounded-[10px] bg-white/10 px-3 py-1.5">
      <span id="reel-reply-label" class="text-[12px] text-white/70"></span>
      <button onclick="cancelReelReply()" class="text-white/50">
        <svg viewBox="0 0 24 24" class="h-4 w-4 fill-none stroke-current" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="flex-shrink-0 flex items-center gap-2 mx-4 mb-4 rounded-[14px] bg-white/10 p-2">
      <input id="reel-comment-input" placeholder="أضف تعليقاً..." class="flex-1 bg-transparent text-[14px] text-white placeholder-white/50 px-2" style="outline:none;" />
      <button onclick="submitReelComment()" class="flex h-9 w-9 items-center justify-center rounded-full bg-white text-zinc-900 shrink-0 font-bold">
        <svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-width="2" stroke-linecap="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
let currentReelCommentPostId = null;
let reelSoundEnabled = false;

// ===== INIT: جلب من Firebase أولاً دائماً =====
(async function initReels() {
  const container = document.getElementById('reels-container');
  // shimmer أثناء التحميل
  container.innerHTML = `<div class="reel-item flex-col gap-4 text-zinc-400">
    <div class="shimmer" style="width:80px;height:80px;border-radius:50%;margin-bottom:16px;"></div>
    <p class="text-[15px] font-bold opacity-50">جاري تحميل الريلز...</p>
  </div>`;

  // إذا قادم من منشور محدد — نحفظ قبل الجلب
  const gotoReel = localStorage.getItem('yadwor-goto-reel');
  if (gotoReel) localStorage.removeItem('yadwor-goto-reel');

  // جلب الريلز من Firebase (onValue realtime)
  getPosts(function(posts) {
    renderReels();
    // بعد الرندر مباشرة — انتقل للريل المطلوب
    if (gotoReel) {
      let tries = 0;
      const tryScroll = () => {
        const el = document.getElementById('reel-' + gotoReel);
        if (el) { el.scrollIntoView({ behavior: 'instant' }); }
        else if (tries++ < 10) setTimeout(tryScroll, 150);
      };
      setTimeout(tryScroll, 100);
    }
  });
})();

function toggleReelSound(id) {
  reelSoundEnabled = !reelSoundEnabled;
  // Apply to all videos
  document.querySelectorAll('.reel-item video').forEach(v => {
    v.muted = !reelSoundEnabled;
  });
  // Update all sound icons
  document.querySelectorAll('[id^="reel-sound-icon-"]').forEach(icon => {
    const postId = icon.id.replace('reel-sound-icon-', '');
    const xPath = document.getElementById('reel-sound-x-' + postId);
    if (reelSoundEnabled) {
      // Show sound on icon
      icon.innerHTML = '<path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>';
    } else {
      // Show muted icon
      icon.innerHTML = '<path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M23 9l-6 6M17 9l6 6" stroke-width="1.8"/>';
    }
  });
  showToast(reelSoundEnabled ? 'الصوت مفعّل' : 'الصوت مكتوم');
}
function toggleReelSave(id) {
  const post = state.posts.find(p => p.id === id); if(!post) return;
  post.saved = !post.saved;
  const btn = document.getElementById('reel-save-btn-' + id);
  const svg = document.getElementById('reel-save-svg-' + id);
  if(btn) btn.style.color = post.saved ? '#facc15' : 'white';
  if(svg) svg.setAttribute('fill', post.saved ? 'currentColor' : 'none');
  showToast(post.saved ? 'تم حفظ الريلز ✓' : 'تمت الإزالة');
  // حفظ في Firebase عبر shared.js
  if(post.savedBy === undefined) post.savedBy = {};
  const myUid = localStorage.getItem('yadwor-uid') || '';
  if(myUid) { if(post.saved) post.savedBy[myUid] = true; else delete post.savedBy[myUid]; }
  try { firebase.database().ref('posts/' + id + '/savedBy').set(post.savedBy || {}); } catch(e) {}
}
let reelReplyTarget = null;
let reelLikedComments = JSON.parse(localStorage.getItem('yadwor-reel-liked-comments') || '[]');

function renderReels() {
  const container = document.getElementById('reels-container');
  const reelPosts = state.posts.filter(p => (p.type === 'reel' || p.type === 'video') && p.video);
  
  if (!reelPosts.length) {
    container.innerHTML = `<div class="reel-item flex-col gap-4 text-zinc-400">
      <svg viewBox="0 0 24 24" class="h-16 w-16 fill-none stroke-current" stroke-width="1.2" stroke-linecap="round"><path d="M15 10l4.553-2.276A1 1 0 0 1 21 8.723v6.554a1 1 0 0 1-1.447.894L15 14M3 8a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <p class="text-[16px] font-bold">لا توجد ريلز بعد</p>
    </div>`;
    return;
  }
  
  container.innerHTML = reelPosts.map(post => {
    const myUid = localStorage.getItem('yadwor-uid') || '';
    const isLiked = !!(post.likedBy || {})[myUid];
    const likesCount = Object.keys(post.likedBy || {}).length;
    const commentsCount = post.commentCount || 0;
    const viewCount = post.viewCount || 0;
    const avShId = 'avsh_r_' + post.id;
    const postAvatar = post.avatar
      || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(post.author || post.name || 'U') + '&background=444&color=fff&size=100';
    const postAuthor = post.author || post.name || 'مستخدم';
    const postUsername = post.username || '';
    const postContent = post.text || post.content || '';
    return `<div class="reel-item" id="reel-${post.id}">
      <div id="reel-sh-${post.id}" class="shimmer absolute inset-0"></div>
      ${post.video && (post.video.startsWith('http://') || post.video.startsWith('https://')) ? `
      <video id="reel-vid-${post.id}" src="${post.video}" ${post.thumbnail ? `poster="${post.thumbnail}"` : ''} loop muted playsinline preload="auto"
        class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500"
        oncanplay="onReelCanPlay('${post.id}')"
        ontimeupdate="updateProgress('${post.id}')"
        onclick="toggleReelPlay('${post.id}')">
      </video>
      <button id="reel-sound-btn-${post.id}" onclick="toggleReelSound('${post.id}')" 
        class="absolute top-4 left-4 z-[20] flex h-9 w-9 items-center justify-center rounded-full bg-black/50 text-white backdrop-blur-sm"
        style="touch-action:manipulation">
        <svg id="reel-sound-icon-${post.id}" viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-width="1.8" stroke-linecap="round">
          <path d="M11 5L6 9H2v6h4l5 4V5z"/>
          <path id="reel-sound-x-${post.id}" d="M23 9l-6 6M17 9l6 6" stroke-width="1.8"/>
        </svg>
      </button>` : `
      <div id="reel-vid-${post.id}" data-no-video="1"
        class="absolute inset-0 flex flex-col items-center justify-center cursor-pointer bg-zinc-900">
        <div class="flex h-20 w-20 items-center justify-center rounded-full border border-white/10 bg-white/5">
          <svg viewBox="0 0 24 24" class="h-9 w-9 fill-none stroke-white/30" stroke-width="1.2" stroke-linecap="round">
            <path d="M15 10l4.553-2.276A1 1 0 0 1 21 8.723v6.554a1 1 0 0 1-1.447.894L15 14M3 8a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          </svg>
        </div>
        <p class="mt-3 text-[12px] text-white/30 font-bold">الفيديو غير متاح</p>
      </div>`}
      <div id="reel-play-icon-${post.id}" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-200">
        <div class="flex h-16 w-16 items-center justify-center rounded-full bg-black/50">
          <svg id="reel-play-svg-${post.id}" viewBox="0 0 24 24" class="h-8 w-8 fill-white"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </div>
      </div>
      <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent pointer-events-none"></div>
      
      <!-- Bottom info -->
      <div class="absolute bottom-0 left-0 right-0 px-4 pt-3" style="padding-bottom: max(20px, env(safe-area-inset-bottom, 20px)); z-index:20; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);">
        <div class="mb-3 flex items-start gap-3">
          <div class="relative h-10 w-10 shrink-0 rounded-full overflow-hidden cursor-pointer" onclick="window.location.href='profile.html?uid=${post.uid}'">
            <div id="${avShId}" class="shimmer absolute inset-0 rounded-full"></div>
            <img src="${postAvatar}" class="h-10 w-10 rounded-full object-cover z-[1] relative"
              onload="(function(){var el=document.getElementById('${avShId}');if(el)el.remove();})()"
              onerror="(function(){var el=document.getElementById('${avShId}');if(el)el.style.background='#333';})()" />
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[14px] font-extrabold cursor-pointer" onclick="window.location.href='profile.html?uid=${post.uid}'">${postAuthor}</p>
            <p class="text-[11px] text-zinc-300">@${postUsername}</p>
            <p class="mt-1 text-[13px] leading-5 text-zinc-100 line-clamp-2">${postContent}</p>
          </div>
        </div>
        <div class="mb-3">
          <input type="range" id="reel-progress-${post.id}" class="video-progress" min="0" max="100" value="0"
            oninput="seekVideo('${post.id}', this.value)"
            style="background: linear-gradient(to left, rgba(255,255,255,0.3) 0%, white 0%)">
        </div>
        <div style="display:flex;align-items:center;justify-content:space-around;width:100%;margin-top:10px;">
          <!-- لايك -->
          <button onclick="reelLike('${post.id}')" id="reel-like-btn-${post.id}"
            style="display:flex;flex-direction:column;align-items:center;gap:3px;color:${isLiked?'#f43f5e':'white'};background:none;border:none;cursor:pointer;min-width:44px;padding:6px;">
            <svg viewBox="0 0 24 24" style="width:26px;height:26px;" fill="${isLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" id="reel-like-svg-${post.id}"><path d="M12 21s-7-4.35-9-8.68C1.38 8.92 3.44 5 7.5 5c2.04 0 3.11 1.03 4.5 2.5C13.39 6.03 14.46 5 16.5 5 20.56 5 22.62 8.92 21 12.32 19 16.65 12 21 12 21"/></svg>
            <span id="reel-likes-${post.id}" style="font-size:12px;font-weight:800;">${likesCount}</span>
          </button>
          <!-- تعليق -->
          <button onclick="openReelComments('${post.id}')"
            style="display:flex;flex-direction:column;align-items:center;gap:3px;color:white;background:none;border:none;cursor:pointer;min-width:44px;padding:6px;">
            <svg viewBox="0 0 24 24" style="width:24px;height:24px;" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span id="reel-comments-count-${post.id}" style="font-size:12px;font-weight:800;">${commentsCount}</span>
          </button>
          <!-- مشاهدات -->
          <div style="display:flex;flex-direction:column;align-items:center;gap:3px;color:white;min-width:44px;padding:6px;">
            <svg viewBox="0 0 24 24" style="width:24px;height:24px;" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <span style="font-size:12px;font-weight:800;">${viewCount}</span>
          </div>
          <!-- مشاركة -->
          <button onclick="sharePost('${post.id}')"
            style="display:flex;flex-direction:column;align-items:center;gap:3px;color:white;background:none;border:none;cursor:pointer;min-width:44px;padding:6px;">
            <svg viewBox="0 0 24 24" style="width:24px;height:24px;" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7M12 16V4M8 8l4-4 4 4"/></svg>
            <span style="font-size:12px;font-weight:800;">مشاركة</span>
          </button>
          <!-- حفظ -->
          <button onclick="toggleReelSave('${post.id}')" id="reel-save-btn-${post.id}"
            style="display:flex;flex-direction:column;align-items:center;gap:3px;color:white;background:none;border:none;cursor:pointer;min-width:44px;padding:6px;">
            <svg viewBox="0 0 24 24" style="width:24px;height:24px;" id="reel-save-svg-${post.id}" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            <span style="font-size:12px;font-weight:800;">حفظ</span>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');

  // IntersectionObserver for auto-play on scroll
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const reelId = entry.target.id.replace('reel-', '');
      const video = document.getElementById('reel-vid-' + reelId);
      if (!video) return;
      // التحقق أن العنصر فيديو فعلي وليس div
      const isRealVideo = video.tagName === 'VIDEO';
      if (entry.isIntersecting) {
        document.querySelectorAll('.reel-item video').forEach(v => {
          if (v !== video && typeof v.pause === 'function') { v.pause(); v.currentTime = 0; }
        });
        if (isRealVideo && !video.dataset.noVideo) {
          video.currentTime = 0;
          video.muted = !reelSoundEnabled;
          video.play().catch(() => {
            // If autoplay blocked, try muted
            video.muted = true;
            video.play().catch(() => {});
          });
        }
      } else {
        if (isRealVideo && typeof video.pause === 'function') { video.pause(); }
      }
    });
  }, { threshold: 0.75 });

  document.querySelectorAll('.reel-item').forEach(el => observer.observe(el));

  // Scroll to specific reel if coming from home
  const gotoReelId = localStorage.getItem('yadwor-goto-reel');
  if (gotoReelId) {
    localStorage.removeItem('yadwor-goto-reel');
    setTimeout(() => {
      const targetEl = document.getElementById('reel-' + gotoReelId);
      if (targetEl) targetEl.scrollIntoView({ behavior: 'instant' });
    }, 100);
  }
}

function onReelCanPlay(id) {
  const sh = document.getElementById('reel-sh-' + id);
  const vid = document.getElementById('reel-vid-' + id);
  // Fade in video, fade out shimmer
  if (vid) {
    vid.style.opacity = '1';
  }
  if (sh) {
    sh.style.transition = 'opacity .4s';
    sh.style.opacity = '0';
    setTimeout(() => sh.remove(), 420);
  }
}

function toggleReelPlay(id) {
  const video = document.getElementById('reel-vid-' + id);
  const icon = document.getElementById('reel-play-icon-' + id);
  const svg = document.getElementById('reel-play-svg-' + id);
  if (!video || video.dataset.noVideo) return;
  if (video.paused) {
    video.play();
    if (svg) svg.innerHTML = '<path d="M8 5v14l11-7z"/>';
    if (icon) { icon.style.opacity = '1'; setTimeout(() => { icon.style.opacity = '0'; }, 600); }
  } else {
    video.pause();
    if (svg) svg.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    if (icon) { icon.style.opacity = '1'; }
  }
}

function updateProgress(id) {
  const video = document.getElementById('reel-vid-' + id);
  const bar = document.getElementById('reel-progress-' + id);
  if (!video || !bar || !video.duration) return;
  const pct = (video.currentTime / video.duration) * 100;
  bar.value = pct;
  bar.style.background = `linear-gradient(to left, rgba(255,255,255,0.3) ${100-pct}%, white ${100-pct}%)`;
}

function seekVideo(id, value) {
  const video = document.getElementById('reel-vid-' + id);
  if (!video || !video.duration) return;
  video.currentTime = (value / 100) * video.duration;
}

function reelLike(id) {
  const myUid = localStorage.getItem('yadwor-uid') || '';
  if (!myUid) { showToast('سجّل دخولك أولاً'); return; }
  const post = state.posts.find(p => p.id === id);
  if (!post) return;
  if (!post.likedBy) post.likedBy = {};
  const wasLiked = !!post.likedBy[myUid];
  if (wasLiked) { delete post.likedBy[myUid]; }
  else { post.likedBy[myUid] = true; }
  const likesCount = Object.keys(post.likedBy).length;
  // تحديث DOM مباشرة
  const btn = document.getElementById('reel-like-btn-' + id);
  const svg = document.getElementById('reel-like-svg-' + id);
  const span = document.getElementById('reel-likes-' + id);
  const isLiked = !wasLiked;
  if (btn) btn.style.color = isLiked ? '#f43f5e' : 'white';
  if (svg) svg.setAttribute('fill', isLiked ? 'currentColor' : 'none');
  if (span) span.textContent = likesCount;
  // حفظ Firebase
  const db = firebase.database();
  if (wasLiked) {
    db.ref('posts/' + id + '/likedBy/' + myUid).remove().catch(() => {});
  } else {
    db.ref('posts/' + id + '/likedBy/' + myUid).set(true).catch(() => {});
    // إشعار صاحب المنشور
    if (post.uid && post.uid !== myUid) {
      const myName = localStorage.getItem('yadwor-settings-name') || 'شخص';
      saveInteractionNotif(post.uid, { type: 'like', fromUid: myUid, fromName: myName, postId: id, text: myName + ' أعجب بريلزك' });
    }
  }
}

function sharePost(id) { showToast('تم نسخ رابط المشاركة'); }

// ---- Comments ----
function openReelComments(postId) {
  currentReelCommentPostId = postId;
  document.getElementById('reel-comments-modal').classList.remove('hidden');
  const list = document.getElementById('reel-comments-list');
  list.innerHTML = '<div style="display:flex;justify-content:center;padding:20px;"><div style="width:32px;height:32px;border-radius:50%;border:3px solid rgba(255,255,255,0.2);border-top-color:white;animation:spin .8s linear infinite;"></div></div>';
  // إضافة CSS للـ spinner
  if (!document.getElementById('reel-spin-style')) {
    const s = document.createElement('style');
    s.id = 'reel-spin-style';
    s.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
    document.head.appendChild(s);
  }
  _renderReelComments(postId);
}

function closeReelComments() {
  document.getElementById('reel-comments-modal').classList.add('hidden');
  currentReelCommentPostId = null;
  cancelReelReply();
}

async function _renderReelComments(postId) {
  const list = document.getElementById('reel-comments-list');
  if (!list) return;
  const myUid = localStorage.getItem('yadwor-uid') || '';
  const comments = await fetchCommentsFromFirebase(postId);
  if (!comments.length) {
    list.innerHTML = '<p style="text-align:center;font-size:13px;color:rgba(255,255,255,0.5);padding:16px;">لا توجد تعليقات بعد. كن أول من يعلق!</p>';
    return;
  }
  list.innerHTML = comments.map(c => {
    const likedByMe = !!(c.likedBy || {})[myUid];
    const likeCount = Object.keys(c.likedBy || {}).length;
    const replies = (c.replies || []);
    const repliesHtml = replies.map((r, ri) => {
      const rLikedByMe = !!(r.likedBy || {})[myUid];
      const rLikeCount = Object.keys(r.likedBy || {}).length;
      return `<div style="display:flex;gap:8px;margin-top:8px;padding-right:12px;border-right:2px solid rgba(255,255,255,0.15);">
        <div style="width:28px;height:28px;border-radius:50%;overflow:hidden;background:#333;flex-shrink:0;">
          ${r.avatar ? `<img src="${r.avatar}" style="width:100%;height:100%;object-fit:cover;">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.4);font-size:10px;">👤</div>'}
        </div>
        <div style="flex:1;background:rgba(255,255,255,0.07);border-radius:12px;padding:8px 10px;">
          <p style="font-size:12px;font-weight:700;color:white;">${r.name || 'مجهول'}</p>
          <p style="font-size:12px;color:rgba(255,255,255,0.75);margin-top:2px;">${r.text || ''}</p>
          <div style="display:flex;align-items:center;gap:10px;margin-top:6px;">
            <span style="font-size:10px;color:rgba(255,255,255,0.4);">${formatTimeAgo(r.ts)}</span>
            <button onclick="likeReelReplyFb('${c.id}','${r.id}','${postId}')" style="display:flex;align-items:center;gap:3px;background:${rLikedByMe?'rgba(244,63,94,0.25)':'rgba(255,255,255,0.1)'};border:none;border-radius:20px;padding:2px 8px;cursor:pointer;color:${rLikedByMe?'#f43f5e':'rgba(255,255,255,0.6)'};font-size:11px;font-weight:700;">
              ♥ ${rLikeCount || ''}
            </button>
          </div>
        </div>
      </div>`;
    }).join('');

    return `<div style="background:rgba(255,255,255,0.08);border-radius:14px;padding:12px 14px;margin-bottom:8px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
        <div style="display:flex;gap:8px;flex:1;min-width:0;">
          <div style="width:32px;height:32px;border-radius:50%;overflow:hidden;background:#333;flex-shrink:0;">
            ${c.avatar ? `<img src="${c.avatar}" style="width:100%;height:100%;object-fit:cover;">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.4);font-size:11px;">👤</div>'}
          </div>
          <div style="flex:1;min-width:0;">
            <p style="font-size:13px;font-weight:700;color:white;">${c.name || 'مجهول'}</p>
            <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-top:1px;">${formatTimeAgo(c.ts)}</p>
          </div>
        </div>
      </div>
      <p style="font-size:13px;color:rgba(255,255,255,0.8);margin-top:6px;line-height:1.5;">${c.text || ''}</p>
      <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
        <button onclick="likeReelCommentFb('${c.id}','${postId}')" style="display:flex;align-items:center;gap:4px;background:${likedByMe?'rgba(244,63,94,0.25)':'rgba(255,255,255,0.1)'};border:none;border-radius:20px;padding:4px 10px;cursor:pointer;color:${likedByMe?'#f43f5e':'rgba(255,255,255,0.6)'};font-size:12px;font-weight:700;">
          ♥ ${likeCount || ''}
        </button>
        <button onclick="setReelReply('${postId}','${c.id}','${(c.name||'').replace(/'/g,"\\'")}' )" style="background:rgba(255,255,255,0.1);border:none;border-radius:20px;padding:4px 10px;cursor:pointer;color:rgba(255,255,255,0.6);font-size:12px;font-weight:700;">رد</button>
      </div>
      ${repliesHtml ? `<div style="margin-top:8px;">${repliesHtml}</div>` : ''}
    </div>`;
  }).join('');
}

async function likeReelCommentFb(commentId, postId) {
  const myUid = localStorage.getItem('yadwor-uid') || '';
  if (!myUid) { showToast('سجّل دخولك أولاً'); return; }
  try {
    const db = firebase.database();
    const likedPath = `comments/${postId}/${commentId}/likedBy/${myUid}`;
    const snap = await db.ref(likedPath).once('value');
    if (snap.val()) await db.ref(likedPath).remove();
    else await db.ref(likedPath).set(true);
  } catch(e) {}
  _renderReelComments(postId);
}

async function likeReelReplyFb(commentId, replyId, postId) {
  const myUid = localStorage.getItem('yadwor-uid') || '';
  if (!myUid) { showToast('سجّل دخولك أولاً'); return; }
  try {
    const db = firebase.database();
    const path = `comments/${postId}/${commentId}/replies`;
    const snap = await db.ref(path).once('value');
    const replies = snap.val() || [];
    const idx = replies.findIndex(r => r && r.id === replyId);
    if (idx === -1) return;
    if (!replies[idx].likedBy) replies[idx].likedBy = {};
    if (replies[idx].likedBy[myUid]) delete replies[idx].likedBy[myUid];
    else replies[idx].likedBy[myUid] = true;
    await db.ref(path).set(replies);
  } catch(e) {}
  _renderReelComments(postId);
}

// الدوال القديمة محتفظ بها للتوافق مع الكود القديم
function renderReelComments(postId) { _renderReelComments(postId); }
function likeReelComment(postId, commentId) { likeReelCommentFb(commentId, postId); }
function likeReelReply(postId, commentId, replyIndex) {}

function setReelReply(postId, commentId, author) {
  reelReplyTarget = { postId, commentId, author };
  const indicator = document.getElementById('reel-reply-indicator');
  const label = document.getElementById('reel-reply-label');
  if (indicator) indicator.classList.remove('hidden');
  if (label) label.textContent = `الرد على ${author}`;
  const input = document.getElementById('reel-comment-input');
  if (input) { input.placeholder = `الرد على ${author}...`; input.focus(); }
}

function cancelReelReply() {
  reelReplyTarget = null;
  const indicator = document.getElementById('reel-reply-indicator');
  if (indicator) indicator.classList.add('hidden');
  const input = document.getElementById('reel-comment-input');
  if (input) input.placeholder = 'أضف تعليقاً...';
}

async function submitReelComment() {
  const myUid = localStorage.getItem('yadwor-uid') || '';
  if (!myUid) { showToast('سجّل دخولك أولاً'); return; }
  const input = document.getElementById('reel-comment-input');
  const text = input?.value.trim();
  if (!text || !currentReelCommentPostId) return;
  input.value = '';
  const id = currentReelCommentPostId;

  if (reelReplyTarget && reelReplyTarget.postId === id) {
    // رد على تعليق
    const replyObj = {
      id:      'r_' + Date.now(),
      uid:     myUid,
      name:    localStorage.getItem('yadwor-settings-name') || 'مجهول',
      avatar:  localStorage.getItem('yadwor-avatar-preview') || '',
      text:    text,
      ts:      Date.now(),
      likedBy: {}
    };
    try {
      const db = firebase.database();
      const repliesPath = `comments/${id}/${reelReplyTarget.commentId}/replies`;
      const snap = await db.ref(repliesPath).once('value');
      const existing = snap.val() || [];
      existing.push(replyObj);
      await db.ref(repliesPath).set(existing);
    } catch(e) {}
    cancelReelReply();
    showToast('تم إرسال الرد');
    _renderReelComments(id);
    return;
  }

  // تعليق جديد
  const comment = {
    id:      'c_' + Date.now(),
    uid:     myUid,
    name:    localStorage.getItem('yadwor-settings-name') || 'مجهول',
    avatar:  localStorage.getItem('yadwor-avatar-preview') || '',
    text:    text,
    ts:      Date.now(),
    likedBy: {},
    replies: []
  };
  await saveCommentToFirebase(id, comment);
  // تحديث عداد التعليقات
  const post = state.posts.find(p => p.id === id);
  if (post) {
    post.commentCount = (post.commentCount || 0) + 1;
    updatePostInFirebase(id, { commentCount: post.commentCount });
    const countEl = document.getElementById('reel-comments-count-' + id);
    if (countEl) countEl.textContent = post.commentCount;
  }
  // إشعار صاحب المنشور
  if (post && post.uid && post.uid !== myUid) {
    const myName = localStorage.getItem('yadwor-settings-name') || 'شخص';
    await saveInteractionNotif(post.uid, { type: 'comment', fromUid: myUid, fromName: myName, postId: id, text: myName + ' علّق على ريلزك' });
  }
  showToast('تمت إضافة تعليقك');
  _renderReelComments(id);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement?.id === 'reel-comment-input') {
    submitReelComment();
  }
});
