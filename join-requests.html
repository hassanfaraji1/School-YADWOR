<script src="shared.js"></script>
<script>
const FB_JR_URL = 'https://a-comment-5a3e5-default-rtdb.firebaseio.com';
const FB_JR_KEY = 'AIzaSyAP-xRJ5zvHvMmqkkVvXnWdqwfuuj58CcA';

function isCurrentUserInstitution() {
  return (localStorage.getItem('yadwor-account-type') || 'influencer') === 'institution';
}

async function applyAccountTypeOnAcceptance(request) {
  const uid = localStorage.getItem('yadwor-uid');
  if (!uid || !request.uid || request.uid !== uid) return;
  const newType = request.role === 'teacher' ? 'teacher' : 'student';
  localStorage.setItem('yadwor-account-type', newType);
  state.profileType = newType;
  state.settingsAccountType = newType;
  try { const ru = getRealUser(); ru.accountType = newType; localStorage.setItem('yadwor-user-data', JSON.stringify(ru)); } catch(e) {}
  try {
    await fetch(`${FB_JR_URL}/users/${uid}.json?auth=${FB_JR_KEY}`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ accountType: newType, updatedAt: Date.now() })
    });
  } catch(e) {}
}

async function updateJoinRequestStatusInFirebase(id, status) {
  try {
    const myUid = localStorage.getItem('yadwor-uid') || '';
    await fetch(`${FB_JR_URL}/joinRequests/${myUid}/${id}.json?auth=${FB_JR_KEY}`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ status: status, updatedAt: Date.now() })
    });
  } catch(e) {}
}

async function loadJoinRequestsFromFirebase() {
  const myUid = localStorage.getItem('yadwor-uid') || '';
  if (!myUid) return null;
  try {
    const res = await fetch(`${FB_JR_URL}/joinRequests/${myUid}.json?auth=${FB_JR_KEY}`);
    if (!res.ok) return null;
    const data = await res.json();
    if (!data) return [];
    if (typeof data === 'object' && !Array.isArray(data)) return Object.values(data).filter(r => r && r.id);
    return [];
  } catch(e) { return null; }
}

// ────────────────────────────────────────────────────────────
// حذف تمارين ونتائج الأستاذ المُزال من Firebase + localStorage
// ────────────────────────────────────────────────────────────
async function deleteTeacherExamsAndResults(teacherUid, institutionUid) {
  if (!teacherUid || !institutionUid) return;
  try {
    // حذف الاختبارات من Firebase
    const examsRes = await fetch(`${FB_JR_URL}/exams.json?auth=${FB_JR_KEY}`);
    if (examsRes.ok) {
      const examsData = await examsRes.json();
      if (examsData && typeof examsData === 'object') {
        for (const [examId, exam] of Object.entries(examsData)) {
          if (!exam) continue;
          if (String(exam.teacherUid) === String(teacherUid) && String(exam.institutionUid) === String(institutionUid)) {
            await fetch(`${FB_JR_URL}/exams/${examId}.json?auth=${FB_JR_KEY}`, { method: 'DELETE' });
            await fetch(`${FB_JR_URL}/notifications/${examId}.json?auth=${FB_JR_KEY}`, { method: 'DELETE' });
          }
        }
      }
    }
    // حذف النتائج من Firebase
    const resultsRes = await fetch(`${FB_JR_URL}/results.json?auth=${FB_JR_KEY}`);
    if (resultsRes.ok) {
      const resultsData = await resultsRes.json();
      if (resultsData && typeof resultsData === 'object') {
        for (const [rId, result] of Object.entries(resultsData)) {
          if (!result) continue;
          if (String(result.teacherUid) === String(teacherUid) && String(result.institutionUid) === String(institutionUid)) {
            await fetch(`${FB_JR_URL}/results/${rId}.json?auth=${FB_JR_KEY}`, { method: 'DELETE' });
          }
        }
      }
    }
    // تنظيف localStorage
    try {
      const le = JSON.parse(localStorage.getItem('yadwor-exams') || '[]');
      localStorage.setItem('yadwor-exams', JSON.stringify(le.filter(e =>
        !(String(e.teacherUid) === String(teacherUid) && String(e.institutionUid) === String(institutionUid))
      )));
    } catch(e) {}
    try {
      const lr = JSON.parse(localStorage.getItem('yadwor-results') || '[]');
      localStorage.setItem('yadwor-results', JSON.stringify(lr.filter(r =>
        !(String(r.teacherUid) === String(teacherUid) && String(r.institutionUid) === String(institutionUid))
      )));
    } catch(e) {}
  } catch(e) { console.warn('deleteTeacherExamsAndResults:', e); }
}

function ensureDemoRequests() {
  try {
    const saved = localStorage.getItem('yadwor-join-requests');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length > 0) { state.joinRequests = parsed; return; }
    }
  } catch(e) {}
}

let mainTab = 'pending';
let memberFilter = 'students';
let selectedRequestId = null;
let selectedMemberId = null;

function setMainTab(tab) {
  mainTab = tab;
  document.getElementById('tab-pending').classList.toggle('hidden', tab !== 'pending');
  document.getElementById('tab-members').classList.toggle('hidden', tab !== 'members');
  document.getElementById('main-tab-pending').className = `flex-1 rounded-[12px] py-2.5 text-[13px] font-bold transition flex items-center justify-center gap-2 ${tab==='pending'?'tab-active':'tab-inactive'}`;
  document.getElementById('main-tab-members').className = `flex-1 rounded-[12px] py-2.5 text-[13px] font-bold transition flex items-center justify-center gap-2 ${tab==='members'?'tab-active':'tab-inactive'}`;
  if (tab === 'members') renderMembers(); else renderPending();
}

function setMemberFilter(f) {
  memberFilter = f;
  document.getElementById('mf-students').className = `flex-1 rounded-[14px] py-2.5 text-[13px] font-bold transition flex items-center justify-center gap-2 ${f==='students'?'mf-active':'mf-inactive'}`;
  document.getElementById('mf-teachers').className = `flex-1 rounded-[14px] py-2.5 text-[13px] font-bold transition flex items-center justify-center gap-2 ${f==='teachers'?'mf-active':'mf-inactive'}`;
  renderMembers();
}

function _roleIconSVG(isTeacher) {
  if (isTeacher) return `<svg viewBox="0 0 24 24" class="h-6 w-6 fill-none stroke-current" stroke-width="1.8" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`;
  return `<svg viewBox="0 0 24 24" class="h-6 w-6 fill-none stroke-current" stroke-width="1.8" stroke-linecap="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`;
}

function renderPending() {
  const pending = state.joinRequests.filter(r => r.status === 'pending');
  const badge = document.getElementById('pending-badge');
  if (badge) { badge.textContent = pending.length; badge.style.display = pending.length > 0 ? '' : 'none'; }
  const list = document.getElementById('pending-list');
  if (!pending.length) {
    list.innerHTML = `<div class="rounded-[22px] border border-dashed border-zinc-300 bg-white p-10 text-center">
      <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-zinc-100">
        <svg viewBox="0 0 24 24" class="h-7 w-7 fill-none stroke-zinc-400" stroke-width="1.6" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <p class="font-bold text-zinc-700">لا توجد طلبات جديدة</p>
      <p class="text-[13px] text-zinc-500 mt-1">ستظهر هنا الطلبات الجديدة عند إرسالها</p>
    </div>`;
    return;
  }
  list.innerHTML = pending.map(r => {
    const isTch = r.role === 'teacher';
    const clr = isTch ? 'emerald' : 'violet';
    const lbl = isTch ? 'أستاذ' : 'تلميذ';
    return `<div onclick="openRequestModal(${r.id})" class="cursor-pointer rounded-[22px] bg-white border border-zinc-200 p-4 shadow-sm hover:shadow-md hover:border-zinc-400 transition-all">
      <div class="flex items-center gap-3">
        <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl bg-${clr}-100 text-${clr}-600">${_roleIconSVG(isTch)}</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-0.5">
            <h3 class="font-extrabold text-[15px] truncate">${r.fullName}</h3>
            <span class="shrink-0 rounded-full bg-${clr}-100 text-${clr}-700 px-2 py-0.5 text-[10px] font-bold">${lbl}</span>
          </div>
          <p class="text-[12px] text-zinc-500">${r.levelName} · ${r.cycle}</p>
          <p class="text-[12px] text-zinc-600 mt-0.5">${r.subjects.length} مادة · ${r.total > 0 ? r.total + ' ' + (r.currency || 'درهم') : 'مجاناً'}</p>
        </div>
        <div class="flex flex-col items-end gap-2">
          <span class="rounded-full bg-amber-100 text-amber-700 px-2 py-1 text-[11px] font-bold">في الانتظار</span>
          <svg viewBox="0 0 24 24" class="h-4 w-4 fill-none stroke-zinc-400" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderMembers() {
  const accepted = state.joinRequests.filter(r => r.status === 'accepted' && (memberFilter === 'teachers' ? r.role === 'teacher' : r.role === 'student'));
  const list = document.getElementById('members-list');
  if (!accepted.length) {
    list.innerHTML = `<div class="rounded-[22px] border border-dashed border-zinc-300 bg-white p-10 text-center">
      <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-zinc-100">
        <svg viewBox="0 0 24 24" class="h-7 w-7 fill-none stroke-zinc-400" stroke-width="1.6" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <p class="font-bold text-zinc-700">لا يوجد أعضاء مقبولون بعد</p>
    </div>`;
    return;
  }
  list.innerHTML = accepted.map(r => {
    const isTch = r.role === 'teacher';
    const lbl = isTch ? 'أستاذ' : 'تلميذ';
    return `<div onclick="openMemberModal(${r.id})" class="cursor-pointer rounded-[22px] bg-white border border-zinc-200 p-4 shadow-sm hover:shadow-md hover:border-zinc-400 transition-all">
      <div class="flex items-center gap-3">
        <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl bg-zinc-100 text-zinc-600">${_roleIconSVG(isTch)}</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-0.5">
            <h3 class="font-extrabold text-[15px] truncate">${r.fullName}</h3>
            <span class="shrink-0 rounded-full bg-emerald-100 text-emerald-700 px-2 py-0.5 text-[10px] font-bold">عضو</span>
          </div>
          <p class="text-[12px] text-zinc-500">${r.levelName} · ${r.cycle}</p>
          <p class="text-[12px] text-zinc-600 mt-0.5">${r.subjects.length} مادة · <span class="font-bold">${lbl}</span></p>
        </div>
        <svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-zinc-400 shrink-0" stroke-width="1.8" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
      </div>
    </div>`;
  }).join('');
}

function _closeIcon() {
  return `<svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>`;
}

function openRequestModal(id) {
  selectedRequestId = id;
  const r = state.joinRequests.find(x => x.id === id);
  if (!r) return;
  const isTch = r.role === 'teacher';
  const clr = isTch ? 'emerald' : 'violet';
  const lbl = isTch ? 'أستاذ' : 'تلميذ';
  document.getElementById('request-modal-content').innerHTML = `
    <div class="mb-5 flex items-center justify-between">
      <div class="flex items-center gap-3">

          <h3 class="text-[18px] font-extrabold">${r.fullName}</h3>
          <span class="rounded-full bg-${clr}-100 text-${clr}-700 px-2 py-0.5 text-[11px] font-bold">${lbl}</span>

      </div>
      <button onclick="closeRequestModal()" class="flex h-10 w-10 items-center justify-center rounded-full hover:bg-zinc-100 text-zinc-500">${_closeIcon()}</button>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="rounded-[16px] bg-zinc-50 border border-zinc-200 p-3">
        <p class="text-[10px] font-bold text-zinc-500 mb-1">المستوى</p>
        <p class="text-[13px] font-extrabold">${r.levelName}</p>
        <p class="text-[11px] text-zinc-500">${r.cycle}</p>

      <div class="rounded-[16px] bg-zinc-50 border border-zinc-200 p-3">
        <p class="text-[10px] font-bold text-zinc-500 mb-1">المجموع</p>

      </div>
    </div>
    <div class="mb-4">
      <p class="mb-2 text-[13px] font-extrabold">المواد المختارة (${r.subjects.length})</p>
      <div class="grid grid-cols-2 gap-2">
        ${r.subjects.map(s => `<div class="rounded-[12px] border border-zinc-200 bg-white px-3 py-2 flex items-center justify-between gap-1">
          <span class="text-[12px] font-bold truncate">${s.name}</span>
          <span class="shrink-0 rounded-full ${s.free ? 'bg-emerald-100 text-emerald-700' : 'bg-violet-100 text-violet-700'} px-1.5 py-0.5 text-[10px] font-bold">${s.free ? 'مجاني' : s.price + ' ' + (r.currency || 'درهم')}</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="mb-5 flex items-center justify-between rounded-[16px] border border-zinc-200 bg-zinc-50 px-4 py-3">
      <div>
        <p class="text-[10px] font-bold text-zinc-500">رقم الهاتف (واتساب)</p>
        <p class="text-[14px] font-extrabold" style="direction:ltr;">${r.phone || 'غير محدد'}</p>
      </div>
      ${r.phone ? `<button onclick="copyPhone('${r.phone}')" class="flex items-center gap-1.5 rounded-full bg-zinc-900 text-white px-3 py-2 text-[12px] font-bold">
        <svg viewBox="0 0 24 24" class="h-3.5 w-3.5 fill-none stroke-current" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>نسخ
      </button>` : ''}
    </div>
    <div class="grid grid-cols-3 gap-2">
      <button onclick="acceptRequest(${r.id})" class="rounded-[14px] bg-emerald-500 text-white py-3 text-[13px] font-extrabold flex items-center justify-center gap-1">
        <svg viewBox="0 0 24 24" class="h-4 w-4 fill-none stroke-current" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>قبول
      </button>
      <button onclick="rejectRequest(${r.id})" class="rounded-[14px] bg-red-500 text-white py-3 text-[13px] font-extrabold flex items-center justify-center gap-1">
        <svg viewBox="0 0 24 24" class="h-4 w-4 fill-none stroke-current" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>رفض
      </button>
      <a href="messages.html" class="rounded-[14px] bg-zinc-900 text-white py-3 text-[13px] font-extrabold flex items-center justify-center gap-1">
        <svg viewBox="0 0 24 24" class="h-4 w-4 fill-none stroke-current" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>مراسلة
      </a>
    </div>`;
  document.getElementById('request-modal').classList.remove('hidden');
}

function closeRequestModal() {
  document.getElementById('request-modal').classList.add('hidden');
  selectedRequestId = null;
}

function openMemberModal(id) {

  const r = state.joinRequests.find(x => x.id === id);

  const isTch = r.role === 'teacher';
  const lbl = isTch ? 'أستاذ' : 'تلميذ';
  document.getElementById('member-modal-content').innerHTML = `
    <div class="mb-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-zinc-100 text-zinc-700">${_roleIconSVG(isTch)}</div>
        <div>
          <h3 class="text-[18px] font-extrabold">${r.fullName}</h3>
          <span class="rounded-full bg-emerald-100 text-emerald-700 px-2 py-0.5 text-[11px] font-bold">${lbl} مقبول</span>
        </div>
      </div>
      <button onclick="closeMemberModal()" class="flex h-10 w-10 items-center justify-center rounded-full hover:bg-zinc-100 text-zinc-500">${_closeIcon()}</button>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="rounded-[16px] bg-zinc-50 border border-zinc-200 p-3">
        <p class="text-[10px] font-bold text-zinc-500 mb-1">المستوى</p>
        <p class="text-[13px] font-extrabold">${r.levelName}</p>
        <p class="text-[11px] text-zinc-500">${r.cycle}</p>
      </div>
      <div class="rounded-[16px] bg-zinc-50 border border-zinc-200 p-3">
        <p class="text-[10px] font-bold text-zinc-500 mb-1">المواد</p>
        <p class="text-[15px] font-extrabold">${r.subjects.length} مادة</p>
      </div>
    </div>
    <div class="mb-4 flex flex-wrap gap-2">
      ${r.subjects.map(s => `<span class="rounded-full bg-zinc-900 text-white px-3 py-1 text-[12px] font-bold">${s.name}</span>`).join('')}
    </div>
    <div class="mb-5 flex items-center justify-between rounded-[16px] border border-zinc-200 bg-zinc-50 px-4 py-3">
      <div>
        <p class="text-[10px] font-bold text-zinc-500">رقم الهاتف</p>
        <p class="text-[14px] font-extrabold" style="direction:ltr;">${r.phone || 'غير محدد'}</p>
      </div>
      ${r.phone ? `<button onclick="copyPhone('${r.phone}')" class="flex items-center gap-1.5 rounded-full bg-zinc-900 text-white px-3 py-2 text-[12px] font-bold">
        <svg viewBox="0 0 24 24" class="h-3.5 w-3.5 fill-none stroke-current" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>نسخ
      </button>` : ''}
    </div>
    <div class="grid grid-cols-2 gap-3 mb-3">
      <a href="messages.html" class="rounded-[14px] bg-zinc-900 text-white py-3 text-[13px] font-extrabold flex items-center justify-center gap-1">
        <svg viewBox="0 0 24 24" class="h-4 w-4 fill-none stroke-current" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>مراسلة
      </a>
      <button onclick="banMember(${r.id})" class="rounded-[14px] border-2 border-orange-400 text-orange-600 py-3 text-[13px] font-extrabold flex items-center justify-center gap-1">
        <svg viewBox="0 0 24 24" class="h-4 w-4 fill-none stroke-current" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>حظر مؤقت
      </button>
    </div>
    <button onclick="confirmRemoveMember(${r.id})" class="w-full rounded-[14px] border-2 border-red-400 text-red-600 py-3 text-[13px] font-extrabold flex items-center justify-center gap-2">
      <svg viewBox="0 0 24 24" class="h-4 w-4 fill-none stroke-current" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      إزالة من المؤسسة
    </button>`;
  document.getElementById('member-modal').classList.remove('hidden');
}

function closeMemberModal() {
  document.getElementById('member-modal').classList.add('hidden');
  selectedMemberId = null;
}

function confirmRemoveMember(id) {
  document.getElementById('remove-confirm-modal').classList.remove('hidden');
  document.getElementById('remove-confirm-btn').onclick = () => {
    document.getElementById('remove-confirm-modal').classList.add('hidden');
    removeMember(id);
  };
}

async function acceptRequest(id) {
  const r = state.joinRequests.find(x => x.id === id);
  if (r) {
    r.status = 'accepted';
    await applyAccountTypeOnAcceptance(r);
    if (r.uid && r.uid !== localStorage.getItem('yadwor-uid')) {
      const newType = r.role === 'teacher' ? 'teacher' : 'student';
      const myInstUid = localStorage.getItem('yadwor-uid') || '';
      try {
        await fetch(`${FB_JR_URL}/users/${r.uid}.json?auth=${FB_JR_KEY}`, {
          method: 'PATCH', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ accountType: newType, profileType: newType, institutionUid: myInstUid, joinedInstitution: true, updatedAt: Date.now() })
        });
      } catch(e) {}
    }
  }
  try { localStorage.setItem('yadwor-join-requests', JSON.stringify(state.joinRequests)); } catch(e) {}
  await updateJoinRequestStatusInFirebase(id, 'accepted');
  closeRequestModal();
  showToast('تم قبول الطلب بنجاح');
  renderPending();
}

async function rejectRequest(id) {
  state.joinRequests = state.joinRequests.filter(x => x.id !== id);
  try { localStorage.setItem('yadwor-join-requests', JSON.stringify(state.joinRequests)); } catch(e) {}
  try {
    const rej = JSON.parse(localStorage.getItem('yadwor-rejected-request-ids') || '[]');
    if (!rej.includes(id)) rej.push(id);
    localStorage.setItem('yadwor-rejected-request-ids', JSON.stringify(rej));
  } catch(e) {}
  try {
    const myU = localStorage.getItem('yadwor-uid') || '';
    await fetch(`${FB_JR_URL}/joinRequests/${myU}/${id}.json?auth=${FB_JR_KEY}`, { method: 'DELETE' });
  } catch(e) {}
  closeRequestModal();
  showToast('تم رفض الطلب');
  renderPending();
}

async function removeMember(id) {
  const r = state.joinRequests.find(x => x.id === id);
  const myInstUid = localStorage.getItem('yadwor-uid') || '';

  // إذا كان المُزال أستاذاً → احذف تمارينه ونتائجه
  if (r && r.role === 'teacher' && r.uid) {
    await deleteTeacherExamsAndResults(r.uid, myInstUid);
  }

  state.joinRequests = state.joinRequests.filter(x => x.id !== id);
  try { localStorage.setItem('yadwor-join-requests', JSON.stringify(state.joinRequests)); } catch(e) {}

  if (r && r.uid) {
    try {
      await fetch(`${FB_JR_URL}/users/${r.uid}.json?auth=${FB_JR_KEY}`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ accountType: 'influencer', profileType: 'influencer', institutionUid: null, joinedInstitution: false, updatedAt: Date.now() })
      });
    } catch(e) {}
  }

  const myUid = localStorage.getItem('yadwor-uid');
  if (r && r.uid && r.uid === myUid) {
    localStorage.setItem('yadwor-account-type', 'influencer');
    localStorage.setItem('yadwor-profile-type', 'influencer');
    if (typeof state !== 'undefined') { state.profileType = 'influencer'; state.settingsAccountType = 'influencer'; }
    try { const ru = getRealUser(); ru.accountType = 'influencer'; localStorage.setItem('yadwor-user-data', JSON.stringify(ru)); } catch(e) {}
  }

  try { await fetch(`${FB_JR_URL}/joinRequests/${myInstUid}/${id}.json?auth=${FB_JR_KEY}`, { method: 'DELETE' }); } catch(e) {}
  try {
    const rej = JSON.parse(localStorage.getItem('yadwor-rejected-request-ids') || '[]');
    if (!rej.includes(id)) rej.push(id);
    localStorage.setItem('yadwor-rejected-request-ids', JSON.stringify(rej));
  } catch(e) {}

  closeMemberModal();
  showToast('تم إزالة العضو وحذف بياناته من المؤسسة');
  renderMembers();
}

async function banMember(id) {
  const r = state.joinRequests.find(x => x.id === id);
  if (r) r.status = 'banned';
  try { localStorage.setItem('yadwor-join-requests', JSON.stringify(state.joinRequests)); } catch(e) {}
  await updateJoinRequestStatusInFirebase(id, 'banned');
  closeMemberModal();
  showToast('تم حظر العضو مؤقتاً');
  renderMembers();
}

function copyPhone(phone) {
  navigator.clipboard.writeText(phone).then(() => showToast('تم نسخ رقم الهاتف')).catch(() => showToast('تعذر النسخ'));
}

function checkAccess() {
  if (state.profileType !== 'institution') {
    document.getElementById('tab-pending').innerHTML = `<div class="rounded-[22px] border border-zinc-200 bg-white p-8 text-center mt-4">
      <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-zinc-100">
        <svg viewBox="0 0 24 24" class="h-7 w-7 fill-none stroke-zinc-500" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h3 class="text-[17px] font-extrabold mb-2">هذه الصفحة للمؤسسات فقط</h3>
      <p class="text-[13px] text-zinc-500 mb-4">يجب أن يكون نوع حسابك مؤسسة لعرض طلبات الانضمام</p>
      <a href="profile.html" class="inline-block rounded-[14px] bg-zinc-900 text-white px-6 py-2.5 text-[13px] font-bold">العودة للملف الشخصي</a>
    </div>`;
  }
}

window.checkIfInstitutionCanJoin = function() {
  if (isCurrentUserInstitution()) {
    document.getElementById('inst-block-modal').classList.remove('hidden');
    return false;
  }
  return true;
};

async function initPage() {
  ensureDemoRequests();
  checkAccess();
  let rejectedIds = [];
  try { rejectedIds = JSON.parse(localStorage.getItem('yadwor-rejected-request-ids') || '[]'); } catch(e) {}
  const firebaseRequests = await loadJoinRequestsFromFirebase();
  if (firebaseRequests && firebaseRequests.length > 0) {
    const existingIds = new Set(state.joinRequests.map(r => r.id));
    firebaseRequests.forEach(r => {
      if (rejectedIds.includes(r.id)) return;
      if (!existingIds.has(r.id)) state.joinRequests.push(r);
      else { const ex = state.joinRequests.find(x => x.id === r.id); if (ex) ex.status = r.status; }
    });
    try { localStorage.setItem('yadwor-join-requests', JSON.stringify(state.joinRequests)); } catch(e) {}
  }
  renderPending();
  renderMembers();
}

initPage();
</script>
