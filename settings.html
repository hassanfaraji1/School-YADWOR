async function initSettings() {
  const uid = localStorage.getItem('yadwor-uid') || '';

    } catch(e) {}

  // Avatar — Firebase أولاً ثم localStorage ثم placeholder

    || '';

  if (avatarSrc) {

    avatarEl.onerror = () => { avatarEl.src = ''; avatarEl.style.display = 'none'; };
  } else {
    // Placeholder SVG إذا لا توجد صورة
    avatarEl.style.display = 'none';
    avatarEl.insertAdjacentHTML('afterend', `<div id="avatar-placeholder" class="h-16 w-16 rounded-full bg-zinc-200 flex items-center justify-center border-[3px] border-zinc-100 shadow-md"><svg viewBox="0 0 24 24" class="h-8 w-8 fill-none stroke-zinc-400" stroke-width="1.5"><path d="M20 21a8 8 0 0 0-16 0M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8"/></svg></div>`);
  }

  // Cover
  const coverSrc = (firebaseUser && firebaseUser.cover)
    || localStorage.getItem('yadwor-cover-preview')
    || '';
  const coverEl = document.getElementById('cover-preview-img');
  if (coverSrc) {
    coverEl.src = coverSrc;
    coverEl.onerror = () => { coverEl.style.display = 'none'; };
  } else {
    coverEl.style.display = 'none';
  }

  // Name
  const name = (firebaseUser && (firebaseUser.name || firebaseUser.displayName))
    || localStorage.getItem('yadwor-settings-name')
    || localStorage.getItem('yadwor-user-name')
    || '';
  document.getElementById('settings-name-input').value = name;
  document.getElementById('settings-name-display').textContent = name;

  // Account type

function handleAvatarChange(input) {
  const file = input.files[0]; if(!file) return;
  state._pendingAvatarFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    pendingAvatarSrc = e.target.result;
    document.getElementById('avatar-preview-img').src = pendingAvatarSrc;
    document.getElementById('save-photos-btn').classList.remove('hidden');
  };
  reader.readAsDataURL(file);
}

function handleCoverChange(input) {
  const file = input.files[0]; if(!file) return;
  state._pendingCoverFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    pendingCoverSrc = e.target.result;
    document.getElementById('cover-preview-img').src = pendingCoverSrc;
    document.getElementById('save-photos-btn').classList.remove('hidden');
  };
  reader.readAsDataURL(file);
}

async function uploadToCloudinary(dataUrlOrFile) {
  const CLOUD_NAME = 'dlujoziwz';
  const UPLOAD_PRESET = 'my_app_upload';
  const form = new FormData();
  if (dataUrlOrFile instanceof File || dataUrlOrFile instanceof Blob) {
    form.append('file', dataUrlOrFile);
  } else {
    const blob = await fetch(dataUrlOrFile).then(r => r.blob());
    form.append('file', blob);
  }
  form.append('upload_preset', UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: form });
  if (!res.ok) throw new Error('Upload HTTP error: ' + res.status);
  const data = await res.json();
  if (!data.secure_url) throw new Error('No URL in response');
  return data.secure_url;
}

      avatarUrl = state._pendingAvatarFile
        ? await uploadToCloudinary(state._pendingAvatarFile)
        : await uploadToCloudinary(pendingAvatarSrc);
    }
    if (pendingCoverSrc) {
      coverUrl = state._pendingCoverFile
        ? await uploadToCloudinary(state._pendingCoverFile)
        : await uploadToCloudinary(pendingCoverSrc);
    }
    commitUrls(avatarUrl, coverUrl);
    showToast('تم حفظ الصور بنجاح');
  } catch(e) {
    console.warn('Cloudinary upload failed:', e);
    // Fallback: use local data URLs
    commitUrls(pendingAvatarSrc, pendingCoverSrc);
    showToast('تم الحفظ (تعذر الرفع للسحابة)');
  }
}

async function saveUserProfileToFirebaseSettings() {
  const uid = localStorage.getItem('yadwor-uid');
  if (!uid) return;
  const t = state.profileType;
  const prof = profiles[t];
  const data = {
    name: state.settingsName,
    avatar: prof ? prof.avatar : state.settingsAvatarPreview,
    cover: prof ? prof.cover : state.settingsCoverPreview,
    accountType: localStorage.getItem('yadwor-account-type') || 'influencer',
    location: localStorage.getItem('yadwor-location') || '',
    country: localStorage.getItem('yadwor-country') || '',
    city: localStorage.getItem('yadwor-city') || '',
    updatedAt: Date.now()
  };
  try {
    await _sDb().ref('users/' + uid).update(data);
  } catch(e) { console.warn('Firebase profile save failed:', e); }
}

function saveName() {
  const name = document.getElementById('settings-name-input').value.trim();
  if (!name) { showToast('يرجى إدخال اسم'); return; }
  state.settingsName = name;
  // حفظ في جميع المفاتيح الممكنة لضمان التوافق
  localStorage.setItem('yadwor-settings-name', name);
  localStorage.setItem('yadwor-user-name', name);
  document.getElementById('settings-name-display').textContent = name;
  saveData();
  saveUserProfileToFirebaseSettings();
  showToast('تم حفظ الاسم');
}

// عند اختيار نوع حساب — يظهر زر الحفظ فقط إذا تغيّر النوع
function selectAccountType(type) {
  const currentType = localStorage.getItem('yadwor-account-type') || 'influencer';
  pendingAccountType = type;
  updateAccountTypeButtons(type);
  // أظهر زر الحفظ فقط إذا النوع الجديد مختلف عن الحالي
  const saveBtn = document.getElementById('save-account-type-btn');
  if (type !== currentType) {
    saveBtn.classList.remove('hidden');
  } else {
    saveBtn.classList.add('hidden');
    pendingAccountType = null;
  }
}

// حفظ نوع الحساب فعلياً في Firebase و localStorage
async function saveAccountType() {
  if (!pendingAccountType) return;
  const type = pendingAccountType;
  const saveBtn = document.getElementById('save-account-type-btn');
  saveBtn.disabled = true;
  saveBtn.innerHTML = '<svg class="inline h-4 w-4 mr-1 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> جاري الحفظ...';

  // حفظ في localStorage
  localStorage.setItem('yadwor-account-type', type);
  localStorage.setItem('yadwor-profile-type', type);  // مزامنة ضرورية
  state.profileType = type;
  state.settingsAccountType = type;

  // تحديث اسم النوع في الواجهة
  const typeLabels = {institution:'مؤسسة تعليمية', influencer:'مؤثر تعليمي', teacher:'أستاذ', student:'تلميذ'};
  document.getElementById('settings-type-display').textContent = typeLabels[type] || '';

  // تحديث بيانات المستخدم الحقيقي
  try {
    const ru = getRealUser();
    ru.accountType = type;
    localStorage.setItem('yadwor-user-data', JSON.stringify(ru));
  } catch(e) { console.warn(e); }

  // حفظ في Firebase
  const uid = localStorage.getItem('yadwor-uid');
  if (uid) {
    try {
      await _sDb().ref('users/' + uid).update({ accountType: type, updatedAt: Date.now() });
    } catch(e) { console.warn('Firebase accountType save failed:', e); }
  }

  saveData();
  pendingAccountType = null;
  saveBtn.classList.add('hidden');
  saveBtn.disabled = false;
  saveBtn.innerHTML = '<svg viewBox="0 0 24 24" class="inline h-4 w-4 mr-1 fill-none stroke-current mb-0.5" stroke-width="2" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> حفظ نوع الحساب';
  showToast('تم تحديث نوع الحساب بنجاح ✓');
}

function updateAccountTypeButtons(active) {
  // فقط institution و influencer تظهر في صفحة الإعدادات
  ['institution','influencer'].forEach(t => {
    const btn = document.getElementById('atype-' + t);
    if (!btn) return;
    btn.className = `rounded-[14px] border-2 py-3 text-[13px] font-bold transition ${t === active ? 'border-zinc-900 bg-zinc-900 text-white' : 'border-zinc-200 bg-white text-zinc-700 hover:border-zinc-400'}`;
  });
}

function setLanguage(lang) {
  localStorage.setItem('yadwor-language', lang);
  updateLangButtons(lang);
  showToast('تم تغيير اللغة');
}

function updateLangButtons(active) {
  ['ar','fr','en'].forEach(l => {
    const btn = document.getElementById('lang-' + l);
    if (!btn) return;
    btn.className = `rounded-[14px] border-2 py-3 text-[13px] font-bold transition ${l === active ? 'border-zinc-900 bg-zinc-900 text-white' : 'border-zinc-200 bg-white text-zinc-700 hover:border-zinc-400'}`;
  });
}

function saveNotifSettings() {
  const settings = {
    comments: document.getElementById('notif-comments').checked,
    followers: document.getElementById('notif-followers').checked,
    messages: document.getElementById('notif-messages').checked,
    join: document.getElementById('notif-join').checked,
  };
  localStorage.setItem('yadwor-notif-settings', JSON.stringify(settings));
  showToast('تم حفظ إعدادات الإشعارات');
}

function savePrivacySettings() {
  const settings = {
    private: document.getElementById('privacy-private').checked,
    hideFollowers: document.getElementById('privacy-hide-followers').checked,
  };
  localStorage.setItem('yadwor-privacy-settings', JSON.stringify(settings));
  showToast('تم حفظ إعدادات الخصوصية');
}

function doLogout() {
  localStorage.removeItem('yadwor-logged-in');
  window.location.replace('index.html');
}

initSettings();
</script>
