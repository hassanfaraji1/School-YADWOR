<style>
  * { box-sizing: border-box; }
  body { font-family: 'Tajawal', system-ui, sans-serif; background: #faf8f6; color: #18181b; }
  input:focus, select:focus, textarea:focus { outline: none; }
  .shimmer { animation: shimmer 1.5s infinite; background: linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size: 200% 100%; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#18181b; color:white; padding:8px 18px; border-radius:999px; font-size:13px; font-weight:700; z-index:9999; pointer-events:none; opacity:0; transition:opacity .2s; }
  .toast.show { opacity:1; }
  #sidebar-panel { transition: transform .25s cubic-bezier(.4,0,.2,1); transform: translateX(100%); }
  #sidebar-panel.open { transform: translateX(0); }

  /* Tab styles */
  .tab-btn { transition: all .2s; }
  .tab-btn.active { background: #18181b; color: #fff; }
  .tab-btn:not(.active) { background: #f4f4f5; color: #71717a; }

  /* Question type selector */
  .qtype-btn { transition: all .15s; cursor: pointer; }
  .qtype-btn.selected { border-color: #18181b !important; background: #18181b !important; color: #fff !important; }

  /* Draggable connector */
  .connect-item { user-select: none; cursor: pointer; }
  .connect-item.selected-left { background: #3b82f6 !important; color: white !important; }
  .connect-item.selected-right { background: #10b981 !important; color: white !important; }

  /* Quiz fullscreen overlay */
  #quiz-overlay { z-index: 9998; }

  /* Timer animation */
  @keyframes timerPulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .timer-warning { animation: timerPulse .8s infinite; color: #ef4444 !important; }

  /* Results chart bar */
  .result-bar { transition: width .6s cubic-bezier(.4,0,.2,1); }

  /* Smooth page transitions */
  .page-enter { animation: fadeIn .25s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>

<script>
// ============================================================
//  YADWOR – إدارة التمارين والاختبارات
// ============================================================

// ---- State ----
let mainTab = 'create';
let currentExam = {
  type: 'تمرين',
  title: '',
  duration: '24h',
  levelId: '',
  subject: '',
  questions: []
};
let currentQuestion = {
  qtype: 'truefalse',
  text: '',
  correctAnswer: null,
  choices: ['', '', '', ''],
  fillAnswer: '',
  matchLeft: ['', '', ''],
  matchRight: ['', '', ''],
  matchPairs: [],
  imageSrc: null,
  imageQuestion: '',
  imageMode: 'choice',
  imageChoices: ['', '', ''],
  imageCorrect: null,
  points: 1,
  time: 30
};

// ============================================================
//  دوال المطابقة المنطقية
// ============================================================

// تحقق من أحقية التلميذ في رؤية تمرين (نفس المؤسسة + نفس المستوى + المادة موجودة في مواده)
function canStudentSeeExercise(student, exercise) {
  if (!student || !exercise) return false;
  const studentInstUid = student.institutionUid || student.institutionId || '';
  const examInstUid    = exercise.institutionUid || '';
  const sameInstitution = !examInstUid || (studentInstUid !== '' && studentInstUid === examInstUid);
  const studentLevelId  = student.levelId || '';
  const examLevelId     = exercise.levelId || '';
  const sameLevel = !examLevelId || (studentLevelId !== '' && studentLevelId === examLevelId);
  const studentSubjectNames = (student.subjects || []).map(s => (s.name || s).trim());
  const examSubject = (exercise.subject || '').trim();
  const subjectMatch = !examSubject || studentSubjectNames.includes(examSubject);
  return sameInstitution && sameLevel && subjectMatch;
}

// تحقق من مطابقة التلميذ مع الأستاذ (نفس المؤسسة + نفس المستوى + مادة الأستاذ في مواد التلميذ)
function isStudentMatchingTeacher(student, teacher) {
  if (!student || !teacher) return false;
  const sameInstitution =
    (student.institutionUid || student.institutionId || '') !== '' &&
    (teacher.institutionUid || teacher.institutionId || '') !== '' &&
    (student.institutionUid || student.institutionId) === (teacher.institutionUid || teacher.institutionId);
  const sameLevel =
    (student.levelId || '') !== '' &&
    (teacher.levelId || '') !== '' &&
    student.levelId === teacher.levelId;
  const studentSubjectNames = (student.subjects || []).map(s => (s.name || s).trim());
  const teacherSubject = (teacher.subject || '').trim();
  const subjectMatch = teacherSubject !== '' && studentSubjectNames.includes(teacherSubject);
  return sameInstitution && sameLevel && subjectMatch;
}

// ---- Firebase & Local data ----
const _FB  = 'https://a-comment-5a3e5-default-rtdb.firebaseio.com';
const _KEY = 'AIzaSyAP-xRJ5zvHvMmqkkVvXnWdqwfuuj58CcA';

// cache للاختبارات المجلوبة من Firebase
let _examsCacheLoaded = false;
let _examsCache = [];

// جلب الاختبارات من Firebase
async function fetchExamsFromFirebase() {
  try {
    const res = await fetch(`${_FB}/exams.json?auth=${_KEY}`);
    if (!res.ok) return null;
    const data = await res.json();
    if (!data) return [];
    return Object.values(data).filter(e => e && e.id);
  } catch(e) { return null; }
}

function getExams() {
  if (_examsCacheLoaded) return [..._examsCache];
  try { return JSON.parse(localStorage.getItem('yadwor-exams') || '[]'); } catch(e) { return []; }
}

function saveExams(list) {
  _examsCache = list;
  _examsCacheLoaded = true;
  // احتفظ بـ localStorage كـ fallback فقط
  try { localStorage.setItem('yadwor-exams', JSON.stringify(list)); } catch(e) {}
}

async function deleteExamFromFirebase(examId) {
  try {
    await fetch(`${_FB}/exams/${examId}.json?auth=${_KEY}`, { method: 'DELETE' });
  } catch(e) {}
}

function getPendingQuestions() {
  try { return JSON.parse(localStorage.getItem('yadwor-pending-questions') || '[]'); } catch(e) { return []; }
}
function savePendingQuestions(list) {
  localStorage.setItem('yadwor-pending-questions', JSON.stringify(list));
  updatePendingBadge();
}
function getResults() {
  try { return JSON.parse(localStorage.getItem('yadwor-results') || '[]'); } catch(e) { return []; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function updatePendingBadge() {
  const pq = getPendingQuestions();
  const badge = document.getElementById('pending-count-badge');
  if (badge) badge.textContent = pq.length > 0 ? `(${pq.length})` : '';
}

// ---- Sidebar ----
function openSidebar() {
  document.getElementById('sidebar-overlay').classList.remove('hidden');
  document.getElementById('sidebar-panel').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar-overlay').classList.add('hidden');
  document.getElementById('sidebar-panel').classList.remove('open');
}
function doLogout() {
  localStorage.removeItem('yadwor-logged-in');
  window.location.replace('index.html');
}

// ---- Main Tab ----
function setMainTab(tab) {
  mainTab = tab;
  ['create','publish','edit'].forEach(t => {
    const btn = document.getElementById('mtab-' + t);
    if (btn) {
      btn.classList.toggle('active', t === tab);
    }
  });
  renderMainContent();
}

function renderMainContent() {
  const el = document.getElementById('main-content');
  el.innerHTML = '';
  el.className = 'mx-auto max-w-[760px] px-3 pb-28 pt-4 page-enter';
  if (mainTab === 'create') renderCreate();
  else if (mainTab === 'publish') renderPublish();
  else renderEdit();
}

// ============================================================
//  TAB 1: إنشاء
// ============================================================

// ---- جلب بيانات المستخدم الحالي (نوع الحساب + بيانات انضمامه) ----
// نسخة متزامنة (للاستخدام الفوري) تعتمد على state المحلي المحدَّث
function _getMyAccountInfo() {
  const myUid  = localStorage.getItem('yadwor-uid') || '';
  const myType = localStorage.getItem('yadwor-account-type') || localStorage.getItem('yadwor-profile-type') || 'influencer';
  // أولاً: ابحث في state.joinRequests إن وُجد (تم تحميله من Firebase)
  const allReqs = (typeof state !== 'undefined' && state.joinRequests)
    ? state.joinRequests
    : (() => { try { return JSON.parse(localStorage.getItem('yadwor-join-requests') || '[]'); } catch(e) { return []; } })();
  const myReq = allReqs.find(r => r.status === 'accepted' && (r.uid === myUid || r.userId === myUid));
  return { myUid, myType, myReq };
}

// ---- جلب بيانات الانضمام من Firebase (async) ----
async function _fetchMyAccountInfoFromFirebase() {
  const myUid  = localStorage.getItem('yadwor-uid') || '';
  const myType = localStorage.getItem('yadwor-account-type') || localStorage.getItem('yadwor-profile-type') || 'influencer';
  const FB  = 'https://a-comment-5a3e5-default-rtdb.firebaseio.com';
  const KEY = 'AIzaSyAP-xRJ5zvHvMmqkkVvXnWdqwfuuj58CcA';
  if (!myUid) return { myUid, myType, myReq: null };
  try {
    const res = await fetch(`${FB}/joinRequests.json?auth=${KEY}`);
    if (!res.ok) return { myUid, myType, myReq: _getMyAccountInfo().myReq };
    const allInstitutions = await res.json();
    if (!allInstitutions) return { myUid, myType, myReq: null };
    for (const instUid of Object.keys(allInstitutions)) {
      const instReqs = allInstitutions[instUid];
      if (!instReqs) continue;
      const found = Object.values(instReqs).find(r =>
        r && r.status === 'accepted' && (r.uid === myUid || r.userId === myUid)
      );
      if (found) {
        // حفظ في localStorage للاستخدام الفوري لاحقاً
        const local = (() => { try { return JSON.parse(localStorage.getItem('yadwor-join-requests') || '[]'); } catch(e) { return []; } })();
        if (!local.find(r => r.id === found.id)) { local.push(found); localStorage.setItem('yadwor-join-requests', JSON.stringify(local)); }
        return { myUid, myType, myReq: found };
      }
    }
    return { myUid, myType, myReq: null };
  } catch(e) {
    return { myUid, myType, myReq: _getMyAccountInfo().myReq };
  }
}

// ---- بناء قسم المستوى والمادة حسب نوع الحساب ----
function _buildLevelSubjectSection() {
  const { myType, myReq } = _getMyAccountInfo();

  // ── حساب الأستاذ: المستوى والمادة محددان تلقائياً من طلب انضمامه ──
  if (myType === 'teacher') {
    if (!myReq) {
      return `<div class="rounded-[14px] bg-amber-50 border border-amber-200 p-4 text-center">
        <p class="text-[13px] font-bold text-amber-700">⚠️ لم تنضم لأي مؤسسة بعد. انضم لمؤسسة أولاً لتتمكن من نشر اختبارات.</p>
      </div>`;
    }
    // استخدم المستوى والمادة من طلب الانضمام
    const levelName = myReq.levelName || myReq.levelId || '';
    const subjectsList = (myReq.subjects || []).map(s => s.name || s).filter(Boolean);
    const subjectName  = subjectsList[0] || '';
    // احفظ تلقائياً في currentExam
    currentExam.levelId = myReq.levelId || myReq.levelName || '';
    currentExam.subject = subjectName;
    return `
    <div class="rounded-[14px] bg-indigo-50 border border-indigo-200 p-4 space-y-2">
      <p class="text-[11px] font-extrabold text-indigo-500 uppercase tracking-wide">بياناتك التعليمية (تُملأ تلقائياً)</p>
      <div class="flex items-center gap-3">
        <div class="flex-1 rounded-[10px] bg-white border border-indigo-100 px-3 py-2.5">
          <p class="text-[10px] text-zinc-400 font-bold mb-0.5">المستوى الدراسي</p>
          <p class="text-[14px] font-extrabold text-zinc-900">${levelName || '—'}</p>
        </div>
        <div class="flex-1 rounded-[10px] bg-white border border-indigo-100 px-3 py-2.5">
          <p class="text-[10px] text-zinc-400 font-bold mb-0.5">المادة</p>
          <p class="text-[14px] font-extrabold text-zinc-900">${subjectName || '—'}</p>
        </div>
      </div>
      ${subjectsList.length > 1 ? `
      <div>
        <p class="text-[11px] font-bold text-indigo-600 mb-1">اختر المادة التي تريد استهدافها:</p>
        <div class="flex flex-wrap gap-2">
          ${subjectsList.map(s => `<button type="button" onclick="selectTeacherSubject('${s}')" id="tsubj-${s.replace(/\s/g,'_')}"
            class="rounded-full px-3 py-1.5 text-[12px] font-bold border-2 transition
            ${currentExam.subject === s ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-zinc-700 border-zinc-200'}">${s}</button>`).join('')}
        </div>
      </div>` : ''}
    </div>`;
  }

  // ── حساب المؤسسة: تختار من المستويات والمواد التي أضافتها في الكتالوج ──
  if (myType === 'institution') {
    const catV3 = (() => { try { return JSON.parse(localStorage.getItem('yadwor-catalog-v3') || '{}'); } catch(e) { return {}; } })();
    const enabledLevelIds = (() => { try { return JSON.parse(localStorage.getItem('yadwor-enabled-levels') || 'null'); } catch(e) { return null; } })();
    const customLevels = (() => { try { return JSON.parse(localStorage.getItem('yadwor-custom-levels') || '[]'); } catch(e) { return []; } })();
    const allLevelNames = {
      '1p':'الأولى ابتدائي','2p':'الثانية ابتدائي','3p':'الثالثة ابتدائي','4p':'الرابعة ابتدائي',
      '5p':'الخامسة ابتدائي','6p':'السادسة ابتدائي','1c':'الأولى إعدادي','2c':'الثانية إعدادي',
      '3c':'الثالثة إعدادي','tc':'الجذع المشترك','1b':'الأولى باكالوريا','2b':'الثانية باكالوريا'
    };
    customLevels.forEach(l => { allLevelNames[l.id] = l.name; });

    // المستويات المفعّلة في الكتالوج
    const catalogLevelIds = Object.keys(catV3).filter(lid => {
      const lvl = catV3[lid];
      return lvl && lvl.subjects && lvl.subjects.some(s => s.enabled !== false);
    });
    const activeLevelIds = enabledLevelIds
      ? catalogLevelIds.filter(lid => enabledLevelIds.includes(lid))
      : catalogLevelIds;

    if (!activeLevelIds.length) {
      return `<div class="rounded-[14px] bg-amber-50 border border-amber-200 p-4 text-center">
        <p class="text-[13px] font-bold text-amber-700">⚠️ لم تضف أي مستويات أو مواد بعد. أضفها من <a href="catalog.html" class="underline">إدارة المواد</a> أولاً.</p>
      </div>`;
    }

    // المواد للمستوى المختار
    const activeSubjects = currentExam.levelId
      ? ((catV3[currentExam.levelId] || {}).subjects || []).filter(s => s.enabled !== false).map(s => s.name)
      : [];

    return `
    <div>
      <label class="text-[12px] font-bold text-zinc-500 mb-1.5 block">المستوى الدراسي</label>
      <select id="exam-level" onchange="onInstitutionLevelChange(this.value)"
        class="w-full rounded-[12px] border border-zinc-200 bg-zinc-50 px-4 py-3 text-[14px]">
        <option value="">اختر المستوى</option>
        ${activeLevelIds.map(lid => `<option value="${lid}" ${currentExam.levelId === lid ? 'selected' : ''}>${allLevelNames[lid] || lid}</option>`).join('')}
      </select>
    </div>
    ${currentExam.levelId ? `
    <div>
      <label class="text-[12px] font-bold text-zinc-500 mb-1.5 block">المادة الدراسية</label>
      ${activeSubjects.length ? `
      <div class="flex flex-wrap gap-2">
        ${activeSubjects.map(s => `<button type="button" onclick="selectInstitutionSubject('${s}')" id="isubj-${s.replace(/\s/g,'_')}"
          class="rounded-full px-3 py-1.5 text-[12px] font-bold border-2 transition
          ${currentExam.subject === s ? 'bg-zinc-900 text-white border-zinc-900' : 'bg-white text-zinc-700 border-zinc-200'}">${s}</button>`).join('')}
      </div>` : `<p class="text-[12px] text-zinc-400">لا توجد مواد مفعّلة لهذا المستوى</p>`}
    </div>` : ''}`;
  }

  // ── حسابات أخرى (مؤثر / مستخدم): حقل نصي عادي ──
  return `
  <div>
    <label class="text-[12px] font-bold text-zinc-500 mb-1.5 block">المستوى الدراسي</label>
    <select id="exam-level" onchange="currentExam.levelId=this.value"
      class="w-full rounded-[12px] border border-zinc-200 bg-zinc-50 px-4 py-3 text-[14px]">
      <option value="">اختر المستوى</option>
      ${Object.entries({'1p':'الأولى ابتدائي','2p':'الثانية ابتدائي','3p':'الثالثة ابتدائي','4p':'الرابعة ابتدائي','5p':'الخامسة ابتدائي','6p':'السادسة ابتدائي','1c':'الأولى إعدادي','2c':'الثانية إعدادي','3c':'الثالثة إعدادي','tc':'الجذع المشترك','1b':'الأولى باكالوريا','2b':'الثانية باكالوريا'}).map(([v,n])=>`<option value="${v}" ${currentExam.levelId===v?'selected':''}>${n}</option>`).join('')}
    </select>
  </div>
  <div>
    <label class="text-[12px] font-bold text-zinc-500 mb-1.5 block">المادة الدراسية</label>
    <input id="exam-subject" value="${currentExam.subject}" placeholder="مثال: الرياضيات"
      oninput="currentExam.subject=this.value"
      class="w-full rounded-[12px] border border-zinc-200 bg-zinc-50 px-4 py-3 text-[14px]" />
  </div>`;
}

// Helpers
function setTFAnswer(val) {
  currentQuestion.correctAnswer = val;
  ['true','false'].forEach(k => {
    const btn = document.getElementById('tf-'+k);
    if (btn) btn.classList.toggle('selected', (k==='true') === val);
  });
}
function setCorrectChoice(i) {
  currentQuestion.correctAnswer = i;
  renderQuestionForm();
}
function addChoice() {
  currentQuestion.choices.push('');
  renderQuestionForm();
}
function addMatchRow() {
  currentQuestion.matchLeft.push('');
  currentQuestion.matchRight.push('');
  renderQuestionForm();
}
function setImageMode(mode) {
  currentQuestion.imageMode = mode;
  renderQuestionForm();
}
function setImageCorrect(i) {
  currentQuestion.imageCorrect = i;
  renderQuestionForm();
}
function handleQuestionImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentQuestion.imageSrc = e.target.result;
    renderQuestionForm();
  };
  reader.readAsDataURL(file);
}

function addQuestion() {
  const qt = currentQuestion.qtype;
  if (!currentQuestion.text.trim() && qt !== 'image') { showToast('اكتب نص السؤال'); return; }
  if (qt === 'truefalse' && currentQuestion.correctAnswer === null) { showToast('حدد الجواب الصحيح (صح أو خطأ)'); return; }
  if (qt === 'multichoice') {
    const filled = currentQuestion.choices.filter(c => c.trim());
    if (filled.length < 2) { showToast('أضف خيارين على الأقل'); return; }
    if (currentQuestion.correctAnswer === null) { showToast('حدد الخيار الصحيح'); return; }
  }
  if (qt === 'fill' && !currentQuestion.fillAnswer.trim()) { showToast('أدخل الجواب الصحيح'); return; }
  if (qt === 'image' && !currentQuestion.imageSrc) { showToast('أرفق صورة للسؤال'); return; }

  const pq = getPendingQuestions();
  pq.push({ ...JSON.parse(JSON.stringify(currentQuestion)), id: Date.now() });
  savePendingQuestions(pq);

  // Reset question
  currentQuestion = { qtype: 'truefalse', text: '', correctAnswer: null, choices: ['','','',''],
    fillAnswer: '', matchLeft: ['','',''], matchRight: ['','',''], matchPairs: [],
    imageSrc: null, imageQuestion: '', imageMode: 'choice', imageChoices: ['','',''],
    imageCorrect: null, points: 1, time: 30 };

  showToast('✓ تم إضافة السؤال');
  renderCreate();
}

  const el = document.getElementById('main-content');
  const pq = getPendingQuestions();

  if (!pq.length) {
    el.innerHTML = `
    <div class="flex flex-col items-center justify-center py-20 text-center gap-3">
      <div class="h-16 w-16 rounded-full bg-zinc-100 flex items-center justify-center">
        <svg viewBox="0 0 24 24" class="h-8 w-8 fill-none stroke-zinc-400" stroke-width="1.6" stroke-linecap="round">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/>
        </svg>
      </div>
      <p class="text-[14px] font-bold text-zinc-400">لا توجد أسئلة بعد</p>
      <p class="text-[12px] text-zinc-400">أضف أسئلة من تبويب "إنشاء" ثم انشرها هنا</p>
      <button onclick="setMainTab('create')" class="mt-2 rounded-[12px] bg-zinc-900 px-6 py-3 text-[13px] font-bold text-white">إنشاء سؤال</button>
    </div>`;
    return;
  }

  el.innerHTML = `
  <div class="space-y-3">
    <div class="rounded-[16px] bg-amber-50 border border-amber-200 p-3 flex items-start gap-2">
      <span class="text-lg">📋</span>
      <p class="text-[12px] text-amber-700 font-bold leading-relaxed">
        لديك ${pq.length} سؤال جاهز. راجعها ثم اضغط "نشر الاختبار" لإرساله للتلاميذ.
      </p>
    </div>
    ${pq.map((q, i) => renderQuestionPreviewCard(q, i)).join('')}
    <button onclick="publishExam()" class="h-14 w-full rounded-[16px] bg-zinc-900 text-[15px] font-extrabold text-white shadow-lg mt-2">
      🚀 نشر الاختبار (${pq.length} سؤال)
    </button>
    <button onclick="clearPending()" class="h-10 w-full rounded-[14px] bg-red-50 text-[13px] font-bold text-red-600 border border-red-200">
      🗑 حذف جميع الأسئلة
    </button>
  </div>`;
}

function renderQuestionPreviewCard(q, i) {
  const typeLabels = { truefalse:'صح/خطأ', multichoice:'اختيار متعدد', fill:'ملء الفراغ', match:'ربط', image:'صورة' };
  return `
  <div class="rounded-[16px] bg-white border border-zinc-100 shadow-sm p-4">
    <div class="flex items-center justify-between mb-2">
      <span class="text-[10px] font-bold text-zinc-400 bg-zinc-100 rounded-full px-2 py-1">${typeLabels[q.qtype]||q.qtype}</span>
      <div class="flex items-center gap-3">
        <span class="text-[11px] text-zinc-400">⏱ ${q.time}ث</span>
        <span class="text-[11px] text-zinc-400">⭐ ${q.points} نقطة</span>
        <button onclick="removeQuestion(${i})" class="text-red-400 text-[11px] font-bold">حذف</button>
      </div>
    </div>
    <p class="text-[14px] font-bold leading-relaxed text-zinc-800">${q.text || '(سؤال صورة)'}</p>
    ${q.qtype==='image' && q.imageSrc ? `<img src="${q.imageSrc}" class="mt-2 h-24 object-contain rounded-[8px]" />` : ''}
  </div>`;
}

function removeQuestion(i) {
  const pq = getPendingQuestions();
  pq.splice(i, 1);
  savePendingQuestions(pq);
  renderPublish();
}

function clearPending() {
  if (!confirm('هل تريد حذف جميع الأسئلة؟')) return;
  savePendingQuestions([]);
  renderPublish();
}

function publishExam() {
  const pq = getPendingQuestions();
  if (!pq.length) { showToast('لا توجد أسئلة للنشر'); return; }

  const { myUid, myType, myReq } = _getMyAccountInfo();

  // ── للأستاذ: تأكد من وجود بيانات الانضمام ──
  if (myType === 'teacher') {
    if (!myReq) { showToast('يجب أن تنضم لمؤسسة أولاً لنشر اختبار'); return; }
    // تعبئة تلقائية من بيانات الانضمام
    if (!currentExam.levelId) currentExam.levelId = myReq.levelId || myReq.levelName || '';
    if (!currentExam.subject) currentExam.subject = (myReq.subjects?.[0]?.name || myReq.subjects?.[0] || '');
  }

  if (!currentExam.levelId) { showToast('يرجى اختيار المستوى الدراسي'); return; }
  if (!currentExam.subject || !currentExam.subject.trim()) { showToast('يرجى تحديد المادة الدراسية'); return; }

  const durationMap = {'1h':3600,'2h':7200,'4h':14400,'8h':28800,'12h':43200,'24h':86400,'48h':172800,'72h':259200,'1w':604800};
  const durationSec = durationMap[currentExam.duration] || 86400;

  // institutionUid: المؤسسة = uid نفسها / الأستاذ = uid المؤسسة التي قبلته
  const institutionUid = myType === 'institution'
    ? myUid
    : (myReq ? (myReq.institutionUid || myReq.institutionId || '') : '');

  const exam = {
    id: Date.now(),
    type: currentExam.type,
    title: currentExam.title || `${currentExam.type} – ${new Date().toLocaleDateString('ar-MA')}`,
    duration: currentExam.duration,
    levelId: currentExam.levelId,
    subject: currentExam.subject.trim(),
    expiresAt: Date.now() + durationSec * 1000,
    questions: pq,
    publishedAt: Date.now(),
    teacherUid: myUid || 'teacher',
    institutionUid: institutionUid
  };

  const exams = getExams();
  exams.push(exam);
  saveExams(exams);
  savePendingQuestions([]);

  // ── حفظ الاختبار في Firebase ──
  try {
    const FB  = 'https://a-comment-5a3e5-default-rtdb.firebaseio.com';
    const KEY = 'AIzaSyAP-xRJ5zvHvMmqkkVvXnWdqwfuuj58CcA';
    const myName = localStorage.getItem('yadwor-settings-name') || localStorage.getItem('yadwor-user-name') || 'أستاذ';
    fetch(`${FB}/exams/${exam.id}.json?auth=${KEY}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(exam)
    }).catch(()=>{});
    fetch(`${FB}/notifications/${exam.id}.json?auth=${KEY}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        id: exam.id, type: 'exam', examType: exam.type,
        title: exam.title, subject: exam.subject, levelId: exam.levelId,
        teacherUid: exam.teacherUid, teacherName: myName,
        institutionUid: exam.institutionUid,
        publishedAt: exam.publishedAt, expiresAt: exam.expiresAt,
        text: `نشر ${myName} ${exam.type}: ${exam.title}`,
        unread: true
      })
    }).catch(()=>{});
  } catch(e) {}

  // Reset exam meta (احتفظ بالمستوى والمادة للأستاذ لأنهما ثابتان)
  currentExam = {
    type: 'تمرين', title: '', duration: '24h',
    levelId: myType === 'teacher' ? currentExam.levelId : '',
    subject:  myType === 'teacher' ? currentExam.subject  : '',
    questions: []
  };

  showToast(`✓ تم نشر ${exam.type} بنجاح`);
  setMainTab('edit');
}

// ============================================================
//  TAB 3: تعديل
// ============================================================
function renderEdit() {
  const el = document.getElementById('main-content');
  // عرض shimmer أثناء التحميل
  el.innerHTML = `<div class="space-y-3">${[1,2].map(()=>`
    <div class="rounded-[16px] bg-white border border-zinc-100 shadow-sm p-4">
      <div class="shimmer h-4 w-24 rounded-full mb-3"></div>
      <div class="shimmer h-5 w-3/4 rounded-full mb-2"></div>
      <div class="shimmer h-3 w-16 rounded-full"></div>
    </div>`).join('')}</div>`;

  // جلب البيانات من Firebase ثم عرض
  (async () => {
    const { myUid, myType, myReq } = await _fetchMyAccountInfoFromFirebase();
    const fbExams = await fetchExamsFromFirebase();
    if (fbExams !== null) {
      // دمج مع اختبارات محلية غير مرفوعة بعد
      const localExams = (() => { try { return JSON.parse(localStorage.getItem('yadwor-exams') || '[]'); } catch(e) { return []; } })();
      const fbIds = new Set(fbExams.map(e => String(e.id)));
      const localPending = localExams.filter(e => !fbIds.has(String(e.id)));
      saveExams([...fbExams, ...localPending]);
    }

    const allExams = getExams();
    const activeExams = allExams.filter(e => Date.now() < e.expiresAt);
    saveExams(activeExams);

    let exams = activeExams;

    // الأستاذ والمؤسسة: يرون اختباراتهم فقط
    if (myType === 'teacher' || myType === 'institution') {
      exams = activeExams.filter(e => e.teacherUid === myUid || e.institutionUid === myUid);
    }

    // التلميذ: يرى فقط الاختبارات التي تطابقه (بيانات من Firebase)
    if (myType === 'student') {
      exams = myReq ? activeExams.filter(e => canStudentSeeExercise(myReq, e)) : [];
    }

    if (!exams.length) {
      el.innerHTML = `
      <div class="flex flex-col items-center justify-center py-20 text-center gap-3">
        <div class="h-16 w-16 rounded-full bg-zinc-100 flex items-center justify-center">
          <svg viewBox="0 0 24 24" class="h-8 w-8 fill-none stroke-zinc-400" stroke-width="1.6" stroke-linecap="round">
            <path d="M11 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-5m-1.414-9.414a2 2 0 1 1 2.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
        </div>
        <p class="text-[14px] font-bold text-zinc-400">لا توجد اختبارات منشورة حالياً</p>
        <button onclick="setMainTab('create')" class="mt-2 rounded-[12px] bg-zinc-900 px-6 py-3 text-[13px] font-bold text-white">إنشاء اختبار</button>
      </div>`;
      return;
    }

    el.innerHTML = `
    <div class="space-y-3">
      ${exams.map(e => renderExamEditCard(e)).join('')}
    </div>`;
  })();
}

function renderExamEditCard(exam) {
  const remaining = Math.max(0, exam.expiresAt - Date.now());
  const remainHours = Math.floor(remaining / 3600000);
  const remainMins = Math.floor((remaining % 3600000) / 60000);
  const timeStr = remainHours > 0 ? `${remainHours}س ${remainMins}د` : `${remainMins} دقيقة`;
  return `
  <div class="rounded-[16px] bg-white border border-zinc-100 shadow-sm p-4">
    <div class="flex items-center justify-between mb-2">
      <span class="text-[11px] font-bold bg-blue-100 text-blue-700 rounded-full px-2 py-0.5">${exam.type}</span>
      <span class="text-[11px] text-orange-500 font-bold">⏳ متبقي: ${timeStr}</span>
    </div>
    <h3 class="text-[15px] font-extrabold text-zinc-900">${exam.title}</h3>
    <p class="text-[12px] text-zinc-400 mt-1">${exam.questions.length} سؤال</p>
    <div class="flex gap-2 mt-3">
      <button onclick="deleteExam(${exam.id})"
        class="flex-1 h-9 rounded-[10px] bg-red-50 text-[12px] font-bold text-red-600 border border-red-100">
        حذف
      </button>
      <button onclick="viewResults(${exam.id})"
        class="flex-1 h-9 rounded-[10px] bg-zinc-900 text-[12px] font-bold text-white">
        النتائج
      </button>
    </div>
  </div>`;
}

function deleteExam(id) {
  if (!confirm('هل تريد حذف هذا الاختبار؟')) return;
  const exams = getExams().filter(e => e.id !== id);
  saveExams(exams);
  deleteExamFromFirebase(id); // حذف من Firebase (async في الخلفية)
  showToast('تم الحذف');
  renderEdit();
}

function viewResults(id) {
  window.location.href = `results.html?exam=${id}`;
}

// ---- Init ----
updatePendingBadge();
// تحميل الاختبارات من Firebase عند البدء، ثم عرض المحتوى
(async () => {
  try {
    const fbExams = await fetchExamsFromFirebase();
    if (fbExams !== null) {
      const localExams = (() => { try { return JSON.parse(localStorage.getItem('yadwor-exams') || '[]'); } catch(e) { return []; } })();
      const fbIds = new Set(fbExams.map(e => String(e.id)));
      const localPending = localExams.filter(e => !fbIds.has(String(e.id)));
      saveExams([...fbExams, ...localPending]);
    }
  } catch(e) {}
  renderMainContent();
  // تحديث badge الإشعارات من Firebase
  updateBellBadgeFromFirebase();
})();
</script>
