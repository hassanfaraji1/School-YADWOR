<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>غرفة فيديو — YADWOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!--
    ══════════════════════════════════════════════════════════════════
    YADWOR roomvideo.html — نسخة محدّثة مع إصلاح WebRTC الاحترافي
    ══════════════════════════════════════════════════════════════════

    الإصلاحات المُطبَّقة:
    ✅ نظام WebRTC جديد كامل (yadwor-webrtc.js)
    ✅ انتظار offer من المالك قبل إنشاء PC (يحل مشكلة الدخول الأول)
    ✅ ICE candidates تُخزَّن حتى setRemoteDescription يكتمل
    ✅ تبديل الكاميرا بـ replaceTrack (بدون قطع)
    ✅ الغرف في Firebase فقط (لا localStorage لبيانات الغرفة)
    ✅ تنظيف تام عند الخروج (no memory leaks)
    ✅ reconnect تلقائي عند تغيير الشبكة
    ✅ دعم العودة من الخلفية
    ✅ uid + roomId من URL params بدلاً من localStorage
    ══════════════════════════════════════════════════════════════════
    -->

    <style>
        /* ═══════════════════════════════════════════
           CSS (محتفَظ بتصميم الأصل مع تحسينات)
           ═══════════════════════════════════════════ */
        :root {
            --bg: #f0f4f8;
            --white: #ffffff;
            --blue: #0084ff;
            --red: #ff4757;
            --gold: #f1c40f;
            --txt: #2d3436;
            --sub: #636e72;
            --seat: 60px;
            --shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', Tahoma, sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); }

        /* ── Loader ── */
        #loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .shim {
            background: linear-gradient(90deg, #e8edf2 25%, #f5f7fa 50%, #e8edf2 75%);
            background-size: 400% 100%;
            animation: shimmer 1.4s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%   { background-position: 100% 50%; }
            100% { background-position: -100% 50%; }
        }
        #loaderText {
            margin-top: 16px; font-size: 14px; color: #4a6fa5; font-weight: 600;
            font-family: 'Tajawal', sans-serif;
        }
        .loader-spinner {
            width: 44px; height: 44px; border: 4px solid #e0eaf5;
            border-top-color: #0084ff; border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── صفحة الغرفة ── */
        #roomPage { position: fixed; inset: 0; display: flex; flex-direction: column; background: linear-gradient(180deg, #f0f4f8, #e2ebf0); }

        /* ── فيديو الأستاذ ── */
        #tvWrap {
            position: relative; width: 100%;
            flex: 0 0 48%; min-height: 180px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.14);
            background: #12122a;
        }
        #tv { width: 100%; height: 100%; object-fit: cover; }

        /* ── overlay الصورة (عند إخفاء الكاميرا) ── */
        #avatarOverlay {
            position: absolute; inset: 0; z-index: 20;
            background: linear-gradient(135deg, #1a1a3e, #0d0d1a);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 10px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #avatarOverlay.show { opacity: 1; pointer-events: auto; }
        #avatarOverlayImg { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.3); }
        #avatarOverlayName { color: #fff; font-size: 15px; font-weight: 700; }
        #avatarOverlaySubject { color: rgba(255,255,255,0.5); font-size: 12px; }

        /* ── LIVE tag ── */
        #liveTag { position: absolute; bottom: 10px; left: 10px; z-index: 30; background: rgba(229,57,53,.92); border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 800; color: white; display: flex; align-items: center; gap: 5px; letter-spacing: .8px; }
        #liveTag .dot { width: 7px; height: 7px; background: white; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(.85);} }

        /* ── معلومات الغرفة ── */
        #roomLabelBar {
            width: 100%; flex-shrink: 0; background: var(--bg);
            padding: 5px 14px; display: flex; align-items: center; gap: 6px;
        }
        #roomLabel { font-size: 12px; font-weight: 500; color: #4a6fa5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; }
        #roomLabelBar .rlb-dot { width: 6px; height: 6px; border-radius: 50%; background: #4a9fd4; flex-shrink: 0; animation: pulse 2s infinite; }

        /* ── Ping / Network ── */
        #netInfo { position: absolute; bottom: 10px; right: 10px; z-index: 30; background: rgba(0,0,0,.4); border-radius: 6px; padding: 3px 9px; font-size: 11px; color: white; display: flex; align-items: center; gap: 4px; }

        /* ── عداد المشاركين ── */
        #pCount { position: absolute; top: 10px; right: 10px; z-index: 30; background: rgba(0,0,0,.4); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: white; display: flex; align-items: center; gap: 5px; cursor: pointer; }

        /* ── الدردشة المتراكبة ── */
        #chatWin {
            position: absolute; bottom: 34px;
            left: 0 !important; right: auto !important;
            width: 60%; max-height: 65%;
            display: none; flex-direction: column; overflow: hidden; z-index: 35;
            -webkit-mask-image: linear-gradient(to top, black 55%, transparent 100%);
            mask-image: linear-gradient(to top, black 55%, transparent 100%);
            direction: ltr;
        }
        #chatArea {
            flex: 1; overflow-y: auto; padding: 6px 8px 4px;
            display: flex; flex-direction: column; gap: 4px;
            justify-content: flex-end; scroll-behavior: smooth; direction: rtl;
        }
        #chatArea::-webkit-scrollbar { display: none; }
        .vmsg { display: inline-flex; flex-direction: column; gap: 2px; padding: 4px 8px 5px; background: rgba(0,0,0,.50); backdrop-filter: blur(6px); border-radius: 10px; max-width: 96%; word-wrap: break-word; align-self: flex-start; direction: rtl; }
        .vmsg .sndr { display: inline-block; font-weight: 800; font-size: 10px; padding: 1px 7px; border-radius: 20px; color: #fff; direction: rtl; align-self: flex-start; }
        .vmsg .sndr.role-owner     { background: #92400e; }
        .vmsg .sndr.role-teacher   { background: #92400e; }
        .vmsg .sndr.role-student   { background: #1e3a5f; }
        .vmsg .sndr.role-default   { background: #1e3a5f; }
        .vmsg .tx { color: #fff; font-size: 12px; direction: auto; unicode-bidi: plaintext; line-height: 1.35; }

        #chatToggleBtn { position: absolute; bottom: 10px; left: 80px; z-index: 30; background: rgba(0,0,0,.5); color: white; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; border: none; cursor: pointer; display: flex; align-items: center; gap: 4px; font-family: 'Tajawal',sans-serif; }
        #chatDot { width: 8px; height: 8px; background: #ff9800; border-radius: 50%; display: none; animation: blink .8s infinite; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }

        /* ── أزرار الأستاذ على الفيديو ── */
        #switchCamBtn { position: absolute; bottom: 10px; left: 150px; z-index: 30; background: rgba(0,0,0,.5); color: white; padding: 3px 10px; border-radius: 6px; font-size: 11px; border: none; cursor: pointer; display: none; align-items: center; gap: 4px; font-family: 'Tajawal',sans-serif; }
        #camToggleBtn { position: absolute; bottom: 42px; left: 10px; z-index: 30; background: rgba(0,0,0,.5); color: white; padding: 3px 10px; border-radius: 6px; font-size: 11px; border: none; cursor: pointer; display: none; align-items: center; gap: 4px; font-family: 'Tajawal',sans-serif; }

        /* ── المقاعد ── */
        #seatsWrap { flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 22px; padding: 12px 8px 70px; overflow-y: auto; }
        #seatsWrap::-webkit-scrollbar { display: none; }
        .vrow { display: flex; justify-content: center; width: 100%; gap: 16px; }

        .vsb { width: var(--seat); display: flex; flex-direction: column; align-items: center; position: relative; }
        .vci { width: var(--seat); height: var(--seat); border-radius: 50%; background: var(--white); border: 1.5px solid #e1e8ed; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .vci.active { border: 3px solid var(--blue); }
        .vci img.avim { position: absolute; inset: 0; width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; z-index: 2; }
        .vci-shimmer { position: absolute; inset: 0; border-radius: 50%; background: linear-gradient(90deg, #e8edf2 25%, #f5f7fa 50%, #e8edf2 75%); background-size: 400% 100%; animation: shimmer 1.4s ease-in-out infinite; z-index: 1; }
        .vplus { color: #cbd5e0; font-size: 16px; }
        .vlb { font-size: 10px; font-weight: 700; color: var(--txt); margin-top: 6px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 68px; }
        .vmic { position: absolute; bottom: 22px; right: 0px; width: 16px; height: 16px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 6px; z-index: 40; pointer-events: none; }
        .vmic.me { pointer-events: auto; cursor: pointer; }
        .vmic.on  { background: #16a34a; color: white; }
        .vmic.off { background: #dc2626; color: white; }

        /* ── شريط التحكم ── */
        #ctrlBar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: rgba(255,255,255,0.97); backdrop-filter: blur(10px);
            border-top: 1px solid #e1e8ed;
            display: flex; align-items: center; justify-content: space-around;
            padding: 8px 4px 14px; gap: 4px;
        }
        .cbtn {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            border: none; background: none; cursor: pointer;
            padding: 6px 10px; border-radius: 12px; transition: background .15s;
            min-width: 52px;
        }
        .cbtn:active { background: #f0f4f8; transform: scale(.93); }
        .cbtn .cico { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .cbtn .clb { font-size: 9px; font-weight: 700; color: #555; font-family: 'Tajawal', sans-serif; }
        #mcBtn .cico { background: #e8f5e9; color: #2e7d32; }
        #mcBtn.muted .cico { background: #ffebee; color: #c62828; }
        #leaveBtn .cico { background: #ffebee; color: #c62828; }
        #spkBtn .cico { background: #e3f2fd; color: #1565c0; }
        #emoBtn .cico { background: #fff8e1; color: #f57f17; }
        #chatBtn .cico { background: #f3e5f5; color: #6a1b9a; }
        #msgWrap {
            flex: 1; display: flex; align-items: center; gap: 6px;
            background: #f0f4f8; border-radius: 24px; padding: 6px 12px;
            max-width: 180px;
        }
        #msgInp { flex: 1; border: none; background: none; font-family: 'Tajawal', sans-serif; font-size: 13px; outline: none; direction: rtl; }
        #sendBtn { border: none; background: none; color: var(--blue); font-size: 18px; cursor: pointer; padding: 0; display: flex; align-items: center; }

        /* ── نافذة الخروج ── */
        .ov { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1100; display: none; }
        .lm { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(.9); background: var(--white); width: 82%; max-width: 300px; border-radius: 13px; padding: 25px 20px; z-index: 1105; display: none; opacity: 0; transition: .3s; box-shadow: 0 10px 40px rgba(0,0,0,.3); text-align: center; }
        .lm.show { display: block; opacity: 1; transform: translate(-50%,-50%) scale(1); }
        .lm h3 { margin-bottom: 8px; font-size: 17px; }
        .lm p { font-size: 13px; color: var(--sub); margin-bottom: 18px; }
        .lbtns { display: flex; gap: 10px; justify-content: center; }
        .lbtns button { flex: 1; padding: 10px; border: none; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; font-family: 'Tajawal',sans-serif; }
        .lyes { background: var(--red); color: white; }
        .lno  { background: #f1f2f6; color: #333; }

        /* ── Snack/Toast ── */
        #snackBar {
            position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(30,30,46,.93); color: #fff; padding: 8px 18px;
            border-radius: 20px; font-size: 13px; font-family: 'Tajawal',sans-serif;
            z-index: 9000; opacity: 0; transition: opacity .25s, transform .25s;
            pointer-events: none; white-space: nowrap; max-width: 90vw;
        }
        #snackBar.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── إشعار حالة الاتصال ── */
        #connectionStatus {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 40; background: rgba(0,0,0,0.7); color: #fff;
            padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 700;
            display: none; align-items: center; gap: 6px; font-family: 'Tajawal',sans-serif;
        }
        #connectionStatus.show { display: flex; }
        #connectionStatus.connecting { background: rgba(245,124,0,0.9); }
        #connectionStatus.connected { background: rgba(46,125,50,0.9); }
        #connectionStatus.failed { background: rgba(198,40,40,0.9); }

        /* ── غرفة مغلقة ── */
        #roomClosedOverlay {
            position: fixed; inset: 0; z-index: 9995;
            background: rgba(0,0,0,0.85);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; text-align: center; gap: 14px;
            font-family: 'Tajawal', sans-serif;
        }
        #roomClosedOverlay.show { display: flex; }
        #roomClosedOverlay h2 { font-size: 20px; font-weight: 800; }
        #roomClosedOverlay p { font-size: 14px; opacity: 0.7; }
        #roomClosedOverlay button { padding: 12px 28px; background: #0084ff; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Tajawal',sans-serif; }
    </style>
</head>
<body>

<!-- ════ Loader ════ -->
<div id="loader">
    <div class="loader-spinner"></div>
    <div id="loaderText">جاري تحميل الغرفة...</div>
</div>

<!-- ════ صفحة الغرفة ════ -->
<div id="roomPage" style="display:none;">

    <!-- شريط اسم الغرفة -->
    <div id="roomLabelBar">
        <div class="rlb-dot"></div>
        <span id="roomLabel">YADWOR</span>
    </div>

    <!-- منطقة الفيديو -->
    <div id="tvWrap">
        <video id="tv" autoplay playsinline muted></video>

        <!-- overlay صورة المالك عند إخفاء الكاميرا -->
        <div id="avatarOverlay">
            <img id="avatarOverlayImg" src="" alt="">
            <div id="avatarOverlayName"></div>
            <div id="avatarOverlaySubject"></div>
        </div>

        <!-- LIVE tag -->
        <div id="liveTag"><div class="dot"></div>LIVE</div>

        <!-- عداد المشاركين -->
        <div id="pCount">
            <i class="fas fa-users" style="font-size:11px;"></i>
            <span id="pCnt">0</span>
        </div>

        <!-- ping -->
        <div id="netInfo">
            <i class="fas fa-wifi" style="font-size:10px;"></i>
            <span id="netSpd">—</span>
        </div>

        <!-- حالة الاتصال -->
        <div id="connectionStatus">
            <i class="fas fa-circle-notch fa-spin" style="font-size:10px;"></i>
            <span id="connectionStatusText">جاري الاتصال...</span>
        </div>

        <!-- دردشة متراكبة -->
        <div id="chatWin" style="display:none;">
            <div id="chatArea"></div>
        </div>

        <!-- أزرار على الفيديو -->
        <button id="chatToggleBtn" onclick="toggleChat()">
            <i class="fas fa-comment-alt"></i>
            دردشة
            <span id="chatDot"></span>
        </button>
        <button id="switchCamBtn" onclick="doSwitchCamera()">
            <i class="fas fa-sync-alt"></i>
            قلب
        </button>
        <button id="camToggleBtn" onclick="doToggleCam()">
            <i class="fas fa-video"></i>
            كاميرا
        </button>
    </div>

    <!-- المقاعد -->
    <div id="seatsWrap" style="padding-bottom:80px;"></div>

</div>

<!-- ════ شريط التحكم ════ -->
<div id="ctrlBar" style="display:none;">
    <!-- مايك -->
    <button class="cbtn" id="mcBtn" onclick="toggleMic()">
        <div class="cico"><i class="fas fa-microphone-slash" id="mcIco"></i></div>
        <span class="clb">مايك</span>
    </button>
    <!-- سماعة -->
    <button class="cbtn" id="spkBtn" onclick="toggleSpk()">
        <div class="cico"><i class="fas fa-volume-up" id="spkIco"></i></div>
        <span class="clb">سماعة</span>
    </button>
    <!-- إيموجي -->
    <button class="cbtn" id="emoBtn" onclick="showEmojiPicker()">
        <div class="cico"><i class="fas fa-smile"></i></div>
        <span class="clb">إيموجي</span>
    </button>
    <!-- إدخال رسالة -->
    <div id="msgWrap">
        <input id="msgInp" type="text" placeholder="اكتب رسالة..." maxlength="90" onkeydown="if(event.key==='Enter')sendMsg()">
        <button id="sendBtn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>
    <!-- خروج -->
    <button class="cbtn" id="leaveBtn" onclick="showLeave()">
        <div class="cico"><i class="fas fa-sign-out-alt"></i></div>
        <span class="clb">خروج</span>
    </button>
</div>

<!-- ════ نافذة الخروج ════ -->
<div class="ov" id="lov"></div>
<div class="lm" id="lm">
    <h3>تأكيد الخروج</h3>
    <p>هل تريد مغادرة الغرفة؟</p>
    <div class="lbtns">
        <button class="lyes" onclick="doLeave()">نعم، اخرج</button>
        <button class="lno"  onclick="hideLeave()">إلغاء</button>
    </div>
</div>

<!-- ════ Snack Bar ════ -->
<div id="snackBar"></div>

<!-- ════ غرفة مغلقة ════ -->
<div id="roomClosedOverlay">
    <div style="font-size:40px;">📴</div>
    <h2>الغرفة أُغلقت</h2>
    <p>قام صاحب الغرفة بإنهاء الجلسة</p>
    <button onclick="window.location.href='roomhom.html'">العودة للرئيسية</button>
</div>

<!-- ════ Firebase SDK ════ -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<!-- ════ نظام WebRTC الجديد ════ -->
<script src="yadwor-webrtc.js"></script>

<script>
// ══════════════════════════════════════════════════════════════════════
//  YADWOR roomvideo.html — الكود الرئيسي المُصلَح
//
//  التغييرات الجوهرية:
//  1. نظام WebRTC الجديد من yadwor-webrtc.js
//  2. جلب roomId + uid من URL params (لا localStorage)
//  3. جلب بيانات المستخدم من Firebase/users
//  4. تنظيف صارم عند الخروج
// ══════════════════════════════════════════════════════════════════════
'use strict';

// ── Firebase ──
firebase.initializeApp({
    apiKey: "AIzaSyAP-xRJ5zvHvMmqkkVvXnWdqwfuuj58CcA",
    authDomain: "a-comment-5a3e5.firebaseapp.com",
    databaseURL: "https://a-comment-5a3e5-default-rtdb.firebaseio.com",
    projectId: "a-comment-5a3e5",
    storageBucket: "a-comment-5a3e5.appspot.com",
    messagingSenderId: "557343451166",
    appId: "1:557343451166:web:d181f098cdeccf7691260f"
});
const db = firebase.database();

// ── حالة الغرفة ──
let me = null;
let roomId = null;
let roomData = null;
let isOwner = false;
let ownerUid = null;
let roomManager = null; // YadworRoomManager

// ── حالة UI ──
let micOn = false;
let spkOn = true;
let camOn = true;
let usingFrontCamera = true;
let isSwitchingCamera = false;
let chatVis = false;
let chatUnread = false;
let mySeatIdx = null;
let SEATS = 20;

// ══════════════════════
// بدء التشغيل
// ══════════════════════
async function init() {
    showLoader('جاري تحميل الغرفة...');

    // ── 1. جلب roomId ──
    // المصدر الأول: URL params (الطريقة الصحيحة)
    // المصدر الثاني: localStorage / sessionStorage (للتوافق مع الكود الحالي)
    roomId = RoomNavigator.getRoomIdFallback();
    if (!roomId) {
        showFatalError('لم يتم تحديد الغرفة', 'roomhom.html');
        return;
    }

    // ── 2. جلب uid ──
    // المصدر الأول: URL params
    // المصدر الثاني: localStorage (للتوافق)
    let uid = RoomNavigator.getRoomParams().uid
           || UserStateManager.getUidFromLocalStorage()
           || '';

    if (!uid) {
        // محاولة جلب من localStorage (توافق مع النظام القديم)
        try { uid = localStorage.getItem('yadwor-uid') || ''; } catch {}
    }

    // ── 3. جلب بيانات الغرفة من Firebase ──
    showLoader('جاري جلب بيانات الغرفة...');
    let roomSnap;
    try {
        roomSnap = await db.ref('rooms/' + roomId).get();
    } catch(e) {
        showFatalError('تعذّر الاتصال بالخادم. تحقق من اتصالك بالإنترنت.', 'roomhom.html');
        return;
    }

    if (!roomSnap.exists()) {
        showFatalError('الغرفة غير موجودة أو تم حذفها', 'roomhom.html');
        return;
    }

    roomData = roomSnap.val();
    ownerUid = roomData.ownerId || roomData.teacherUid || roomData.ownerUid || null;

    // ── 4. جلب بيانات المستخدم من Firebase ──
    showLoader('جاري جلب بيانات المستخدم...');
    if (uid && !uid.startsWith('guest_')) {
        try {
            const userSnap = await db.ref('users/' + uid).get();
            const userData = userSnap.val() || {};
            me = {
                uid,
                name: userData.name || userData.yourname || userData.displayName
                   || _getFromLocal('yadwor-settings-name')
                   || _getFromLocal('yadwor-user-name')
                   || 'مستخدم',
                avatar: userData.avatar || userData.avatarUrl
                     || _getFromLocal('yadwor-avatar-preview')
                     || '',
                type: userData.accountType || userData.profileType
                   || _getFromLocal('yadwor-account-type')
                   || 'user',
                frame: userData.activeFrameUrl || '',
                badge: userData.badge || '',
                points: userData.points || 0,
                coins: userData.coins || 0,
            };
        } catch(e) {
            // Fallback إلى localStorage
            me = _getMeFromLocalStorage(uid);
        }
    } else {
        // Fallback إلى localStorage للتوافق
        me = _getMeFromLocalStorage(uid || ('guest_' + Date.now()));
    }

    // ── 5. تحديد صاحب الغرفة ──
    isOwner = !!(ownerUid && me.uid && ownerUid === me.uid);

    // fallback: تحقق من localStorage (للتوافق مع confirmCreateVideo في roomhom.html)
    if (!isOwner) {
        try {
            const activeRoom = JSON.parse(localStorage.getItem('yw_active_room') || '{}');
            if (activeRoom && activeRoom.isOwner === true && activeRoom.roomId === roomId) {
                const savedOwnerUid = localStorage.getItem('yw_room_owner_uid') || '';
                if (!savedOwnerUid || savedOwnerUid === me.uid) {
                    isOwner = true;
                }
            }
        } catch {}
    }

    // ── 6. تهيئة UI ──
    document.getElementById('roomLabel').textContent = roomData.roomName || 'YADWOR';
    document.title = roomData.roomName || 'غرفة فيديو';
    buildSeatsHTML();

    // ── 7. إنشاء YadworRoomManager والدخول ──
    roomManager = new YadworRoomManager(db, roomId, me, isOwner);

    // Callbacks
    roomManager.onOwnerStreamReady = handleOwnerStream;
    roomManager.onStudentJoined = handleStudentJoined;
    roomManager.onStudentLeft = handleStudentLeft;
    roomManager.onRoomClosed = handleRoomClosed;
    roomManager.onError = (msg) => showSnack(msg, '⚠️');

    showLoader('جاري الاتصال...');
    showConnectionStatus('connecting', 'جاري الاتصال...');

    await roomManager.enter();

    // ── 8. تهيئة باقي المستمعات ──
    listenSeats();
    listenChatDB();
    listenRoomStateChanges();
    startNetPing();

    // ── 9. إظهار الغرفة ──
    hideLoader();
    document.getElementById('roomPage').style.display = 'flex';
    document.getElementById('ctrlBar').style.display = 'flex';

    // المالك: عرض الكاميرا محلياً
    if (isOwner && roomManager.localStream) {
        const tv = document.getElementById('tv');
        tv.srcObject = roomManager.localStream;
        tv.muted = true;
        tv.play().catch(() => {});
        document.getElementById('switchCamBtn').style.display = 'flex';
        document.getElementById('camToggleBtn').style.display = 'flex';
        updateMicUI();
        showConnectionStatus('connected', 'متصل', 2000);
    }

    // تسجيل المالك في مقعد 0
    if (isOwner) {
        await registerOwnerSeat();
    } else {
        // الطالب يسجل نفسه كمشاهد
        await registerAsViewer();
        showConnectionStatus('connecting', 'في انتظار بث الأستاذ...');
    }

    // إظهار عداد المشاركين
    document.getElementById('pCount').style.display = 'flex';

    // تنظيف localStorage القديم (اختياري — للتوافق الأمامي)
    _cleanupLegacyLocalStorage();
}

// ══════════════════════════════
// معالجة وصول stream المالك
// ══════════════════════════════
function handleOwnerStream(track, remoteStream) {
    const tv = document.getElementById('tv');

    if (track.kind === 'video') {
        if (!tv.srcObject) tv.srcObject = remoteStream;
        else {
            // أضف الـ track للـ stream الموجود
            if (!tv.srcObject.getTracks().find(t => t.id === track.id)) {
                tv.srcObject.addTrack(track);
            }
        }
        tv.muted = true;
        tv.style.visibility = 'visible';
        tv.play().catch(() => {});
        // إخفاء overlay
        hideOwnerOverlay();
        showConnectionStatus('connected', 'متصل بالبث', 3000);
        showSnack('بدأ بث الأستاذ ✅', '');
    } else if (track.kind === 'audio') {
        // الصوت يمر عبر PeerConnection تلقائياً
        // لكن نتأكد من تشغيل عناصر الصوت
        setTimeout(() => {
            document.querySelectorAll('audio').forEach(a => {
                a.muted = !spkOn;
                if (a.paused && a.srcObject) a.play().catch(() => {});
            });
        }, 500);
    }
}

function hideOwnerOverlay() {
    const overlay = document.getElementById('avatarOverlay');
    if (overlay) overlay.classList.remove('show');
}

function showOwnerOverlay(name, avatar, roomName) {
    const overlay = document.getElementById('avatarOverlay');
    const img = document.getElementById('avatarOverlayImg');
    const nameEl = document.getElementById('avatarOverlayName');
    const subEl = document.getElementById('avatarOverlaySubject');
    if (img && avatar) img.src = avatar;
    if (nameEl) nameEl.textContent = name || 'الأستاذ';
    if (subEl) subEl.textContent = roomName || '';
    if (overlay) overlay.classList.add('show');
    const tv = document.getElementById('tv');
    if (tv) tv.style.visibility = 'hidden';
}

// ══════════════════════════════
// المقاعد
// ══════════════════════════════
function buildSeatsHTML() {
    const wrap = document.getElementById('seatsWrap');
    wrap.innerHTML = '';
    for (let row = 0; row < Math.ceil(SEATS / 4); row++) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'vrow';
        for (let col = 0; col < 4; col++) {
            const i = row * 4 + col;
            if (i >= SEATS) break;
            const sb = document.createElement('div');
            sb.className = 'vsb';
            sb.id = 'vsb' + i;
            sb.innerHTML = `
                <div class="vci" id="vci${i}" onclick="onSeat(${i})">
                    <i class="fas fa-plus vplus"></i>
                </div>
                <span class="vlb" id="vlb${i}">متاح</span>
            `;
            rowDiv.appendChild(sb);
        }
        wrap.appendChild(rowDiv);
    }
}

function listenSeats() {
    const seatsRef = db.ref('rooms/' + roomId + '/seats');
    seatsRef.on('value', snap => {
        const all = snap.val() || {};
        let cnt = 0;
        for (let i = 0; i < SEATS; i++) {
            renderSeat(i, all[i] || null);
            if (all[i] && all[i].userId) cnt++;
        }
        document.getElementById('pCnt').textContent = cnt;
    });
}

function renderSeat(i, data) {
    const ci = document.getElementById('vci' + i);
    const lb = document.getElementById('vlb' + i);
    const sb = document.getElementById('vsb' + i);
    if (!ci || !lb || !sb) return;

    ci.innerHTML = '';
    ci.className = 'vci';
    ci.onclick = () => onSeat(i);
    sb.querySelectorAll('.vmic').forEach(el => el.remove());

    if (data && data.userId) {
        ci.classList.add('active');
        ci.dataset.uid = data.userId;

        // shimmer + صورة
        const sh = document.createElement('div');
        sh.className = 'vci-shimmer';
        ci.appendChild(sh);

        if (data.avatar) {
            const img = document.createElement('img');
            img.className = 'avim';
            img.src = data.avatar;
            img.onload = () => { ci.classList.add('loaded'); sh.style.opacity = '0'; };
            img.onerror = () => { sh.style.opacity = '0'; };
            ci.appendChild(img);
        }

        lb.textContent = (data.name || 'مستخدم').slice(0, 8);

        if (i === 0) ci.style.borderColor = '#f1c40f';

        // بادج المايك لمقعدي
        if (data.userId === me.uid) {
            const mc = document.createElement('div');
            mc.className = 'vmic me ' + (micOn ? 'on' : 'off');
            mc.id = 'vMyMic';
            mc.onclick = e => { e.stopPropagation(); toggleMic(); };
            mc.innerHTML = micOn
                ? '<i class="fas fa-microphone" style="font-size:6px"></i>'
                : '<i class="fas fa-microphone-slash" style="font-size:6px"></i>';
            sb.appendChild(mc);
        } else if (data.micOn !== undefined) {
            const omc = document.createElement('div');
            omc.className = 'vmic ' + (data.micOn ? 'on' : 'off');
            omc.innerHTML = data.micOn
                ? '<i class="fas fa-microphone" style="font-size:6px"></i>'
                : '<i class="fas fa-microphone-slash" style="font-size:6px"></i>';
            sb.appendChild(omc);
        }
    } else {
        ci.innerHTML = '<i class="fas fa-plus vplus"></i>';
        lb.textContent = 'متاح';
    }
}

function onSeat(i) {
    if (isOwner) return; // المالك في مقعد 0 دائماً
    if (i === 0) return; // مقعد 0 للمالك فقط

    db.ref('rooms/' + roomId + '/seats/' + i).once('value', snap => {
        const seatData = snap.val();
        if (seatData && seatData.userId && seatData.userId !== me.uid) return;

        if (mySeatIdx === i) {
            // قيام من المقعد
            db.ref('rooms/' + roomId + '/seats/' + i).remove();
            mySeatIdx = null;
            document.getElementById('mcBtn').style.display = 'none';
        } else {
            if (mySeatIdx !== null) {
                db.ref('rooms/' + roomId + '/seats/' + mySeatIdx).remove();
            }
            takeSeat(i);
        }
    });
}

async function takeSeat(i) {
    const sd = {
        userId: me.uid, name: me.name, avatar: me.avatar || '',
        frame: me.frame || '', badge: me.badge || '',
        micOn: false, ts: Date.now()
    };
    const ref = db.ref('rooms/' + roomId + '/seats/' + i);
    await ref.set(sd);
    ref.onDisconnect().remove();
    mySeatIdx = i;
    // إزالة من المشاهدين
    db.ref('rooms/' + roomId + '/viewers/' + me.uid).remove();
    // إظهار زر المايك
    document.getElementById('mcBtn').style.display = '';
    showSnack('جلست في المقعد ' + (i + 1), '🪑');
}

// ══════════════════════════════
// تحكم المايك والكاميرا
// ══════════════════════════════
async function toggleMic() {
    micOn = !micOn;
    if (roomManager) await roomManager.setMicOn(micOn);
    updateMicUI();

    // تحديث بيانات المقعد في Firebase
    if (mySeatIdx !== null) {
        db.ref('rooms/' + roomId + '/seats/' + mySeatIdx).update({ micOn });
    }
}

function updateMicUI() {
    const ico = document.getElementById('mcIco');
    const btn = document.getElementById('mcBtn');
    const vmic = document.getElementById('vMyMic');

    if (micOn) {
        if (ico) { ico.className = 'fas fa-microphone'; }
        if (btn) btn.classList.remove('muted');
        if (vmic) { vmic.className = 'vmic me on'; vmic.innerHTML = '<i class="fas fa-microphone" style="font-size:6px"></i>'; }
    } else {
        if (ico) { ico.className = 'fas fa-microphone-slash'; }
        if (btn) btn.classList.add('muted');
        if (vmic) { vmic.className = 'vmic me off'; vmic.innerHTML = '<i class="fas fa-microphone-slash" style="font-size:6px"></i>'; }
    }
}

function toggleSpk() {
    spkOn = !spkOn;
    const ico = document.getElementById('spkIco');
    if (ico) ico.className = spkOn ? 'fas fa-volume-up' : 'fas fa-volume-mute';
    document.querySelectorAll('audio').forEach(a => { a.muted = !spkOn; });
    const tv = document.getElementById('tv');
    // الفيديو دائماً مكتوم محلياً (الصوت يأتي من audio elements)
    showSnack(spkOn ? 'تم تشغيل الصوت' : 'تم كتم الصوت', spkOn ? '🔊' : '🔇');
}

// ── تبديل الكاميرا (للمالك) ──
async function doSwitchCamera() {
    if (!isOwner || isSwitchingCamera || !roomManager) return;
    isSwitchingCamera = true;
    const btn = document.getElementById('switchCamBtn');
    if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; }

    try {
        usingFrontCamera = !usingFrontCamera;
        await roomManager.switchCamera(usingFrontCamera ? 'user' : 'environment');

        // تحديث الفيديو المحلي
        const tv = document.getElementById('tv');
        const localStream = roomManager.localStream;
        if (tv && localStream) {
            // لا نحتاج لتغيير srcObject — الـ track تغيّر داخل نفس الـ stream
            // لكن نجبر الفيديو على التحديث
            tv.srcObject = localStream;
        }
        showSnack('تم تبديل الكاميرا', '📷');
    } catch(e) {
        usingFrontCamera = !usingFrontCamera; // إعادة الحالة
        showSnack('تعذّر تبديل الكاميرا', '⚠️');
    } finally {
        isSwitchingCamera = false;
        if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
    }
}

// ── تفعيل/إيقاف الكاميرا (للمالك) ──
async function doToggleCam() {
    if (!isOwner || !roomManager) return;
    camOn = !camOn;
    await roomManager.setCamOn(camOn);

    const btn = document.getElementById('camToggleBtn');
    const tv = document.getElementById('tv');
    if (camOn) {
        if (btn) btn.innerHTML = '<i class="fas fa-video"></i> كاميرا';
        if (tv) tv.style.visibility = 'visible';
        hideOwnerOverlay();
    } else {
        if (btn) btn.innerHTML = '<i class="fas fa-video-slash"></i> إظهار';
        showOwnerOverlay(me.name, me.avatar, roomData && roomData.roomName);
    }
}

// ══════════════════════════════
// الدردشة
// ══════════════════════════════
function listenChatDB() {
    db.ref('rooms/' + roomId + '/chat').limitToLast(60).on('child_added', snap => {
        const m = snap.val();
        if (!m) return;
        addVMsg(m);
        if (!chatVis) {
            chatUnread = true;
            const dot = document.getElementById('chatDot');
            if (dot) dot.style.display = 'block';
        }
    });
}

function addVMsg(m) {
    const a = document.getElementById('chatArea');
    if (!a) return;
    const d = document.createElement('div');
    d.className = 'vmsg';
    let roleClass = 'role-default';
    if (m.isOwner || m.uid === ownerUid) roleClass = 'role-owner';
    else if ((m.accountType || m.type) === 'teacher') roleClass = 'role-teacher';
    else if ((m.accountType || m.type) === 'student') roleClass = 'role-student';
    d.innerHTML = '<span class="sndr ' + roleClass + '">' + esc(m.name || 'مستخدم') + '</span>'
                + '<span class="tx">' + esc(m.text || '') + '</span>';
    a.appendChild(d);
    a.scrollTop = a.scrollHeight;
    if (a.children.length > 60) a.removeChild(a.firstChild);
}

function toggleChat() {
    chatVis = !chatVis;
    const cw = document.getElementById('chatWin');
    if (cw) cw.style.display = chatVis ? 'flex' : 'none';
    if (chatVis) {
        chatUnread = false;
        const dot = document.getElementById('chatDot');
        if (dot) dot.style.display = 'none';
    }
}

async function sendMsg() {
    const inp = document.getElementById('msgInp');
    const text = (inp && inp.value.trim()) || '';
    if (!text || !roomManager) return;
    await roomManager.sendChat(text, me.type);
    inp.value = '';
}

function showEmojiPicker() {
    showSnack('قريباً — الإيموجي 😊', '✨');
}

// Ping الشبكة

function startNetPing() {
    setInterval(() => {
        const t = Date.now();
        db.ref('rooms/' + roomId + '/ping').set(t).then(() => {
            const ms = Date.now() - t;
            const el = document.getElementById('netSpd');
            if (el) el.textContent = ms + 'ms';
        }).catch(() => {});

// الخروج
// ══════════════════════════════
function showLeave() {
    document.getElementById('lov').style.display = 'block';
    document.getElementById('lm').classList.add('show');
}

function hideLeave() {
    document.getElementById('lov').style.display = 'none';
    document.getElementById('lm').classList.remove('show');
}

async function doLeave() {
    hideLeave();
    showLoader('جاري الخروج...');

    // إزالة مقعدي
    if (mySeatIdx !== null && !isOwner) {
        await db.ref('rooms/' + roomId + '/seats/' + mySeatIdx).remove().catch(() => {});
    }
    // إزالة من المشاهدين
    await db.ref('rooms/' + roomId + '/viewers/' + me.uid).remove().catch(() => {});

    // مغادرة الغرفة
    if (roomManager) {
        await roomManager.leave().catch(() => {});
    }

    // تنظيف localStorage القديم
    _cleanupLegacyLocalStorage();

    // الانتقال لصفحة الغرف
    window.location.href = 'roomhom.html';

// ══════════════════════════════
// حالة الاتصال UI
// ══════════════════════════════
function showConnectionStatus(type, text, autohideMs) {
    const el = document.getElementById('connectionStatus');
    const textEl = document.getElementById('connectionStatusText');
    if (!el) return;
    el.className = 'connectionStatus show ' + type;
    if (textEl) textEl.textContent = text;
    el.style.display = 'flex';
    if (autohideMs) {
        setTimeout(() => { el.style.display = 'none'; }, autohideMs);
    }
}

// ══════════════════════════════
// مساعدات
// ══════════════════════════════
function showLoader(text) {
    const loader = document.getElementById('loader');
    const lt = document.getElementById('loaderText');
    if (loader) loader.style.display = 'flex';
    if (lt) lt.textContent = text || 'جاري التحميل...';
}

function hideLoader() {
    const loader = document.getElementById('loader');
    if (loader) loader.style.display = 'none';
}

function showFatalError(msg, redirectTo) {
    hideLoader();
    alert(msg);
    if (redirectTo) window.location.href = redirectTo;
}

let _snackTO = null;
function showSnack(msg, icon) {
    const el = document.getElementById('snackBar');
    if (!el) return;
    el.textContent = (icon ? icon + ' ' : '') + msg;
    el.classList.add('show');
    clearTimeout(_snackTO);
    _snackTO = setTimeout(() => el.classList.remove('show'), 3000);
}

function esc(str) {
    return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function _getFromLocal(key) {
    try { return localStorage.getItem(key) || ''; } catch { return ''; }
}

function _getMeFromLocalStorage(uid) {
    return {
        uid,
        name: _getFromLocal('yadwor-settings-name') || _getFromLocal('yadwor-user-name') || 'مستخدم',
        avatar: _getFromLocal('yadwor-avatar-preview') || '',
        type: _getFromLocal('yadwor-account-type') || _getFromLocal('yadwor-profile-type') || 'user',
        frame: '',
        badge: '',
        points: 0,
        coins: 0,
    };
}

// تنظيف بيانات localStorage القديمة غير الضرورية
function _cleanupLegacyLocalStorage() {
    // نحتفظ فقط بـ: yadwor-uid, yadwor-settings-name, yadwor-avatar-preview, yadwor-account-type
    // ونزيل بيانات الغرفة المؤقتة
    const keysToRemove = [
        'yw_room_target', 'yw_active_room', 'yw_room_mode',
        'yw_room_owner_uid', 'yw_floating_room', 'yw_current_user',
        'targetRoom', 'targetVoiceRoom',
    ];
    keysToRemove.forEach(key => {
        try { localStorage.removeItem(key); } catch {}
        try { sessionStorage.removeItem(key); } catch {}
    });
}

// ══════════════════════════════
// معالجة الخروج من الصفحة
// ══════════════════════════════
window.addEventListener('beforeunload', () => {
    if (roomManager) {
        // تنظيف سريع (لا async هنا)
        try { roomManager.streamManager.stopAll(); } catch {}
        try { roomManager.peerManager.closeAll(); } catch {}
    }
});

// ══════════════════════════════
// بدء التشغيل
// ══════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
    init().catch(err => {
        console.error('[YADWOR] خطأ في التهيئة:', err);
        showFatalError('حدث خطأ غير متوقع. يرجى إعادة المحاولة.', 'roomhom.html');
    });
});
</script>
