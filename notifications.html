<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>YADWOR – الإشعارات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Tajawal', system-ui, -apple-system, sans-serif; background: #faf8f6; color: #18181b; }
  input:focus { outline: none; }
  .shimmer { animation: shimmer 1.5s infinite; background: linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size: 200% 100%; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#18181b; color:white; padding:8px 18px; border-radius:999px; font-size:13px; font-weight:700; z-index:999; pointer-events:none; opacity:0; transition:opacity .2s; }
  .toast.show { opacity:1; }
  .notif-tab { transition: all .2s; border-bottom: 2px solid transparent; }
  .notif-tab.active { color: #18181b; border-bottom-color: #18181b; font-weight: 800; }
  .notif-tab:not(.active) { color: #71717a; font-weight: 700; }
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<header class="sticky top-0 z-40 border-b border-zinc-200/70 bg-white/95 backdrop-blur-xl">
  <div class="mx-auto flex h-11 max-w-[1100px] items-center justify-between px-3">
    <div class="flex items-center gap-1.5">
      <a href="home.html" class="flex h-9 w-9 items-center justify-center rounded-full hover:bg-zinc-100">
        <svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-width="1.8" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </a>
    </div>
    <h1 class="text-[15px] font-extrabold tracking-tight">الإشعارات</h1>
    <div class="h-9 w-9"></div>
  </div>
</header>

<!-- TABS -->
<div class="sticky top-11 z-30 bg-white border-b border-zinc-100 px-2">
  <div class="mx-auto max-w-[760px] flex gap-0 overflow-x-auto scrollbar-hide">
    <button onclick="setNotifTab('all')" id="ntab-all" class="notif-tab active px-4 py-3 text-[13px] shrink-0">الكل</button>
    <button onclick="setNotifTab('exams')" id="ntab-exams" class="notif-tab px-4 py-3 text-[13px] shrink-0">تمارين واختبارات</button>
    <button onclick="setNotifTab('rooms')" id="ntab-rooms" class="notif-tab px-4 py-3 text-[13px] shrink-0">غرف البث</button>
    <button onclick="setNotifTab('likes')" id="ntab-likes" class="notif-tab px-4 py-3 text-[13px] shrink-0">اللايكات</button>
    <button onclick="setNotifTab('comments')" id="ntab-comments" class="notif-tab px-4 py-3 text-[13px] shrink-0">التعليقات</button>
  </div>
</div>

<main id="notifications-list" class="mx-auto max-w-[760px] px-4 py-4 pb-24"></main>

<!-- BOTTOM NAV -->
<nav class="fixed bottom-0 left-0 right-0 z-40 border-t border-zinc-200 bg-white shadow-[0_-6px_20px_rgba(0,0,0,0.04)]">
  <div class="mx-auto grid max-w-[480px] grid-cols-5 px-2 py-2 gap-1">
    <a href="profile.html" class="flex flex-col items-center justify-center gap-1 rounded-[12px] py-2 text-[10px] font-bold text-zinc-500">
      <svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-width="1.8" stroke-linecap="round"><path d="M20 21a8 8 0 0 0-16 0M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8"/></svg>
      الملف
    </a>
    <a href="messages.html" class="flex flex-col items-center justify-center gap-1 rounded-[12px] py-2 text-[10px] font-bold text-zinc-500">
      <svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      الرسائل
    </a>
    <a href="roomhom.html" class="flex flex-col items-center justify-center gap-1 rounded-[12px] py-2 text-[10px] font-bold text-zinc-500">
      <svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-width="1.8" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
      الغرف
    </a>
    <a href="search.html" class="flex flex-col items-center justify-center gap-1 rounded-[12px] py-2 text-[10px] font-bold text-zinc-500">
      <svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-width="1.8" stroke-linecap="round"><path d="m21 21-4.34-4.34M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16"/></svg>
      البحث
    </a>
    <a href="home.html" class="flex flex-col items-center justify-center gap-1 rounded-[12px] py-2 text-[10px] font-bold text-zinc-500">
      <svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-width="1.8" stroke-linecap="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><path d="M9 21V12h6v9"/></svg>
      الرئيسية
    </a>
  </div>
</nav>

<script src="shared.js"></script>
<script>
const FB_DB_URL_N  = 'https://a-comment-5a3e5-default-rtdb.firebaseio.com';
const FB_API_KEY_N = 'AIzaSyAP-xRJ5zvHvMmqkkVvXnWdqwfuuj58CcA';

let currentTab = 'all';
let allNotifications = [];

function setNotifTab(tab) {
  currentTab = tab;
  ['all','exams','rooms','likes','comments'].forEach(t => {
    const btn = document.getElementById('ntab-' + t);
    if (btn) btn.className = 'notif-tab ' + (t === tab ? 'active' : '') + ' px-4 py-3 text-[13px] shrink-0';
  });
  renderList();
}

function getFilteredNotifs() {
  if (currentTab === 'all') return allNotifications;
  if (currentTab === 'exams') return allNotifications.filter(n => n.type === 'exam');
  if (currentTab === 'rooms') return allNotifications.filter(n => n.type === 'room');
  if (currentTab === 'likes') return allNotifications.filter(n => n.type === 'like');
  if (currentTab === 'comments') return allNotifications.filter(n => n.type === 'comment');
  return allNotifications;
}

function getNotifIcon(type) {
  if (type === 'exam') return '<svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/></svg>';
  if (type === 'room') return '<svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>';
  if (type === 'like') return '<svg viewBox="0 0 24 24" class="h-5 w-5" fill="#ef4444" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
  if (type === 'comment') return '<svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
  return '<svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="#71717a" stroke-width="2" stroke-linecap="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>';
}

function getIconBg(type) {
  if (type === 'exam')    return 'background:#eef2ff;';
  if (type === 'room')    return 'background:#fff7ed;';
  if (type === 'like')    return 'background:#fff1f2;';
  if (type === 'comment') return 'background:#f0f9ff;';
  return 'background:#f4f4f5;';
}

function formatTimeAgoN(ts) {
  if (!ts) return 'الآن';
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'الآن';
  if (m < 60) return `منذ ${m} د`;
  const h = Math.floor(m / 60);
  if (h < 24) return `منذ ${h} س`;
  const d = Math.floor(h / 24);
  return `منذ ${d} يوم`;
}

function renderList() {
  const el = document.getElementById('notifications-list');
  const list = getFilteredNotifs();

  if (!list.length) {
    el.innerHTML = `<div class="flex flex-col items-center justify-center py-20 text-center gap-3">
      <div class="h-16 w-16 rounded-full bg-zinc-100 flex items-center justify-center">
        <svg viewBox="0 0 24 24" class="h-8 w-8 fill-none stroke-zinc-400" stroke-width="1.6" stroke-linecap="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </div>
      <p class="text-[14px] font-bold text-zinc-400">لا توجد إشعارات في هذا القسم</p>
    </div>`;
    return;
  }

  el.innerHTML = `<div class="space-y-3">${list.map(n => `
    <div class="rounded-[18px] border p-4 shadow-sm ${n.unread ? 'border-zinc-300 bg-white' : 'border-zinc-200 bg-zinc-50'}">
      <div class="flex items-start gap-3">
        <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full" style="${getIconBg(n.type)}">
          ${getNotifIcon(n.type)}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-[14px] font-bold text-zinc-800 leading-snug">${n.text || 'إشعار جديد'}</p>
          ${n.subject ? `<p class="mt-0.5 text-[11px] font-bold text-indigo-600">${n.examType || ''} · ${n.subject}</p>` : ''}
          <p class="mt-1.5 text-[12px] text-zinc-500">${formatTimeAgoN(n.publishedAt || n.timestamp)}</p>
        </div>
        <div class="mt-1 h-2.5 w-2.5 shrink-0 rounded-full ${n.unread ? 'bg-rose-500' : 'bg-zinc-300'}"></div>
      </div>
    </div>`).join('')}</div>`;
}

function showShimmer() {
  const el = document.getElementById('notifications-list');
  el.innerHTML = `<div class="space-y-3">${[1,2,3].map(() => `
    <div class="rounded-[18px] border border-zinc-200 bg-white p-4">
      <div class="flex items-start gap-3">
        <div class="shimmer h-10 w-10 rounded-full shrink-0"></div>
        <div class="flex-1 space-y-2">
          <div class="shimmer h-3.5 w-3/4 rounded-full"></div>
          <div class="shimmer h-3 w-1/3 rounded-full"></div>
        </div>
        <div class="shimmer h-2.5 w-2.5 rounded-full mt-1 shrink-0"></div>
      </div>
    </div>`).join('')}</div>`;
}

// ─── جلب إشعارات التمارين من Firebase المعنية بالمستخدم الحالي ───
async function fetchExamNotifications() {
  const myUid      = localStorage.getItem('yadwor-uid') || '';
  const myType     = localStorage.getItem('yadwor-account-type') || '';
  const allReqs    = JSON.parse(localStorage.getItem('yadwor-join-requests') || '[]');

  // الطلب المقبول للمستخدم الحالي
  const myReq = allReqs.find(r =>
    r.status === 'accepted' && (r.uid === myUid || r.userId === myUid)
  );

  try {
    const res = await fetch(`${FB_DB_URL_N}/notifications.json?auth=${FB_API_KEY_N}`);
    if (!res.ok) return [];
    const data = await res.json();
    if (!data || typeof data !== 'object') return [];

    const list = Object.values(data).filter(n => n && n.type === 'exam');

    // فلترة: تظهر للتلميذ فقط إذا كان عنده نفس المؤسسة ونفس المستوى وفي نفس المادة
    return list.filter(n => {
      if (myType === 'teacher') {
        // الأستاذ لا يرى إشعارات تمارين الآخرين
        return n.teacherUid === myUid;
      }
      if (myType === 'student') {
        if (!myReq) return false;
        const sameInstitution = myReq.institutionUid === n.institutionUid || myReq.institutionId === n.institutionUid;
        const sameLevel = myReq.levelId === n.levelId;
        const mySubjectNames = (myReq.subjects || []).map(s => s.name || s);
        const sameSubject = mySubjectNames.includes(n.subject);
        return sameInstitution && sameLevel && sameSubject;
      }
      return false;
    }).sort((a, b) => (b.publishedAt || 0) - (a.publishedAt || 0));
  } catch(e) { return []; }
}

// ─── جلب إشعارات اللايكات والتعليقات من منشوراتي ───
function getLocalNotifications() {
  const myUid   = localStorage.getItem('yadwor-uid') || '';
  const result  = [];
  const stored  = JSON.parse(localStorage.getItem('yadwor-notifications-local') || '[]');
  return stored.filter(n => n.ownerUid === myUid || !n.ownerUid);
}

// ─── تحديث badge الجرس في كل الصفحات ───
function updateBellBadge(count) {
  localStorage.setItem('yadwor-notif-count', String(count));
}

async function loadNotifications() {
  showShimmer();

  // جلب إشعارات التمارين من Firebase
  const examNotifs = await fetchExamNotifications();

  // إشعارات اللايكات والتعليقات من localStorage
  const localNotifs = getLocalNotifications();

  allNotifications = [...examNotifs, ...localNotifs]
    .sort((a, b) => (b.publishedAt || b.timestamp || 0) - (a.publishedAt || a.timestamp || 0));

  // تحديث العدد للـ badge
  const unreadCount = allNotifications.filter(n => n.unread).length;
  updateBellBadge(unreadCount);

  renderList();

  // تمييز الكل كمقروء بعد 2 ثانية
  setTimeout(() => {
    allNotifications.forEach(n => n.unread = false);
    localStorage.setItem('yadwor-notif-count', '0');
  }, 2000);
}

loadNotifications();
</script>
<script src="floating-room.js"></script>
</body>
</html>
