<script>
const FB_DB_URL_N  = 'https://a-comment-5a3e5-default-rtdb.firebaseio.com';
const FB_API_KEY_N = 'AIzaSyAP-xRJ5zvHvMmqkkVvXnWdqwfuuj58CcA';

let currentTab = 'all';
let allNotifications = [];

function setNotifTab(tab) {
  currentTab = tab;
  ['all','exams','rooms','likes','comments'].forEach(t => {
    const btn = document.getElementById('ntab-' + t);
    if (btn) btn.className = 'notif-tab ' + (t === tab ? 'active' : '') + ' px-4 py-3 text-[13px] shrink-0';
  });
  renderList();
}

function getFilteredNotifs() {
  if (currentTab === 'all') return allNotifications;
  if (currentTab === 'exams') return allNotifications.filter(n => n.type === 'exam');
  if (currentTab === 'rooms') return allNotifications.filter(n => n.type === 'room');
  if (currentTab === 'likes') return allNotifications.filter(n => n.type === 'like');
  if (currentTab === 'comments') return allNotifications.filter(n => n.type === 'comment');
  if (currentTab === 'rooms') return allNotifications.filter(n => n.type === 'room' || n.type === 'live_room');
  return allNotifications;
}

function getNotifIcon(type) {
  if (type === 'exam') return '<svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/></svg>';
  if (type === 'room') return '<svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>';
  if (type === 'like') return '<svg viewBox="0 0 24 24" class="h-5 w-5" fill="#ef4444" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
  if (type === 'comment') return '<svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
  return '<svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="#71717a" stroke-width="2" stroke-linecap="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>';
}

function getIconBg(type) {
  if (type === 'exam')    return 'background:#eef2ff;';
  if (type === 'room')    return 'background:#fff7ed;';
  if (type === 'like')    return 'background:#fff1f2;';
  if (type === 'comment') return 'background:#f0f9ff;';
  return 'background:#f4f4f5;';
}

function formatTimeAgoN(ts) {
  if (!ts) return 'الآن';
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'الآن';
  if (m < 60) return `منذ ${m} د`;
  const h = Math.floor(m / 60);
  if (h < 24) return `منذ ${h} س`;
  const d = Math.floor(h / 24);
  return `منذ ${d} يوم`;
}

function renderList() {
  const el = document.getElementById('notifications-list');
  const list = getFilteredNotifs();

  if (!list.length) {
    el.innerHTML = `<div class="flex flex-col items-center justify-center py-20 text-center gap-3">
      <div class="h-16 w-16 rounded-full bg-zinc-100 flex items-center justify-center">
        <svg viewBox="0 0 24 24" class="h-8 w-8 fill-none stroke-zinc-400" stroke-width="1.6" stroke-linecap="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </div>
      <p class="text-[14px] font-bold text-zinc-400">لا توجد إشعارات في هذا القسم</p>
    </div>`;
    return;
  }

  el.innerHTML = `<div class="space-y-3">${list.map(n => {
    const isRoom = (n.type === 'room' || n.type === 'live_room');

    // إشعار التمرين → ينقل لصفحة الأستاذ
    const clickAttr = (!isRoom && n.type === 'exam' && n.teacherUid)
      ? `onclick="window.location.href='profile.html?uid=${n.teacherUid}'" style="cursor:pointer;"`
      : '';

    // بناء محتوى إشعار الغرفة
    let roomExtra = '';
    if (isRoom) {
      const badges = [];
      if (n.levelName) badges.push(`<span style="background:#e8f0fe;color:#0d47a1;font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;">📚 ${n.levelName}</span>`);
      if (n.subject)   badges.push(`<span style="background:#fce4ec;color:#c62828;font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;">✏️ ${n.subject}</span>`);
      if (n.roomType === 'private') badges.push(`<span style="background:#fff3e0;color:#e65100;font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;">🔒 خاصة</span>`);
      else badges.push(`<span style="background:#e8f5e9;color:#2e7d32;font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;">🌐 عامة</span>`);

      const badgesHtml = badges.length ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;">${badges.join('')}</div>` : '';

      const codeHtml = (n.showCode && n.roomCode)
        ? `<div style="margin-top:6px;background:#f0f4ff;border-radius:8px;padding:5px 10px;display:flex;align-items:center;gap:6px;"><svg viewBox="0 0 24 24" style="width:12px;height:12px;fill:none;stroke:#0d47a1;stroke-width:2;stroke-linecap:round;flex-shrink:0;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span style="font-size:11px;font-weight:900;color:#0d47a1;font-family:'Tajawal',sans-serif;">كلمة السر: <span style="letter-spacing:1px;">${n.roomCode}</span></span></div>`
        : '';

      const joinBtn = n.roomId
        ? `<button onclick="joinRoomFromNotif('${n.roomId}','${n.roomType||'public'}','${n.roomCode||''}')" style="margin-top:8px;width:100%;padding:9px;background:linear-gradient(135deg,#0d47a1,#1565c0);color:#fff;border:none;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;">
            <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            دخول الغرفة مباشرة
          </button>`
        : '';

      roomExtra = badgesHtml + codeHtml + joinBtn;
    }

    return `
    <div class="rounded-[18px] border p-4 shadow-sm ${n.unread ? 'border-zinc-300 bg-white' : 'border-zinc-200 bg-zinc-50'}" ${clickAttr}>
      <div class="flex items-start gap-3">
        <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full" style="${getIconBg(isRoom ? 'room' : n.type)}">
          ${isRoom ? getRoomNotifAvatar(n) : getNotifIcon(n.type)}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-[14px] font-bold text-zinc-800 leading-snug">${n.text || (isRoom ? `🔴 ${n.ownerName || ''} بدأ بثاً مباشراً` : 'إشعار جديد')}</p>
          ${!isRoom && n.subject ? `<p class="mt-0.5 text-[11px] font-bold text-indigo-600">${n.examType || ''} · ${n.subject}</p>` : ''}
          ${!isRoom && n.type === 'exam' && n.teacherName ? `<p class="mt-0.5 text-[11px] text-zinc-400 font-bold">👨‍🏫 ${n.teacherName}</p>` : ''}
          ${roomExtra}
          <p class="mt-1.5 text-[12px] text-zinc-500">${formatTimeAgoN(n.publishedAt || n.ts || n.timestamp)}</p>
        </div>
        <div class="flex flex-col items-center gap-1">
          <div class="mt-1 h-2.5 w-2.5 shrink-0 rounded-full ${n.unread ? 'bg-rose-500' : 'bg-zinc-300'}"></div>
          ${!isRoom && n.type === 'exam' ? `<svg viewBox="0 0 24 24" class="h-3.5 w-3.5 fill-none stroke-zinc-400 mt-1" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>` : ''}
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function getRoomNotifAvatar(n) {
  if (n.ownerAvatar) {
    return `<img src="${n.ownerAvatar}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;" onerror="this.style.display='none'">`;
  }
  return `<svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>`;
}

function joinRoomFromNotif(roomId, roomType, roomCode) {
  const user = {
    uid:    localStorage.getItem('yadwor-uid') || '',
    name:   localStorage.getItem('yadwor-settings-name') || localStorage.getItem('yadwor-user-name') || 'مستخدم',
    avatar: localStorage.getItem('yadwor-avatar-preview') || ''
  };
  localStorage.setItem('yw_room_target', JSON.stringify({roomId, roomType, roomCode, roomName:''}));
  localStorage.setItem('yw_active_room', JSON.stringify({roomId, isOwner:false, roomType, roomCode, roomMode:'video'}));
  localStorage.setItem('yw_room_mode', 'video');
  localStorage.setItem('yw_current_user', JSON.stringify(user));
  window.location.href = 'roomvideo.html';
}

function showShimmer() {
  const el = document.getElementById('notifications-list');
  el.innerHTML = `<div class="space-y-3">${[1,2,3].map(() => `
    <div class="rounded-[18px] border border-zinc-200 bg-white p-4">
      <div class="flex items-start gap-3">
        <div class="shimmer h-10 w-10 rounded-full shrink-0"></div>
        <div class="flex-1 space-y-2">
          <div class="shimmer h-3.5 w-3/4 rounded-full"></div>
          <div class="shimmer h-3 w-1/3 rounded-full"></div>
        </div>
        <div class="shimmer h-2.5 w-2.5 rounded-full mt-1 shrink-0"></div>
      </div>
    </div>`).join('')}</div>`;
}

// ─── جلب إشعارات التمارين من Firebase ───
async function fetchExamNotifications(myUid, myType, myReq, myInstOwnerUid) {
  try {
    const res = await fetch(`${FB_DB_URL_N}/notifications.json?auth=${FB_API_KEY_N}`);
    if (!res.ok) return [];
    const data = await res.json();
    if (!data || typeof data !== 'object') return [];

    const lastRead = parseInt(localStorage.getItem('yadwor-notif-last-read') || '0');
    const list = Object.values(data).filter(n => n && n.type === 'exam');

    return list.filter(n => {
      // الأستاذ الناشر نفسه لا يرى إشعار تمرينه
      if (n.teacherUid === myUid) return false;
      // أساتذة آخرون لا يرون الإشعار
      if (myType === 'teacher') return false;

      if (myType === 'student') {
        if (!myReq) return false;
        const sameInst   = (myReq.institutionUid || myReq.institutionId || '') === (n.institutionUid || '');
        const sameLevel  = myReq.levelId === n.levelId;
        const mySubjects = (myReq.subjects || []).map(s => (s.name || s).trim());
        const sameSub    = mySubjects.includes((n.subject || '').trim());
        return sameInst && sameLevel && sameSub;
      }

      // صاحب المؤسسة يرى كل إشعارات مؤسسته
      if (myType === 'institution') {
        return (n.institutionUid || '') === myUid;
      }

      return false;
    }).map(n => ({
      ...n,
      unread: (n.publishedAt || 0) > lastRead
    })).sort((a, b) => (b.publishedAt || 0) - (a.publishedAt || 0));
  } catch(e) { return []; }
}

// ─── جلب إشعارات الغرف المباشرة من Firebase ───
async function fetchRoomNotifications(myUid, myType, myReq) {
  try {
    const res = await fetch(`${FB_DB_URL_N}/notificationsRoom.json?auth=${FB_API_KEY_N}`);
    if (!res.ok) return [];
    const data = await res.json();
    if (!data || typeof data !== 'object') return [];

    const lastRead = parseInt(localStorage.getItem('yadwor-notif-last-read') || '0');
    const rooms = Object.values(data).filter(n => n && n.roomId);

    return rooms.filter(n => {
      // لا يرى الأستاذ إشعاراته هو
      if (n.ownerUid === myUid) return false;

      // التلميذ: يرى الإشعار إذا تطابق (مؤسسة + مستوى + مادة)
      if (myType === 'student') {
        if (!myReq) return false;
        const sameInst  = !n.institutionId || (myReq.institutionUid || myReq.institutionId || '') === n.institutionId;
        const sameLevel = !n.levelId  || myReq.levelId === n.levelId;
        const mySubs    = (myReq.subjects || []).map(s => (s.name || s).trim());
        const sameSub   = !n.subject || mySubs.includes((n.subject || '').trim());

        // إذا اشترط الأستاذ المؤسسة فقط، نتحقق منها
        if (n.institutionOnly) return sameInst && sameLevel && sameSub;
        return sameLevel && sameSub;
      }

      // أستاذ آخر لا يرى إشعارات البث (إلا إذا كان نوع الغرفة عامة وبدون استهداف)
      if (myType === 'teacher') {
        return n.noTarget && n.roomType === 'public';
      }

      // مؤسسة: ترى إشعارات مؤسستها
      if (myType === 'institution') {
        return n.institutionId === myUid;
      }

      // باقي المستخدمين: الغرف العامة بدون استهداف
      return n.noTarget && n.roomType === 'public';
    }).map(n => ({
      ...n,
      type: 'room',
      unread: (n.ts || 0) > lastRead
    })).sort((a, b) => (b.ts || 0) - (a.ts || 0));
  } catch(e) { return []; }
}


async function fetchInteractionNotifications(myUid) {
  try {
    const res = await fetch(`${FB_DB_URL_N}/interactions/${myUid}.json?auth=${FB_API_KEY_N}`);
    if (!res.ok) return [];
    const data = await res.json();
    if (!data || typeof data !== 'object') return [];
    const lastRead = parseInt(localStorage.getItem('yadwor-notif-last-read') || '0');
    return Object.values(data)
      .filter(n => n && n.type)
      .map(n => ({ ...n, unread: (n.publishedAt || n.timestamp || 0) > lastRead }))
      .sort((a, b) => (b.publishedAt || b.timestamp || 0) - (a.publishedAt || a.timestamp || 0));
  } catch(e) { return []; }
}

async function loadNotifications() {
  showShimmer();

  const myUid  = localStorage.getItem('yadwor-uid') || '';
  const myType = localStorage.getItem('yadwor-account-type') || localStorage.getItem('yadwor-profile-type') || '';

  // ── جلب طلب انضمام المستخدم من Firebase (لا localStorage) ──
  let myReq = null;
  if (myUid) {
    try {
      const allInstRes = await fetch(`${FB_DB_URL_N}/joinRequests.json?auth=${FB_API_KEY_N}`);
      if (allInstRes.ok) {
        const allInst = await allInstRes.json();
        if (allInst && typeof allInst === 'object') {
          for (const instUid of Object.keys(allInst)) {
            const instReqs = allInst[instUid];
            if (!instReqs) continue;
            const found = Object.values(instReqs).find(r =>
              r && r.status === 'accepted' && (r.uid === myUid || r.userId === myUid)
            );
            if (found) { myReq = found; break; }
          }
        }
      }
    } catch(e) {}
  }

  // ── جلب الإشعارات من Firebase ──
  const [examNotifs, interactionNotifs, roomNotifs] = await Promise.all([
    fetchExamNotifications(myUid, myType, myReq),
    fetchInteractionNotifications(myUid),
    fetchRoomNotifications(myUid, myType, myReq)
  ]);

  allNotifications = [...roomNotifs, ...examNotifs, ...interactionNotifs]
    .sort((a, b) => (b.publishedAt || b.ts || b.timestamp || 0) - (a.publishedAt || a.ts || a.timestamp || 0));

  renderList();

  // ── تمييز الكل كمقروء بعد 2 ثانية ──
  setTimeout(() => {
    allNotifications.forEach(n => n.unread = false);
    // حفظ وقت القراءة لكي تعمل updateBellBadgeFromFirebase بشكل صحيح
    localStorage.setItem('yadwor-notif-last-read', String(Date.now()));
    // تحديث badge الجرس
    const badgeEl = document.getElementById('notif-badge');
    if (badgeEl) badgeEl.style.display = 'none';
    renderList();
  }, 2000);
}

loadNotifications();

// ── Realtime listener لإشعارات الغرف الجديدة ──
(function initRoomNotifListener() {
  const myUid  = localStorage.getItem('yadwor-uid') || '';
  const myType = localStorage.getItem('yadwor-account-type') || localStorage.getItem('yadwor-profile-type') || '';
  if (!myUid) return;

  // نستخدم Firebase REST SSE (بسيط وبدون SDK إضافية)
  // نفحص كل 30 ثانية إذا كان هناك غرفة جديدة
  let lastChecked = Date.now();
  setInterval(async () => {
    try {
      const res = await fetch(`${FB_DB_URL_N}/notificationsRoom.json?orderBy="ts"&startAt=${lastChecked}&auth=${FB_API_KEY_N}`);
      if (!res.ok) return;
      const data = await res.json();
      if (!data || typeof data !== 'object') return;
      const newRooms = Object.values(data).filter(n => n && n.ts > lastChecked && n.ownerUid !== myUid);
      if (newRooms.length > 0) {
        lastChecked = Date.now();
        // إعادة تحميل الإشعارات لتضمين الجديدة
        loadNotifications();
      }
    } catch(e) {}
  }, 30000);
})();
</script>
<script src="floating-room.js"></script>
