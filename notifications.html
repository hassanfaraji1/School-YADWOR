<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Tajawal', system-ui, -apple-system, sans-serif; background: #faf8f6; color: #18181b; }
  input:focus { outline: none; }
  .shimmer { animation: shimmer 1.5s infinite; background: linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size: 200% 100%; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#18181b; color:white; padding:8px 18px; border-radius:999px; font-size:13px; font-weight:700; z-index:999; pointer-events:none; opacity:0; transition:opacity .2s; }
  .toast.show { opacity:1; }
  .notif-tab { transition: all .2s; border-bottom: 2px solid transparent; }
  .notif-tab.active { color: #18181b; border-bottom-color: #0D47A1; font-weight: 800; }
  .notif-tab:not(.active) { color: #71717a; font-weight: 700; }

  /* لوني المنصة */
  :root {
    --c-blue:   #0D47A1;
    --c-yellow: #FFC107;
  }

  /* بطاقة الإشعار */
  .notif-card {
    background: #ffffff;
    border: 1.5px solid #e4e4e7;
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 10px;
    transition: background .15s;
  }
  .notif-card.unread {
    border-color: #0D47A1;
    background: #f0f6ff;
  }

  /* أيقونة الإشعار */
  .notif-icon {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: #e8f0fe;
  }

  /* badge صغير (المستوى / المادة / النوع) */
  .notif-badge-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 6px;
    border: 1px solid #0D47A1;
    color: #0D47A1;
    background: transparent;
  }
  .notif-badge-tag.yellow {
    border-color: #FFC107;
    color: #7a5800;
    background: #fffde7;
  }

  /* زر الدخول للغرفة */
  .btn-join-room {
    margin-top: 8px;
    width: 100%;
    padding: 9px 8px;
    background: #0D47A1;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'Tajawal', sans-serif;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn-join-room:active { opacity: .85; }

  /* نقطة الغير مقروء */
  .unread-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #0D47A1;
    flex-shrink: 0;
  }
  .read-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #d4d4d8;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<script src="shared.js"></script>
<script>
const FB_DB_URL_N  = 'https://a-comment-5a3e5-default-rtdb.firebaseio.com';
const FB_API_KEY_N = 'AIzaSyAP-xRJ5zvHvMmqkkVvXnWdqwfuuj58CcA';

let currentTab       = 'all';
let allNotifications = [];
let _lastReadTs      = 0;

// ─── تحميل آخر وقت قراءة من Firebase ───
async function _loadLastRead() {
  const uid = localStorage.getItem('yadwor-uid') || '';
  if (!uid) return;
  try {
    const r = await fetch(FB_DB_URL_N + '/userMeta/' + uid + '/notifLastRead.json?auth=' + FB_API_KEY_N);
    if (r.ok) {
      const v = await r.json();
      if (v && typeof v === 'number') _lastReadTs = v;
    }
  } catch(e) {}
}

// ─── تبويبات ───
function setNotifTab(tab) {
  currentTab = tab;
  ['all','exams','rooms','likes','comments'].forEach(function(t) {
    var btn = document.getElementById('ntab-' + t);
    if (btn) btn.className = 'notif-tab ' + (t === tab ? 'active' : '') + ' px-4 py-3 text-[13px] shrink-0';
  });
  renderList();
}

function getFilteredNotifs() {
  if (currentTab === 'all')      return allNotifications;
  if (currentTab === 'exams')    return allNotifications.filter(function(n){ return n.type === 'exam'; });
  if (currentTab === 'rooms')    return allNotifications.filter(function(n){ return n.type === 'room'; });
  if (currentTab === 'likes')    return allNotifications.filter(function(n){ return n.type === 'like'; });
  if (currentTab === 'comments') return allNotifications.filter(function(n){ return n.type === 'comment' || n.type === 'reply'; });
  return allNotifications;
}

// ─── أيقونات SVG فقط ───
function getNotifIcon(type) {
  // غرفة البث
  if (type === 'room') return (
    '<svg viewBox="0 0 24 24" style="width:20px;height:20px;" fill="none" stroke="#0D47A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
      '<path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.87v6.26a1 1 0 0 1-1.447.9L15 14"/>' +
      '<rect x="1" y="6" width="14" height="12" rx="2"/>' +
    '</svg>'
  );
  // تمرين / اختبار
  if (type === 'exam') return (
    '<svg viewBox="0 0 24 24" style="width:20px;height:20px;" fill="none" stroke="#0D47A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
      '<path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>' +
      '<rect x="9" y="3" width="6" height="4" rx="1"/>' +
      '<path d="M9 12h6M9 16h4"/>' +
    '</svg>'
  );
  // إعجاب
  if (type === 'like') return (
    '<svg viewBox="0 0 24 24" style="width:20px;height:20px;" fill="#FFC107" stroke="#FFC107" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
      '<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>' +
    '</svg>'
  );
  // تعليق
  if (type === 'comment') return (
    '<svg viewBox="0 0 24 24" style="width:20px;height:20px;" fill="none" stroke="#0D47A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
      '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>' +
    '</svg>'
  );
  // رد على تعليق
  if (type === 'reply') return (
    '<svg viewBox="0 0 24 24" style="width:20px;height:20px;" fill="none" stroke="#0D47A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
      '<polyline points="9 17 4 12 9 7"/>' +
      '<path d="M20 18v-2a4 4 0 0 0-4-4H4"/>' +
    '</svg>'
  );
  // افتراضي
  return (
    '<svg viewBox="0 0 24 24" style="width:20px;height:20px;" fill="none" stroke="#0D47A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
      '<path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/>' +
      '<path d="M13.73 21a2 2 0 0 1-3.46 0"/>' +
    '</svg>'
  );
}

// لون خلفية أيقونة بلون المنصة فقط
function getIconBg(type) {
  if (type === 'like') return 'background:#fffde7;';   // أصفر فاتح جداً
  return 'background:#e8f0fe;';                        // أزرق فاتح جداً
}

function formatTimeAgoN(ts) {
  if (!ts) return 'الآن';
  var diff = Date.now() - ts;
  var m = Math.floor(diff / 60000);
  if (m < 1)  return 'الآن';
  if (m < 60) return 'منذ ' + m + ' د';
  var h = Math.floor(m / 60);
  if (h < 24) return 'منذ ' + h + ' س';
  return 'منذ ' + Math.floor(h / 24) + ' يوم';
}

// ================================================================
// نافذة كلمة السر للغرف الخاصة
// ================================================================
function _showPasswordModal(roomId, correctCode) {
  var old = document.getElementById('_roomPassModal');
  if (old) old.remove();
  var modal = document.createElement('div');
  modal.id = '_roomPassModal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;padding:20px;font-family:Tajawal,sans-serif;direction:rtl;';
  modal.innerHTML =
    '<div style="background:#fff;border-radius:12px;padding:24px 20px;width:100%;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,0.25);">' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">' +
        '<div style="background:#e8f0fe;border-radius:6px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' +
          '<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:#0D47A1;stroke-width:2;stroke-linecap:round;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>' +
        '</div>' +
        '<div>' +
          '<div style="font-size:15px;font-weight:800;color:#111;">غرفة خاصة</div>' +
          '<div style="font-size:12px;color:#888;margin-top:1px;">أدخل كلمة السر للدخول</div>' +
        '</div>' +
      '</div>' +
      '<input id="_roomPassInput" type="password" placeholder="كلمة السر..."' +
        ' style="width:100%;padding:12px 14px;border:2px solid #e0e6ed;border-radius:6px;font-family:Tajawal,sans-serif;font-size:15px;font-weight:700;outline:none;margin-bottom:8px;direction:ltr;text-align:center;letter-spacing:2px;"' +
        ' oninput="document.getElementById(\'_roomPassErr\').style.display=\'none\'">' +
      '<div id="_roomPassErr" style="display:none;color:#e53935;font-size:12px;font-weight:700;text-align:center;margin-bottom:8px;">كلمة السر غير صحيحة</div>' +
      '<div style="display:flex;gap:10px;margin-top:4px;">' +
        '<button onclick="_confirmRoomPass(\'' + roomId + '\',\'' + correctCode + '\')"' +
          ' style="flex:1;padding:12px;background:#0D47A1;color:#fff;border:none;border-radius:6px;font-family:Tajawal,sans-serif;font-size:14px;font-weight:800;cursor:pointer;">دخول</button>' +
        '<button onclick="document.getElementById(\'_roomPassModal\').remove()"' +
          ' style="flex:1;padding:12px;background:#f1f3f5;color:#333;border:none;border-radius:6px;font-family:Tajawal,sans-serif;font-size:14px;font-weight:700;cursor:pointer;">إلغاء</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(modal);
  setTimeout(function() {
    var inp = document.getElementById('_roomPassInput');
    if (inp) {
      inp.focus();
      inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') _confirmRoomPass(roomId, correctCode); });
    }
  }, 100);
}

function _confirmRoomPass(roomId, correctCode) {
  var inp = document.getElementById('_roomPassInput');
  var errEl = document.getElementById('_roomPassErr');
  var entered = inp ? inp.value.trim() : '';
  if (entered !== correctCode) {
    if (errEl) errEl.style.display = 'block';
    if (inp) { inp.style.borderColor = '#e53935'; setTimeout(function(){ inp.style.borderColor = '#e0e6ed'; }, 1500); }
    return;
  }
  document.getElementById('_roomPassModal').remove();
  _doJoinRoom(roomId, 'private', correctCode);
}

function _doJoinRoom(roomId, roomType, roomCode) {
  var uid    = localStorage.getItem('yadwor-uid') || '';
  var name   = localStorage.getItem('yadwor-settings-name') || localStorage.getItem('yadwor-user-name') || 'مستخدم';
  var avatar = localStorage.getItem('yadwor-avatar-preview') || '';
  localStorage.setItem('yw_room_target',  JSON.stringify({roomId: roomId, roomType: roomType, roomCode: roomCode, roomName: ''}));
  localStorage.setItem('yw_active_room',  JSON.stringify({roomId: roomId, isOwner: false, roomType: roomType, roomCode: roomCode, roomMode: 'video'}));
  localStorage.setItem('yw_room_mode',    'video');
  localStorage.setItem('yw_current_user', JSON.stringify({uid: uid, name: name, avatar: avatar}));
  window.location.href = 'roomvideo.html';
}

function joinRoomFromNotif(roomId, roomType, roomCode) {
  if (roomType === 'private') { _showPasswordModal(roomId, roomCode); }
  else { _doJoinRoom(roomId, roomType, roomCode); }
}

// ================================================================
// renderList
// ================================================================
function renderList() {
  var el = document.getElementById('notifications-list');
  var list = getFilteredNotifs();

  if (!list.length) {
    el.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;text-align:center;gap:12px;">' +
        '<div style="width:64px;height:64px;border-radius:6px;background:#f4f4f5;display:flex;align-items:center;justify-content:center;">' +
          '<svg viewBox="0 0 24 24" style="width:32px;height:32px;" fill="none" stroke="#a1a1aa" stroke-width="1.6" stroke-linecap="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>' +
        '</div>' +
        '<p style="font-size:14px;font-weight:700;color:#a1a1aa;">لا توجد إشعارات في هذا القسم</p>' +
      '</div>';
    return;
  }

  var html = '<div>';
  list.forEach(function(n) {
    var isRoom    = n.type === 'room';
    var isLike    = n.type === 'like';
    var isComment = n.type === 'comment';
    var isReply   = n.type === 'reply';
    var isExam    = n.type === 'exam';
    var unread    = !!n.unread;

    var clickAttr = (isExam && n.teacherUid)
      ? ' onclick="window.location.href=\'profile.html?uid=' + n.teacherUid + '\'" style="cursor:pointer;"'
      : '';

    // ── أيقونة / صورة ──
    var iconHtml;
    if (isRoom && n.ownerAvatar) {
      iconHtml = '<img src="' + n.ownerAvatar + '" style="width:40px;height:40px;object-fit:cover;border-radius:6px;" onerror="this.style.display=\'none\'">';
    } else {
      iconHtml = getNotifIcon(n.type);
    }

    // ── نص رئيسي ──
    var mainText = n.text || '';
    if (!mainText) {
      if (isRoom)    mainText = (n.ownerName || 'أستاذ') + ' بدأ بثاً مباشراً';
      else if (isLike)    mainText = (n.fromName || 'شخص') + ' أعجب بمنشورك';
      else if (isComment) mainText = (n.fromName || 'شخص') + ' علّق على منشورك';
      else if (isReply)   mainText = (n.fromName || 'شخص') + ' ردّ على تعليقك';
      else mainText = 'إشعار جديد';
    }

    // ── badges (المستوى / المادة / النوع) ─ لونا المنصة فقط ──
    var badgesHtml = '';
    if (isRoom) {
      var tags = [];
      if (n.levelName) {
        tags.push(
          '<span class="notif-badge-tag">' +
            '<svg viewBox="0 0 24 24" style="width:10px;height:10px;" fill="none" stroke="#0D47A1" stroke-width="2.5" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>' +
            n.levelName +
          '</span>'
        );
      }
      if (n.subject) {
        tags.push(
          '<span class="notif-badge-tag yellow">' +
            '<svg viewBox="0 0 24 24" style="width:10px;height:10px;" fill="none" stroke="#7a5800" stroke-width="2.5" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>' +
            n.subject +
          '</span>'
        );
      }
      if (n.roomType === 'private') {
        tags.push(
          '<span class="notif-badge-tag">' +
            '<svg viewBox="0 0 24 24" style="width:10px;height:10px;" fill="none" stroke="#0D47A1" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>' +
            'خاصة' +
          '</span>'
        );
      } else {
        tags.push(
          '<span class="notif-badge-tag">' +
            '<svg viewBox="0 0 24 24" style="width:10px;height:10px;" fill="none" stroke="#0D47A1" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>' +
            'عامة' +
          '</span>'
        );
      }
      if (tags.length) badgesHtml = '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;">' + tags.join('') + '</div>';
    }

    // ── كود الغرفة ──
    var codeHtml = '';
    if (isRoom && n.showCode && n.roomCode) {
      codeHtml =
        '<div style="margin-top:6px;background:#e8f0fe;border-radius:6px;padding:5px 10px;display:flex;align-items:center;gap:6px;">' +
          '<svg viewBox="0 0 24 24" style="width:11px;height:11px;flex-shrink:0;fill:none;stroke:#0D47A1;stroke-width:2;stroke-linecap:round;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>' +
          '<span style="font-size:11px;font-weight:900;color:#0D47A1;font-family:Tajawal,sans-serif;">كلمة السر: <b style="letter-spacing:2px;">' + n.roomCode + '</b></span>' +
        '</div>';
    }

    // ── زر الدخول ──
    var btnHtml = '';
    if (isRoom && n.roomId) {
      var isPrivate = n.roomType === 'private';
      var lockIcon = isPrivate
        ? '<svg viewBox="0 0 24 24" style="width:12px;height:12px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;flex-shrink:0;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'
        : '<svg viewBox="0 0 24 24" style="width:12px;height:12px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;flex-shrink:0;"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>';
      btnHtml =
        '<button class="btn-join-room" onclick="joinRoomFromNotif(\'' + n.roomId + '\',\'' + (n.roomType||'public') + '\',\'' + (n.roomCode||'') + '\')">' +
          lockIcon +
          (isPrivate ? 'دخول الغرفة' : 'دخول الغرفة') +
        '</button>';
    }

    // ── معلومات إضافية للتمارين ──
    var examMeta = '';
    if (isExam) {
      if (n.subject) examMeta += '<p style="margin:3px 0 0;font-size:11px;font-weight:700;color:#0D47A1;">' + (n.examType||'') + (n.examType && n.subject ? ' · ' : '') + n.subject + '</p>';
      if (n.teacherName) examMeta += '<p style="margin:2px 0 0;font-size:11px;font-weight:700;color:#a1a1aa;">' + n.teacherName + '</p>';
    }

    html +=
      '<div class="notif-card' + (unread ? ' unread' : '') + '"' + clickAttr + '>' +
        '<div style="display:flex;align-items:flex-start;gap:12px;">' +
          '<div class="notif-icon" style="' + getIconBg(n.type) + '">' + iconHtml + '</div>' +
          '<div style="flex:1;min-width:0;">' +
            '<p style="font-size:14px;font-weight:700;color:#18181b;line-height:1.4;margin:0;">' + mainText + '</p>' +
            examMeta +
            badgesHtml +
            codeHtml +
            btnHtml +
            '<p style="margin:6px 0 0;font-size:11px;color:#a1a1aa;">' + formatTimeAgoN(n.publishedAt || n.ts || n.timestamp) + '</p>' +
          '</div>' +
          '<div style="margin-top:3px;flex-shrink:0;">' +
            '<div class="' + (unread ? 'unread-dot' : 'read-dot') + '"></div>' +
          '</div>' +
        '</div>' +
      '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

// ─── Shimmer ───
function showShimmer() {
  var el = document.getElementById('notifications-list');
  var rows = '';
  for (var i = 0; i < 3; i++) {
    rows +=
      '<div class="notif-card">' +
        '<div style="display:flex;align-items:flex-start;gap:12px;">' +
          '<div class="shimmer" style="width:40px;height:40px;border-radius:6px;flex-shrink:0;"></div>' +
          '<div style="flex:1;display:flex;flex-direction:column;gap:8px;">' +
            '<div class="shimmer" style="height:14px;border-radius:4px;width:75%;"></div>' +
            '<div class="shimmer" style="height:12px;border-radius:4px;width:40%;"></div>' +
          '</div>' +
          '<div class="shimmer" style="width:9px;height:9px;border-radius:50%;margin-top:3px;flex-shrink:0;"></div>' +
        '</div>' +
      '</div>';
  }
  el.innerHTML = rows;
}

// ─── جلب إشعارات الغرف ───
async function fetchRoomNotifications(myUid, myType, myReq) {
  try {
    var res = await fetch(FB_DB_URL_N + '/notificationsRoom.json?auth=' + FB_API_KEY_N);
    if (!res.ok) return [];
    var data = await res.json();
    if (!data || typeof data !== 'object') return [];

    return Object.values(data).filter(function(n) {
      if (!n || !n.roomId) return false;
      if (n.ownerUid === myUid) return false;
      if (myType === 'student') {
        if (!myReq) return false;
        var myInstId = myReq.institutionUid || myReq.institutionId || '';
        var sameInst  = !n.institutionOnly || myInstId === (n.institutionUid || '');
        var sameLevel = !n.levelId || myReq.levelId === n.levelId;
        var mySubs    = (myReq.subjects || []).map(function(s){ return (s.name || s).trim(); });
        var sameSub   = !n.subject || mySubs.includes((n.subject||'').trim());
        return sameInst && sameLevel && sameSub;
      }
      return n.noTarget && n.roomType === 'public';
    }).map(function(n) {
      return Object.assign({}, n, { type: 'room', unread: (n.ts || 0) > _lastReadTs });
    }).sort(function(a, b) { return (b.ts||0) - (a.ts||0); });
  } catch(e) { return []; }
}

// ─── جلب إشعارات التمارين ───
async function fetchExamNotifications(myUid, myType, myReq) {
  try {
    var res = await fetch(FB_DB_URL_N + '/notifications.json?auth=' + FB_API_KEY_N);
    if (!res.ok) return [];
    var data = await res.json();
    if (!data || typeof data !== 'object') return [];
    var list = Object.values(data).filter(function(n){ return n && n.type === 'exam'; });

    return list.filter(function(n) {
      if (n.teacherUid === myUid) return false;
      if (myType === 'teacher') return false;
      if (myType === 'student') {
        if (!myReq) return false;
        var sameInst  = (myReq.institutionUid || myReq.institutionId || '') === (n.institutionUid || '');
        var sameLevel = myReq.levelId === n.levelId;
        var mySubs    = (myReq.subjects || []).map(function(s){ return (s.name||s).trim(); });
        var sameSub   = mySubs.includes((n.subject||'').trim());
        return sameInst && sameLevel && sameSub;
      }
      if (myType === 'institution') return (n.institutionUid || '') === myUid;
      return false;
    }).map(function(n) {
      return Object.assign({}, n, { unread: (n.publishedAt||0) > _lastReadTs });
    }).sort(function(a, b) { return (b.publishedAt||0) - (a.publishedAt||0); });
  } catch(e) { return []; }
}

// ─── جلب إشعارات التفاعلات (لايك / تعليق / رد) ───
async function fetchInteractionNotifications(myUid) {
  try {
    var res = await fetch(FB_DB_URL_N + '/interactions/' + myUid + '.json?auth=' + FB_API_KEY_N);
    if (!res.ok) return [];
    var data = await res.json();
    if (!data || typeof data !== 'object') return [];
    return Object.values(data)
      .filter(function(n){ return n && (n.type === 'like' || n.type === 'comment' || n.type === 'reply'); })
      .map(function(n){ return Object.assign({}, n, { unread: (n.publishedAt||n.timestamp||0) > _lastReadTs }); })
      .sort(function(a, b){ return (b.publishedAt||b.timestamp||0) - (a.publishedAt||a.timestamp||0); });
  } catch(e) { return []; }
}

// ─── التحميل الرئيسي ───
async function loadNotifications() {
  showShimmer();

  // جلب آخر وقت قراءة من Firebase أولاً
  await _loadLastRead();

  var myUid  = localStorage.getItem('yadwor-uid') || '';
  var myType = localStorage.getItem('yadwor-account-type') || localStorage.getItem('yadwor-profile-type') || '';

  var myReq = null;
  if (myUid) {
    try {
      var r = await fetch(FB_DB_URL_N + '/joinRequests.json?auth=' + FB_API_KEY_N);
      if (r.ok) {
        var all = await r.json();
        if (all && typeof all === 'object') {
          var instKeys = Object.keys(all);
          for (var i = 0; i < instKeys.length; i++) {
            var instVals = Object.values(all[instKeys[i]] || {});
            var found = instVals.find(function(req){ return req && req.status === 'accepted' && (req.uid === myUid || req.userId === myUid); });
            if (found) { myReq = found; break; }
          }
        }
      }
    } catch(e) {}
  }

  var results = await Promise.all([
    fetchRoomNotifications(myUid, myType, myReq),
    fetchExamNotifications(myUid, myType, myReq),
    fetchInteractionNotifications(myUid)
  ]);

  allNotifications = [].concat(results[0], results[1], results[2])
    .sort(function(a, b){ return (b.publishedAt||b.ts||b.timestamp||0) - (a.publishedAt||a.ts||a.timestamp||0); });

  renderList();

  // تمييز كمقروء بعد 2 ثانية
  setTimeout(function() {
    _lastReadTs = Date.now();
    allNotifications.forEach(function(n){ n.unread = false; });
    if (typeof markNotificationsRead === 'function') {
      markNotificationsRead(_lastReadTs);
    }
    renderList();
  }, 2000);
}

// ─── Firebase Realtime Listener (SSE) ───
(function startRealtimeListener() {
  var myUid = localStorage.getItem('yadwor-uid') || '';
  if (!myUid) return;

  function listenPath(path) {
    var url = FB_DB_URL_N + '/' + path + '.json?auth=' + FB_API_KEY_N;
    try {
      var src = new EventSource(url);
      src.addEventListener('put',   function(e){ try { var p = JSON.parse(e.data); if (p && p.data) loadNotifications(); } catch(x){} });
      src.addEventListener('patch', function(e){ try { var p = JSON.parse(e.data); if (p && p.data) loadNotifications(); } catch(x){} });
      src.onerror = function(){ src.close(); setTimeout(function(){ listenPath(path); }, 8000); };
    } catch(e) {}
  }

  listenPath('notificationsRoom');
  listenPath('notifications');
  listenPath('interactions/' + myUid);
})();

loadNotifications();
</script>
