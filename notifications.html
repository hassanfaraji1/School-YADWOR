<style>
*{box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:#f5f6fa;color:#18181b;margin:0}
:root{--blue:#0D47A1;--yellow:#333}
input:focus{outline:none}

/* shimmer */
.shimmer{animation:shimmer 1.5s infinite;background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#18181b;color:#fff;padding:8px 18px;border-radius:999px;font-size:13px;font-weight:700;z-index:9999;pointer-events:none;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}

/* tabs */
.n-tab{border-bottom:2px solid transparent;font-size:13px;font-weight:700;color:#71717a;padding:10px 14px;white-space:nowrap;transition:.2s;background:none;border-top:none;border-left:none;border-right:none;cursor:pointer}
.n-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:800}

/* ─── بطاقة إشعار — تصميم أنيق نظيف ─── */
.ncard{
  background:#fff;
  border:1px solid #ebebef;
  border-radius:16px;
  padding:14px 14px 12px;
  margin-bottom:10px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  transition:box-shadow .18s;
}
.ncard:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.ncard.unread{border-color:#d4e2ff;background:#f8f9ff;}

/* نقطة القراءة */
.n-dot-unread{width:8px;height:8px;border-radius:50%;background:#3b6eff;flex-shrink:0;margin-top:4px}
.n-dot-read  {width:8px;height:8px;border-radius:50%;background:transparent;flex-shrink:0;margin-top:4px}

/* أيقونة دائرية ملونة */
.n-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.n-icon-like    {background:linear-gradient(135deg,#ff6b6b,#ff4757)}
.n-icon-comment {background:linear-gradient(135deg,#48dbfb,#0abde3)}
.n-icon-reply   {background:linear-gradient(135deg,#a29bfe,#6c5ce7)}
.n-icon-follow  {background:linear-gradient(135deg,#55efc4,#00b894)}
.n-icon-room    {background:linear-gradient(135deg,#fd79a8,#e84393)}
.n-icon-exam    {background:linear-gradient(135deg,#fdcb6e,#e17055)}
.n-icon-default {background:linear-gradient(135deg,#74b9ff,#0984e3)}

/* اسم الشخص */
.n-who{font-size:14px;font-weight:800;color:#18181b;line-height:1.3}
.n-who span{color:#3b6eff}

/* النص الفرعي */
.n-sub{font-size:12px;color:#6b7280;margin-top:2px;line-height:1.4}

/* وقت */
.n-time{font-size:11px;color:#b0b8c8;margin-top:5px}

/* tags — بدون خلفيه — نص فقط مع أيقونة صغيرة */
.n-meta{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:6px}
.n-meta-item{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:#374151}
.n-meta-sep{color:#d1d5db;font-size:11px}

/* LIVE badge */
.live-badge{display:inline-flex;align-items:center;gap:3px;background:#fff0f0;border:1px solid #fecaca;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:900;color:#dc2626;letter-spacing:.3px}
.live-dot{width:5px;height:5px;border-radius:50%;background:#dc2626;animation:livePulse 1.2s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* كلمة السر - سطر واحد بسيط */
.room-pass-inline{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;color:#1e3a8a;margin-right:4px}

/* زر دخول الغرفة */
.btn-room{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:10px;padding:10px;background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;border:none;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:.3px;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.btn-room:active{opacity:.88}

/* اقتباس التعليق */
.n-quote{background:#f8f9fc;border-right:3px solid #d1d5db;border-radius:0 6px 6px 0;padding:5px 9px;margin-top:5px;font-size:12px;color:#555;line-height:1.5}

/* نافذة الإعدادات */
.settings-overlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:20px;font-family:'Tajawal',sans-serif;direction:rtl}
.settings-box{background:#fff;border-radius:12px;width:100%;max-width:340px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.settings-head{background:var(--blue);padding:16px 18px;display:flex;align-items:center;gap:10px}
.settings-head svg{flex-shrink:0}
.settings-head h3{color:#fff;font-size:15px;font-weight:800;margin:0}
.settings-body{padding:18px}
.phone-row{display:flex;gap:8px;margin-bottom:12px}
.phone-prefix{display:flex;align-items:center;gap:6px;padding:10px 12px;background:#f0f6ff;border:1.5px solid #c7d9f8;border-radius:6px;font-size:13px;font-weight:800;color:var(--blue);white-space:nowrap}
.phone-input{flex:1;padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:6px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;direction:ltr}
.phone-input:focus{border-color:var(--blue)}
.btn-save-phone{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer}
.btn-cancel-phone{width:100%;padding:10px;background:#f4f4f5;color:#333;border:none;border-radius:6px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px}

/* كلمة السر للغرفة */
.pass-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:20px;font-family:'Tajawal',sans-serif;direction:rtl}
.pass-box{background:#fff;border-radius:12px;width:100%;max-width:310px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.pass-head{background:var(--blue);padding:14px 16px;display:flex;align-items:center;gap:8px}
.pass-head svg{flex-shrink:0}
.pass-head span{color:#fff;font-size:14px;font-weight:800}
.pass-body{padding:16px}
.pass-body input{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:6px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;direction:ltr;text-align:center;letter-spacing:3px}
.pass-body input:focus{border-color:var(--blue)}
.pass-err{color:#e53935;font-size:12px;font-weight:700;text-align:center;margin-top:6px;display:none}
.pass-btns{display:flex;gap:8px;margin-top:12px}
.pass-btn-ok {flex:1;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer}
.pass-btn-no {flex:1;padding:11px;background:#f1f3f5;color:#333;border:none;border-radius:6px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* LIVE badge (بدل النقطة الحمراء الإيموجي) */
.live-badge{display:inline-flex;align-items:center;gap:4px;background:#ffebee;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:900;color:#c62828;letter-spacing:.5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#e53935;animation:livePulse 1.2s infinite}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>

<script>
// ══════════════════════════════════════════════════
// ثوابت — نستخدم Firebase SDK مباشرة
// ══════════════════════════════════════════════════
function _fbRef(path) {
  return firebase.database().ref(path);
}

var currentTab       = 'all';
var allNotifications = [];
var _lastReadTs      = 0;

// ══════════════════════════════════════════════════
// إعدادات الواتساب (رقم الهاتف)
// ══════════════════════════════════════════════════
function openPhoneSettings() {
  var old = document.getElementById('_phoneSettingsOverlay');
  if (old) old.remove();

  // جلب الرقم المحفوظ من Firebase
  var uid = localStorage.getItem('yadwor-uid') || '';
  var savedPhone = '';
  var savedPrefix = '+212';

  // محاولة جلب من Firebase أولاً
  if (uid) {
    _fbRef('userMeta/' + uid + '/whatsappPhone').once('value')
      .then(function(snap) {
        var v = snap.val();
        if (v && typeof v === 'object') {
          savedPhone  = v.number  || '';
          savedPrefix = v.prefix  || '+212';
        } else if (typeof v === 'string') {
          savedPhone = v;
        }
        _buildPhoneModal(savedPhone, savedPrefix);
      }).catch(function(){ _buildPhoneModal('', '+212'); });
  } else {
    _buildPhoneModal('', '+212');
  }
}

function _buildPhoneModal(savedPhone, savedPrefix) {
  var overlay = document.createElement('div');
  overlay.id = '_phoneSettingsOverlay';
  overlay.className = 'settings-overlay';
  overlay.innerHTML =
    '<div class="settings-box">' +
      '<div class="settings-head">' +
        '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.42 2 2 0 0 1 3.6 1.25h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.95a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>' +
        '<h3>إشعارات الواتساب</h3>' +
      '</div>' +
      '<div class="settings-body">' +
        '<p style="font-size:12px;color:#555;margin-bottom:12px;line-height:1.6;">أدخل رقم هاتفك لتلقّي الإشعارات عبر الواتساب</p>' +
        '<div class="phone-row">' +
          '<div class="phone-prefix">' +
            '<select id="_phonePrefix" style="background:none;border:none;font-family:Tajawal,sans-serif;font-size:13px;font-weight:800;color:#0D47A1;cursor:pointer;padding:0;">' +
              '<option value="+212"' + (savedPrefix==='+212'?' selected':'') + '>🇲🇦 +212</option>' +
              '<option value="+213"' + (savedPrefix==='+213'?' selected':'') + '>🇩🇿 +213</option>' +
              '<option value="+216"' + (savedPrefix==='+216'?' selected':'') + '>🇹🇳 +216</option>' +
              '<option value="+218"' + (savedPrefix==='+218'?' selected':'') + '>🇱🇾 +218</option>' +
              '<option value="+20" ' + (savedPrefix==='+20' ?' selected':'') + '>🇪🇬 +20</option>' +
              '<option value="+966"' + (savedPrefix==='+966'?' selected':'') + '>🇸🇦 +966</option>' +
              '<option value="+971"' + (savedPrefix==='+971'?' selected':'') + '>🇦🇪 +971</option>' +
              '<option value="+33" ' + (savedPrefix==='+33' ?' selected':'') + '>🇫🇷 +33</option>' +
            '</select>' +
          '</div>' +
          '<input id="_phoneNumber" class="phone-input" type="tel" placeholder="0612345678" value="' + savedPhone + '" maxlength="15" inputmode="numeric">' +
        '</div>' +
        '<div id="_phoneErr" style="display:none;color:#e53935;font-size:11px;font-weight:700;margin-bottom:8px;text-align:center;">أدخل رقماً صحيحاً (9 أرقام على الأقل)</div>' +
        '<button class="btn-save-phone" onclick="_savePhoneNumber()">حفظ الرقم</button>' +
        '<button class="btn-cancel-phone" onclick="document.getElementById(\'_phoneSettingsOverlay\').remove()">إلغاء</button>' +
      '</div>' +
    '</div>';
  overlay.addEventListener('click', function(e){ if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function _savePhoneNumber() {
  var prefix = document.getElementById('_phonePrefix').value;
  var number = (document.getElementById('_phoneNumber').value || '').trim().replace(/^0/, '');
  var errEl  = document.getElementById('_phoneErr');

  if (!number || number.length < 8 || !/^\d+$/.test(number)) {
    if (errEl) errEl.style.display = 'block';
    return;
  }
  if (errEl) errEl.style.display = 'none';

  var uid = localStorage.getItem('yadwor-uid') || '';
  var fullNumber = prefix + number;

  if (uid) {
    _fbRef('userMeta/' + uid + '/whatsappPhone').set({ prefix: prefix, number: number, full: fullNumber })
      .then(function(){
        _showToast('تم حفظ رقم الواتساب بنجاح');
        document.getElementById('_phoneSettingsOverlay').remove();
      }).catch(function(){
        _showToast('حدث خطأ، حاول مجدداً');
      });
  } else {
    _showToast('سجّل دخولك أولاً');
  }
}

function _showToast(msg) {
  var el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// ══════════════════════════════════════════════════
// تبويبات
// ══════════════════════════════════════════════════
function setNotifTab(tab) {
  currentTab = tab;
  ['all','exams','rooms','likes','comments'].forEach(function(t) {
    var btn = document.getElementById('ntab-' + t);
    if (btn) btn.className = 'n-tab' + (t === tab ? ' active' : '');
  });
  renderList();
}

function getFilteredNotifs() {
  if (currentTab === 'all')      return allNotifications;
  if (currentTab === 'exams')    return allNotifications.filter(function(n){ return n.type === 'exam'; });
  if (currentTab === 'rooms')    return allNotifications.filter(function(n){ return n.type === 'room'; });
  if (currentTab === 'likes')    return allNotifications.filter(function(n){ return n.type === 'like'; });
  if (currentTab === 'comments') return allNotifications.filter(function(n){ return n.type === 'comment' || n.type === 'reply'; });
  return allNotifications;
}

// ══════════════════════════════════════════════════
// أيقونات SVG
// ══════════════════════════════════════════════════
function _svgRoom() {
  return '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#0D47A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.87v6.26a1 1 0 0 1-1.447.9L15 14"/><rect x="1" y="6" width="14" height="12" rx="2"/></svg>';

// ══════════════════════════════════════════════════
// تنسيق الوقت
// ══════════════════════════════════════════════════
function _timeAgo(ts) {
  if (!ts) return 'الآن';
  var d = Date.now() - ts;
  var m = Math.floor(d / 60000);
  if (m < 1)  return 'الآن';
  if (m < 60) return 'منذ ' + m + ' د';
  var h = Math.floor(m / 60);
  if (h < 24) return 'منذ ' + h + ' س';
  return 'منذ ' + Math.floor(h / 24) + ' يوم';
}

function _formatDeadline(ts) {
  if (!ts) return '';
  var d  = new Date(ts);
  var now = new Date();
  var diff = ts - Date.now();
  if (diff < 0) return 'انتهى';
  var days = Math.floor(diff / 86400000);
  var hrs  = Math.floor((diff % 86400000) / 3600000);
  var mins = Math.floor((diff % 3600000) / 60000);

  var dateStr = d.toLocaleDateString('ar-MA', { weekday:'short', day:'numeric', month:'short' });
  var timeStr = d.toLocaleTimeString('ar-MA', { hour:'2-digit', minute:'2-digit' });

  if (days > 0)  return 'ينتهي ' + dateStr + ' الساعة ' + timeStr;
  if (hrs  > 0)  return 'ينتهي خلال ' + hrs + ' س و' + mins + ' د';
  if (mins > 0)  return 'ينتهي خلال ' + mins + ' دقيقة';
  return 'ينتهي الآن';
}

// نافذة كلمة السر
// ══════════════════════════════════════════════════
function _showPassModal(roomId, code) {
  var old = document.getElementById('_passModal');
  if (old) old.remove();
  var ov = document.createElement('div');
  ov.id = '_passModal';
  ov.className = 'pass-overlay';
  ov.innerHTML =
    '<div class="pass-box">' +
      '<div class="pass-head">' +
        _svgLock().replace('width="11" height="11"','width="18" height="18"').replace('currentColor','#fff') +
        '<span style="margin-right:8px;">غرفة خاصة — أدخل كلمة السر</span>' +
      '</div>' +
      '<div class="pass-body">' +
        '<input id="_passInp" type="password" placeholder="••••••" autocomplete="off" oninput="document.getElementById(\'_passErr\').style.display=\'none\'">' +
        '<div class="pass-err" id="_passErr">كلمة السر غير صحيحة</div>' +
        '<div class="pass-btns">' +
          '<button class="pass-btn-ok" onclick="_doPass(\'' + roomId + '\',\'' + code + '\')">دخول</button>' +
          '<button class="pass-btn-no" onclick="document.getElementById(\'_passModal\').remove()">إلغاء</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  ov.addEventListener('click', function(e){ if (e.target===ov) ov.remove(); });
  document.body.appendChild(ov);
  setTimeout(function(){
    var inp = document.getElementById('_passInp');
    if (inp) { inp.focus(); inp.addEventListener('keydown', function(e){ if (e.key==='Enter') _doPass(roomId, code); }); }
  }, 80);
}

function _doPass(roomId, code) {
  var inp = document.getElementById('_passInp');
  var err = document.getElementById('_passErr');
  if (!inp || inp.value.trim() !== code) {
    if (err) err.style.display = 'block';
    if (inp) { inp.style.borderColor = '#e53935'; setTimeout(function(){ inp.style.borderColor = '#ddd'; }, 1400); }
    return;
  }
  document.getElementById('_passModal').remove();
  _joinRoom(roomId, 'private', code);
}

function _joinRoom(roomId, roomType, roomCode) {
  var uid    = localStorage.getItem('yadwor-uid') || '';
  var name   = localStorage.getItem('yadwor-settings-name') || localStorage.getItem('yadwor-user-name') || '';
  var avatar = localStorage.getItem('yadwor-avatar-preview') || '';
  // التحقق من وجود الغرفة في Firebase أولاً قبل الانضمام
  firebase.database().ref('rooms/' + roomId).once('value').then(function(snap) {
    var room = snap.val();
    if (!room) {
      alert('الغرفة لم تعد متاحة');
      return;
    }
    // حفظ بيانات الغرفة للانتقال إليها
    localStorage.setItem('yw_room_target',  JSON.stringify({
      roomId:   roomId,
      roomType: room.type || roomType,
      roomCode: room.code || roomCode,
      roomName: room.name || '',
      ownerUid: room.ownerUid || ''
    }));
    localStorage.setItem('yw_active_room',  JSON.stringify({
      roomId:   roomId,
      isOwner:  false,
      roomType: room.type || roomType,
      roomCode: room.code || roomCode,
      roomMode: 'video'
    }));
    localStorage.setItem('yw_room_mode',    'video');
    localStorage.setItem('yw_current_user', JSON.stringify({uid:uid, name:name, avatar:avatar}));
    window.location.href = 'roomvideo.html';
  }).catch(function() {
    // fallback - try to join anyway
    localStorage.setItem('yw_room_target',  JSON.stringify({roomId:roomId, roomType:roomType, roomCode:roomCode, roomName:''}));
    localStorage.setItem('yw_active_room',  JSON.stringify({roomId:roomId, isOwner:false, roomType:roomType, roomCode:roomCode, roomMode:'video'}));
    localStorage.setItem('yw_room_mode',    'video');
    localStorage.setItem('yw_current_user', JSON.stringify({uid:uid, name:name, avatar:avatar}));
    window.location.href = 'roomvideo.html';
  });
}

function joinRoomFromNotif(roomId, roomType, roomCode) {
  if (roomType === 'private') _showPassModal(roomId, roomCode);
  else _joinRoom(roomId, roomType, roomCode);
}

// ── بناء محتوى بطاقة الغرفة ──
function _buildRoomBody(n) {
  var ownerName = n.ownerName || 'أستاذ';
  var roomName  = n.roomName  || '';
  var isPrivate = n.roomType === 'private';
  var body = '';

  // اسم + LIVE badge
  body +=
    '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px;">' +
      '<div class="live-badge"><span class="live-dot"></span>LIVE</div>' +
      '<span class="n-who" style="margin:0;">' + ownerName + '</span>' +
      (roomName ? '<span style="font-size:12px;color:#6b7280;font-weight:600;">"' + roomName + '"</span>' : '') +
    '</div>';

  // معلومات — بدون خلفيات
  var metaItems = [];
  if (n.levelName) metaItems.push(
    '<span class="n-meta-item"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round"><path d="M3 21h18M3 7l9-4 9 4M4 7v14M20 7v14"/></svg>' + n.levelName + '</span>'
  );
  if (n.subject) metaItems.push(
    '<span class="n-meta-item"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>' + n.subject + '</span>'
  );
  // خاص + كلمة السر في سطر واحد
  if (isPrivate) {
    var passLine = '<span class="n-meta-item" style="color:#dc2626;"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="#dc2626" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>خاصة</span>';
    if (n.showCode && n.roomCode) {
      passLine += '<span class="n-meta-sep">·</span><span class="room-pass-inline"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="#1e3a8a" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>كلمة السر: ' + n.roomCode + '</span>';
    }
    metaItems.push(passLine);
  }
  if (metaItems.length) {
    body += '<div class="n-meta">' + metaItems.join('<span class="n-meta-sep">·</span>') + '</div>';
  }

  // زر دخول
  if (n.roomId) {
    body +=
      '<button class="btn-room" onclick="joinRoomFromNotif(\'' + n.roomId + '\',\'' + (n.roomType||'public') + '\',\'' + (n.roomCode||'') + '\')">' +
        '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M15 10l4.553-2.276A1 1 0 0 1 21 8.723v6.554a1 1 0 0 1-1.447.894L15 14M3 8a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>' +
        'دخول الغرفة' +
      '</button>';
  }

  body += '<div class="n-time">' + _timeAgo(n.ts || n.publishedAt) + '</div>';
  return body;
}

    var snap = await _fbRef('notificationsRoom').once('value');
    var data = snap.val();
    if (!data || typeof data !== 'object') return [];

    return Object.values(data).filter(function(n) {
      if (!n || !n.roomId) return false;
      if (n.ownerUid === myUid) return false;
      if (myType === 'student') {
        if (!myReq) return false;
        var myInst = myReq.institutionUid || myReq.institutionId || '';
        var ok1 = !n.institutionOnly || myInst === (n.institutionUid || '');
        var ok2 = !n.levelId || myReq.levelId === n.levelId;
        var subs = (myReq.subjects || []).map(function(s){ return (s.name||s).trim(); });
        var ok3 = !n.subject || subs.includes((n.subject||'').trim());
        return ok1 && ok2 && ok3;
      }
      return n.noTarget && n.roomType === 'public';
    }).map(function(n){ return Object.assign({}, n, {type:'room', unread:(n.ts||0)>_lastReadTs}); })
      .sort(function(a,b){ return (b.ts||0)-(a.ts||0); });
  } catch(e) { return []; }
}

// ══════════════════════════════════════════════════
// جلب إشعارات التمارين
// ══════════════════════════════════════════════════
async function fetchExamNotifications(myUid, myType, myReq) {
  try {
    var snap = await _fbRef('notifications').once('value');
    var data = snap.val();
    if (!data || typeof data !== 'object') return [];
    var list = Object.values(data).filter(function(n){ return n && n.type === 'exam'; });

    return list.filter(function(n) {
      if (n.teacherUid === myUid) return false;
      if (myType === 'teacher') return false;
      if (myType === 'student') {
        if (!myReq) return false;
        var si = (myReq.institutionUid||myReq.institutionId||'') === (n.institutionUid||'');
        var sl = myReq.levelId === n.levelId;
        var ss = (myReq.subjects||[]).map(function(s){ return (s.name||s).trim(); }).includes((n.subject||'').trim());
        return si && sl && ss;
      }
      if (myType === 'institution') return (n.institutionUid||'') === myUid;
      return false;
    }).map(function(n){ return Object.assign({}, n, {unread:(n.publishedAt||0)>_lastReadTs}); })
      .sort(function(a,b){ return (b.publishedAt||0)-(a.publishedAt||0); });
  } catch(e) { return []; }
}

// ══════════════════════════════════════════════════
// جلب التفاعلات (لايك / تعليق / رد)
// ══════════════════════════════════════════════════
async function fetchInteractionNotifications(myUid) {
  try {
    var snap = await _fbRef('interactions/' + myUid).once('value');
    var data = snap.val();
    if (!data || typeof data !== 'object') return [];
    return Object.values(data)
      .filter(function(n){ return n && (n.type==='like'||n.type==='comment'||n.type==='reply'); })
      .map(function(n){ return Object.assign({}, n, {unread:(n.publishedAt||n.timestamp||0)>_lastReadTs}); })
      .sort(function(a,b){ return (b.publishedAt||b.timestamp||0)-(a.publishedAt||a.timestamp||0); });
  } catch(e) { return []; }
}

// ══════════════════════════════════════════════════
// التحميل الرئيسي
// ══════════════════════════════════════════════════
async function loadNotifications() {
  showShimmer();
  await _loadLastRead();

  var myUid  = localStorage.getItem('yadwor-uid') || '';
  var myType = localStorage.getItem('yadwor-account-type') || localStorage.getItem('yadwor-profile-type') || '';
  var myReq  = null;

  if (myUid) {
    try {
      var snapJR = await _fbRef('joinRequests').once('value');
      var all = snapJR.val();
      if (all && typeof all === 'object') {
        var keys = Object.keys(all);
        for (var i = 0; i < keys.length; i++) {
          var vals = Object.values(all[keys[i]] || {});
          var found = vals.find(function(req){ return req && req.status==='accepted' && (req.uid===myUid||req.userId===myUid); });
          if (found) { myReq = found; break; }
        }
      }
    } catch(e) {}
  }

  var results = await Promise.all([
    fetchRoomNotifications(myUid, myType, myReq),
    fetchExamNotifications(myUid, myType, myReq),
    fetchInteractionNotifications(myUid)
  ]);

  allNotifications = [].concat(results[0], results[1], results[2])
    .sort(function(a,b){ return (b.publishedAt||b.ts||b.timestamp||0)-(a.publishedAt||a.ts||a.timestamp||0); });

  renderList();

  // تمييز كمقروء بعد 2 ث
  setTimeout(function() {
    _lastReadTs = Date.now();
    allNotifications.forEach(function(n){ n.unread = false; });
    if (typeof markNotificationsRead === 'function') markNotificationsRead(_lastReadTs);
    renderList();
  }, 2000);
}

// ══════════════════════════════════════════════════
// Realtime listener — onValue بدلاً من SSE
// ══════════════════════════════════════════════════
var _realtimeDebounce = null;
function _debouncedLoad() {
  clearTimeout(_realtimeDebounce);
  _realtimeDebounce = setTimeout(function() { loadNotifications(); }, 600);
}

(function startRealtimeListeners() {
  var myUid = localStorage.getItem('yadwor-uid') || '';
  if (!myUid) return;

  _fbRef('notificationsRoom').on('value', function() { _debouncedLoad(); });
  _fbRef('notifications').on('value', function() { _debouncedLoad(); });
  _fbRef('interactions/' + myUid).on('value', function() { _debouncedLoad(); });
})();

loadNotifications();
</script>
<script src="floating-room.js"></script>
